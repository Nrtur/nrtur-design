function useConfirm(){
  const [cfg,setCfg]=React.useState(null);
  const openConfirm=React.useCallback((opts)=>setCfg(opts),[]);
  const close=React.useCallback(()=>setCfg(null),[]);
  const confirmNode=cfg?(<ConfirmModal {...cfg} onCancel={close} onConfirm={()=>{cfg.onConfirm?.();close();}}/>):null;
  return {confirmNode,openConfirm};
}

function useToast(){
  const [toasts,setToasts]=React.useState([]);
  const addToast=React.useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  return {toasts,addToast};
}

function CommandPalette({close,goTo}){
  const [query,setQuery]=React.useState('');
  const [sel,setSel]=React.useState(0);
  const inputRef=React.useRef(null);
  React.useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),60);},[]);
  const filtered=React.useMemo(()=>query?CMD_ITEMS.filter(x=>x.label.toLowerCase().includes(query.toLowerCase())):CMD_ITEMS,[query]);
  React.useEffect(()=>{setSel(0);},[query]);
  React.useEffect(()=>{
    const fn=(e)=>{if(e.key==='Escape'){close();return;}if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}if(e.key==='Enter'){const item=filtered[sel];if(item){goTo(item.page);close();}}};
    document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);
  },[close,sel,filtered,goTo]);
  const GROUPS=['Navigate','Create','Recent'];
  return(
    <div className="fixed inset-0 z-[150] flex items-start justify-center" style={{background:'rgba(7,7,15,0.85)',backdropFilter:'blur(10px)',paddingTop:100}} onClick={e=>{if(e.target===e.currentTarget)close();}}>

          <span style={{fontFamily:'monospace',fontSize:10,color:'rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:4,padding:'2px 6px'}}>ESC</span>
        </div>
        <div style={{padding:8,maxHeight:340,overflowY:'auto'}}>
          {GROUPS.map(group=>{
            const items=filtered.filter(x=>x.group===group);
            if(!items.length)return null;
            return(
              <React.Fragment key={group}>
                <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.32)',padding:'8px 12px 4px'}}>{group}</div>
                {items.map(item=>{
                  const globalIdx=filtered.indexOf(item);const isSel=globalIdx===sel;

                      style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'9px 12px',borderRadius:8,cursor:'pointer',border:'none',textAlign:'left',fontFamily:'inherit',background:isSel?'rgba(99,102,241,0.12)':'transparent',transition:'background .1s'}}>
                      <div style={{width:28,height:28,borderRadius:7,background:item.accent?'rgba(99,102,241,0.10)':'rgba(255,255,255,0.04)',border:item.accent?'1px solid rgba(99,102,241,0.20)':'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',justifyContent:'center',color:item.accent?'#818cf8':'rgba(255,255,255,0.4)',flexShrink:0}}>
                        {item.group==='Create'&&<I.Plus size={11} stroke={2.5}/>}{item.group==='Navigate'&&<I.ArrowRight size={11} stroke={2}/>}{item.group==='Recent'&&<I.Clock size={11} stroke={2}/>}

                    </button>

    <div className="fixed inset-0 z-[150] flex items-center justify-center" style={{background:'rgba(0,0,0,0.72)',backdropFilter:'blur(8px)'}}>
      <div style={{width:460,background:'rgba(13,13,26,0.97)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,backdropFilter:'blur(24px)',boxShadow:'0 0 0 1px rgba(255,255,255,0.04),0 32px 80px rgba(0,0,0,0.65)',padding:24}}>
        <div className="flex items-center justify-between mb-6"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-brand-500/10 ring-1 ring-brand-500/25 flex items-center justify-center text-brand-300"><I.Phone size={16}/></div><div><p className="text-white text-[15px] font-bold">Log a call</p><p className="text-white/45 text-[12px]">Record call details for a contact.</p></div></div><button onClick={close} className="text-white/40 hover:text-white transition-colors"><I.X size={16}/></button></div>
        <div className="flex flex-col gap-4">
          <div><label className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em] block mb-1.5">Contact</label><select value={contact} onChange={e=>setContact(e.target.value)} className="w-full px-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.10] text-[13px] text-white/80 outline-none focus:border-brand-500/40 appearance-none"><option value="">Select a contact...</option>{CONTACT_LIST.map(c=>(<option key={c}>{c}</option>))}</select></div>
          <div><label className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em] block mb-1.5">Direction</label><div className="flex gap-2">{[{v:'out',l:'Outbound'},{v:'in',l:'Inbound'}].map(({v,l})=>(<button key={v} onClick={()=>setDirection(v)} className={['flex-1 py-2.5 rounded-xl text-[13px] font-medium border transition-all',direction===v?'bg-brand-500/15 text-brand-200 border-brand-500/30':'bg-white/[0.04] text-white/55 border-white/[0.08] hover:border-white/[0.18]'].join(' ')}>{l}</button>))}</div></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em] block mb-1.5">Duration</label><input value={duration} onChange={e=>setDuration(e.target.value)} placeholder="e.g. 12:30" className="w-full px-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.10] text-[13px] text-white outline-none focus:border-brand-500/40 font-mono placeholder:text-white/25"/></div>
            <div><label className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em] block mb-1.5">Outcome</label><select value={outcome} onChange={e=>setOutcome(e.target.value)} className="w-full px-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.10] text-[13px] text-white/80 outline-none focus:border-brand-500/40 appearance-none"><option value="">Select...</option>{OUTCOMES.map(o=>(<option key={o}>{o}</option>))}</select></div>
          </div>
          <div><label className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em] block mb-1.5">Notes</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="What was discussed?" className="w-full px-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.10] text-[13px] text-white placeholder:text-white/25 outline-none focus:border-brand-500/40 resize-none"/></div>
        </div>
        <div className="flex gap-3 mt-6"><button onClick={close} className="flex-1 py-2.5 rounded-xl text-[13px] font-medium text-white/65 bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.07] transition-all">Cancel</button><button onClick={close} className="flex-1 py-2.5 rounded-xl text-[13px] font-bold text-white bg-brand-500 hover:bg-brand-400 shadow-brand border-none transition-all">Save call</button></div>
      </div>
    </div>
  );
}
function CallsPage({goTo}){
  const [logModal,setLogModal]=React.useState(false);
  const COL='1.6fr 1.3fr 80px 80px 150px 1fr 40px';
  return(
    <div className="h-full flex" style={{background:'#09091a'}}>
      <AppSidebar active="calls" goTo={goTo}/>
      <div className="flex-1 flex flex-col min-w-0">
        <AppTopbar goTo={goTo} title="Calls" subtitle={`${CALLS_DATA.length} logged - 2 today`} rightSlot={<button onClick={()=>setLogModal(true)} className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-brand hover:-translate-y-0.5 transition-all"><I.Plus size={14} stroke={2.4}/>Log Call</button>} noSearch/>
        <div className="shrink-0 px-7 py-3 border-b border-white/[0.05] flex items-center gap-6" style={{background:'#09091a'}}>{[{label:'Total',val:'8',color:'text-white'},{label:'Outbound',val:'5',color:'text-violet-300'},{label:'Inbound',val:'3',color:'text-blue-300'},{label:'Avg duration',val:'12:08',color:'text-white'},{label:'No answer',val:'2',color:'text-amber-300'}].map(s=>(<div key={s.label} className="flex items-center gap-2"><span className={['text-[15px] font-bold tabular-nums',s.color].join(' ')}>{s.val}</span><span className="text-[11px] text-white/40">{s.label}</span></div>))}</div>
        <div className="flex-1 overflow-y-auto scroll-area">
          <div className="sticky top-0 z-10 grid items-center gap-4 px-7 py-3 border-b border-white/[0.05] text-[10px] font-semibold text-white/40 uppercase tracking-[0.14em]" style={{gridTemplateColumns:COL,background:'rgba(9,9,26,0.90)',backdropFilter:'blur(12px)'}}><span>Contact</span><span>Company</span><span>Type</span><span>Duration</span><span>Date</span><span>Outcome</span><span/></div>
          {CALLS_DATA.map((call,i)=>(<div key={call.id} className={['grid items-center gap-4 px-7 py-4 hover:bg-white/[0.025] transition-colors group cursor-pointer',i<CALLS_DATA.length-1?'border-b border-white/[0.03]':''].join(' ')} style={{gridTemplateColumns:COL}}>
            <div className="flex items-center gap-3 min-w-0"><div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0" style={{background:call.color}}>{call.avatar}</div><p className="text-[13px] font-semibold text-white truncate">{call.contact}</p></div>
            <p className="text-[12px] text-white/65 truncate">{call.company}</p>
            <span className={['inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium ring-1 w-fit',call.direction==='in'?'bg-blue-500/12 text-blue-300 ring-blue-500/25':'bg-violet-500/12 text-violet-300 ring-violet-500/25'].join(' ')}>{call.direction==='in'?'In':'Out'}</span>
            <p className={['text-[13px] font-mono tabular-nums',call.duration==='0:00'?'text-white/30':'text-white/80'].join(' ')}>{call.duration}</p>
            <p className="text-[12px] text-white/55">{call.date}</p>
            <p className="text-[12px] text-white/70 truncate">{call.outcome||'-'}</p>
            <button className="text-white/20 opacity-0 group-hover:opacity-100 hover:text-white/60 transition-all ml-auto"><I.More size={14}/></button>
          </div>))}
        </div>
        <AppFooter note="8 calls this week"/>
      </div>
      {logModal&&<LogCallModal close={()=>setLogModal(false)}/>}
    </div>
  );
}
// ?? App Router ????????????????????????????????????????????????????????????????
function App(){
  const [page,setPage]=React.useState('landing');
  const [searchOpen,setSearchOpen]=React.useState(false);
  const [cmdOpen,setCmdOpen]=React.useState(false);
  const [billingState,setBillingState]=React.useState('active');
  const goTo=React.useCallback((p)=>{setPage(p);window.scrollTo&&window.scrollTo(0,0);},[]);
  React.useEffect(()=>{window.__nrturOpenSearch=()=>setSearchOpen(true);window.__nrturOpenCmd=()=>setCmdOpen(true);return()=>{delete window.__nrturOpenSearch;delete window.__nrturOpenCmd;};},[]);
  React.useEffect(()=>{const fn=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setSearchOpen(false);setCmdOpen(true);}};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[]);
  const p={goTo};
  return(
    <BillingContext.Provider value={{billingState,setBillingState}}>
      {page==='landing'           && <LandingPage {...p}/>}
      {page==='signup'            && <SignUpPage {...p}/>}
      {page==='signin'            && <SignInPage {...p}/>}
      {page==='forgot-password'   && <ForgotPasswordPage {...p}/>}
      {page==='onboarding-1'      && <OnboardingPage step={1} {...p}/>}
      {page==='onboarding-2'      && <OnboardingPage step={2} {...p}/>}
      {page==='onboarding-3'      && <OnboardingPage step={3} {...p}/>}
      {page==='onboarding-4'      && <OnboardingPage step={4} {...p}/>}
      {page==='onboarding-5'      && <OnboardingPage step={5} {...p}/>}
      {page==='dashboard'         && <DashboardPage {...p}/>}
      {page==='contacts'          && <ContactsPage {...p}/>}
      {page==='contact-detail'    && <ContactDetailPage {...p}/>}
      {page==='add-contact'       && <AddContactPage {...p}/>}
      {page==='edit-contact'      && <EditContactPage {...p}/>}
      {page==='pipeline'          && <PipelinePage {...p}/>}
      {page==='deal-detail'       && <DealDetailPage {...p}/>}
      {page==='add-deal'          && <AddDealPage {...p}/>}
      {page==='email-inbox'       && <EmailInboxPage {...p}/>}
      {page==='sms-inbox'         && <SMSInboxPage {...p}/>}
      {page==='calls'             && <CallsPage {...p}/>}
      {page==='automations'       && <AutomationsPage {...p}/>}
      {page==='automation-builder'&& <AutomationBuilderPage {...p}/>}
      {page==='sms-sequences'     && <SMSSequencesPage {...p}/>}
      {page==='email-sequences'   && <EmailSequencesPage {...p}/>}
      {page==='sms-templates'     && <SMSTemplatesPage {...p}/>}
      {page==='reports'           && <ReportsPage {...p}/>}
      {page==='settings-billing'  && <SettingsBillingPage {...p}/>}
      {page==='settings-team'     && <SettingsTeamPage {...p}/>}
      {page==='settings-general'  && <SettingsGeneralPage {...p}/>}
      {page==='settings-integrations' && <SettingsIntegrationsPage {...p}/>}
      {page==='settings-pipeline' && <SettingsPipelinePage {...p}/>}
      {page==='settings-notifications' && <SettingsNotificationsPage {...p}/>}
      {page==='settings-unsubscribes' && <SettingsUnsubscribesPage {...p}/>}
      {page==='settings-privacy'  && <SettingsPrivacyPage {...p}/>}
      {page==='profile'           && <ProfilePage {...p}/>}
      {searchOpen&&<GlobalSearchOverlay close={()=>setSearchOpen(false)} goTo={(pg)=>{goTo(pg);setSearchOpen(false);}}/>}
      {cmdOpen&&<CommandPalette close={()=>setCmdOpen(false)} goTo={(pg)=>{goTo(pg);setCmdOpen(false);}}/>}
      <DevNav goTo={goTo}/>
    </BillingContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
