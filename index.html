<style>
html,body,#root{height:100%;margin:0}

::selection{background:rgba(99,102,241,0.35)}

.v-marquee{-webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 14%,#000 86%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0,#000 14%,#000 86%,transparent 100%)}
.v-marquee-track{animation:vMarquee 32s linear infinite}
.v-marquee:hover .v-marquee-track{animation-play-state:paused}
.scroll-area::-webkit-scrollbar{width:6px;height:8px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:9999px}
.scroll-area::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.45)}
.deal-card{transition:all 200ms ease}.deal-card:hover{transform:translateY(-1px)}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#818cf8}

function Skel({ w, h='11px', r='5px', s={} }) {
  return <div style={{width:w,height:h,borderRadius:r,flexShrink:0,background:'linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.09) 40%,rgba(255,255,255,0.04) 80%)',backgroundSize:'200% 100%',animation:'nrturShimmer 1.7s ease-in-out infinite',...s}}/>;
}
function useSkeleton(delay=1100){const [l,setL]=React.useState(true);React.useEffect(()=>{const t=setTimeout(()=>setL(false),delay);return()=>clearTimeout(t);},[]);return l;}
function ConfirmModal({title,body,confirmLabel='Delete',danger=true,onConfirm,onCancel}){
  React.useEffect(()=>{const fn=(e)=>{if(e.key==='Escape')onCancel();};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[onCancel]);
  return(
    <div className="fixed inset-0 z-[200] flex items-center justify-center" style={{background:'rgba(0,0,0,0.72)',backdropFilter:'blur(8px)'}}>
      <div style={{width:400,background:'var(--pop)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,backdropFilter:'blur(24px)',boxShadow:'0 0 0 1px rgba(255,255,255,0.04),0 32px 80px rgba(0,0,0,0.65)',padding:24}}>
        <div className="flex items-start gap-4 mb-6">
          <div className={['w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ring-1',danger?'bg-red-500/10 ring-red-500/25':'bg-brand-500/10 ring-brand-500/25'].join(' ')}>
            {danger?<I.Trash size={17} style={{color:'#f87171'}}/>:<I.Sparkles size={17} style={{color:'#818cf8'}}/>}
          </div>
          <div><p className="text-white text-[15px] font-bold leading-snug">{title}</p><p className="text-white/55 text-[13px] mt-2 leading-relaxed">{body}</p></div>
        </div>
        <div className="flex gap-3">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl text-[13px] font-medium text-white/65 bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.07] transition-all">Cancel</button>
          {danger?<button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl text-[13px] font-bold text-white border-none cursor-pointer" style={{background:'#dc2626'}} onMouseOver={e=>e.currentTarget.style.background='#b91c1c'} onMouseOut={e=>e.currentTarget.style.background='#dc2626'}>{confirmLabel}</button>
          :<button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl text-[13px] font-bold text-white bg-brand-500 hover:bg-brand-400 border-none cursor-pointer">{confirmLabel}</button>}
        </div>
      </div>
    </div>
  );
}
function useConfirm(){
  const [cfg,setCfg]=React.useState(null);
  const openConfirm=React.useCallback((opts)=>setCfg(opts),[]);
  const close=React.useCallback(()=>setCfg(null),[]);
  const confirmNode=cfg?(<ConfirmModal {...cfg} onCancel={close} onConfirm={()=>{cfg.onConfirm?.();close();}}/>):null;
  return {confirmNode,openConfirm};
}

function Toggle({on,onChange}){
  return(
    <button onClick={()=>onChange(!on)} role="switch" aria-checked={on}
      className={['relative w-10 h-6 rounded-full transition-all duration-200 shrink-0',on?'bg-brand-500 shadow-[0_0_0_3px_rgba(99,102,241,0.18),0_0_20px_rgba(99,102,241,0.35)]':'bg-white/[0.08] ring-1 ring-white/[0.08]'].join(' ')}>
      <span className={['absolute top-0.5 w-5 h-5 rounded-full bg-white shadow-md transition-all duration-200',on?'left-[18px]':'left-0.5 bg-white/80'].join(' ')}/>
    </button>
  );
}
function useToast(){
  const [toasts,setToasts]=React.useState([]);
  const addToast=React.useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  return {toasts,addToast};
}
function ToastContainer({toasts}){
  return(
    <div className="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2">
      {toasts.map(t=>(
        <div key={t.id} className={['inline-flex items-center gap-2.5 px-4 py-2.5 rounded-xl text-[13px] font-medium shadow-[0_8px_40px_rgba(0,0,0,0.5)] backdrop-blur-sm',
          t.type==='success'?'bg-emerald-500/12 text-emerald-200 border border-emerald-500/25':'bg-brand-500/12 text-brand-200 border border-brand-500/25'].join(' ')}
          style={{animation:'fadeUp 300ms ease-out both'}}>
          {t.type==='success'?<I.Check size={14} stroke={2.4}/>:<I.Bell size={14}/>}{t.msg}
        </div>
      ))}
    </div>
  );
}

function CommandPalette({close,goTo}){
  const [query,setQuery]=React.useState('');
  const [sel,setSel]=React.useState(0);
  const inputRef=React.useRef(null);
  React.useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),60);},[]);
  const filtered=React.useMemo(()=>query?CMD_ITEMS.filter(x=>x.label.toLowerCase().includes(query.toLowerCase())):CMD_ITEMS,[query]);
  React.useEffect(()=>{setSel(0);},[query]);
  React.useEffect(()=>{
    const fn=(e)=>{if(e.key==='Escape'){close();return;}if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}if(e.key==='Enter'){const item=filtered[sel];if(item){goTo(item.page);close();}}};
    document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);
  },[close,sel,filtered,goTo]);
  const GROUPS=['Navigate','Create','Recent'];
  return(
    <div className="fixed inset-0 z-[150] flex items-start justify-center" style={{background:'rgba(7,7,15,0.85)',backdropFilter:'blur(10px)',paddingTop:100}} onClick={e=>{if(e.target===e.currentTarget)close();}}>
      <div style={{width:560,background:'var(--panel98)',border:'1px solid var(--obd08)',borderRadius:16,boxShadow:'0 0 0 1px rgba(99,102,241,0.14),0 32px 80px rgba(0,0,0,0.75)',overflow:'hidden'}}>
        <div style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid var(--obd06)'}}>
          <I.Search size={15} style={{color:'var(--o38)',flexShrink:0}}/>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)} placeholder="Type a command or search..." style={{flex:1,background:'transparent',border:'none',outline:'none',fontSize:14,color:'var(--o1)',fontFamily:'inherit'}}/>
          <span style={{fontFamily:'monospace',fontSize:10,color:'var(--o30)',background:'var(--ob05)',border:'1px solid var(--obd08)',borderRadius:4,padding:'2px 6px'}}>ESC</span>
        </div>
        <div style={{padding:8,maxHeight:340,overflowY:'auto'}}>
          {GROUPS.map(group=>{
            const items=filtered.filter(x=>x.group===group);
            if(!items.length)return null;
            return(
              <React.Fragment key={group}>
                <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--o32)',padding:'8px 12px 4px'}}>{group}</div>
                {items.map(item=>{
                  const globalIdx=filtered.indexOf(item);const isSel=globalIdx===sel;
                  return(
                    <button key={item.label} onClick={()=>{goTo(item.page);close();}} onMouseEnter={()=>setSel(globalIdx)}
                      style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'9px 12px',borderRadius:8,cursor:'pointer',border:'none',textAlign:'left',fontFamily:'inherit',background:isSel?'rgba(99,102,241,0.12)':'transparent',transition:'background .1s'}}>
                      <div style={{width:28,height:28,borderRadius:7,background:item.accent?'rgba(99,102,241,0.10)':'rgba(255,255,255,0.04)',border:item.accent?'1px solid rgba(99,102,241,0.20)':'1px solid var(--obd07)',display:'flex',alignItems:'center',justifyContent:'center',color:item.accent?'#818cf8':'var(--o40)',flexShrink:0}}>
                        {item.group==='Create'&&<I.Plus size={11} stroke={2.5}/>}{item.group==='Navigate'&&<I.ArrowRight size={11} stroke={2}/>}{item.group==='Recent'&&<I.Clock size={11} stroke={2}/>}
                      </div>
                      <span style={{flex:1,fontSize:13,color:isSel?'var(--o1)':'var(--o75)'}}>{item.label}</span>
                      {item.sub&&<span style={{fontSize:11,color:'var(--o35)'}}>{item.sub}</span>}
                      {item.kbd&&<span style={{fontFamily:'monospace',fontSize:11,color:'var(--o35)',background:'var(--ob04)',border:'1px solid var(--obd07)',borderRadius:4,padding:'2px 6px'}}>{item.kbd}</span>}
                    </button>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
        <div style={{padding:'8px 16px',borderTop:'1px solid var(--obd05)',display:'flex',alignItems:'center',gap:16,background:'var(--ob01)'}}>
          {['up/down navigate','enter select','ESC close'].map(h=>(<span key={h} style={{fontSize:11,color:'var(--o28)',fontFamily:'monospace'}}>{h}</span>))}
        </div>
      </div>
    </div>
  );
}

function evalRuleLead(l,r){const v=r.value;
  if(r.field==='Status')return r.op==='is'?l.status===v:l.status!==v;
  if(r.field==='Source')return r.op==='is'?l.source===v:l.source!==v;
  if(r.field==='Owner')return r.op==='is'?ownerNameOf(l)===v:ownerNameOf(l)!==v;
  if(r.field==='Score'){const want=v.toLowerCase();return leadScoreBucket(l.score).k===want;}
  if(r.field==='Est. value'){const n=(parseFloat(v)||0)*1000;const ev=parseMoney(l.estValue);return r.op==='greater than'?ev>n:ev<n;}
  if(r.field==='Created'){const n=parseFloat(v)||0;return r.op==='more than'?l.days>n:l.days<n;}
  return true;
}

// One-line plain-English summary of an action's current config (shown under the node title + in the test trace)
function actionSummary(node){
  switch(node.key){
    case 'assign': return 'Assign to '+(node.assignTo||'a rep');
    case 'welcome': case 'reengage': return 'Template: '+(node.template||'—')+' · from '+(node.fromRep||'Deal owner');
    case 'proposal': return 'Template: '+(node.template||'—');
    case 'task': return '“'+(node.taskTitle||'Task')+'” → '+(node.assignTo||'')+', due '+(node.due||'');
    case 'slack': case 'celebrate': return 'Post to '+(node.channel||'#channel');
    case 'reminder': return (node.assignTo||'')+' in '+(node.due||'');
    case 'flag': return (node.reason||'')+' · notify '+(node.assignTo||'');
    case 'report': return (node.report||'')+' → '+(node.sendTo||'');
    case 'updateField': return 'Set '+(node.setField||'')+' = '+(node.setValue||'');
    case 'addTag': return 'Add tag “'+(node.tag||'')+'”';
    case 'removeTag': return 'Remove tag “'+(node.tag||'')+'”';
    case 'webhook': return (node.method||'POST')+' '+(node.url||'');
    case 'createLead': return 'New '+(node.leadStatus||'Lead')+' → '+(node.leadOwner||'owner');
    case 'enrollSms': return 'Enroll in “'+(node.seqName||SEQ_DATA[0].name)+'”';
    case 'enrollEmail': return 'Enroll in “'+(node.seqName||EMAIL_SEQ_DATA[0].name)+'”';
    default: return null;
  }
}

function hashStr(s){let h=0;for(let i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h);}
function nodeStats(seed,i){
  const base=hashStr(seed)+i*7;
  const entered=Math.max(6,120-i*18-(base%8));
  const active=Math.max(2,Math.round(entered*0.18)+(base%4));
  const openPct=55+((base>>2)%30);
  const unsub=base%5;
  const conv=Math.max(40,90-i*9-((base>>3)%10));
  return {entered,active,openPct,unsub,conv};
}

// Walk a flow against a mock contact and produce a flat, indented result trace (for the Test modal)
function simulateFlow(nodes,c,out,depth){
  depth=depth||0;
  for(const n of (nodes||[])){
    if(n.kind==='action'){out.push({label:n.label,detail:actionSummary(n)||'completed',status:'ok',Icon:n.Icon,depth});}
    else if(n.kind==='wait'){out.push({label:'Wait '+n.dur,detail:'flow paused here (simulated)',status:'wait',Icon:I.Clock,depth});}
    else if(n.kind==='waitUntil'){const met=evalRule(c,n);out.push({label:'Wait until '+n.field+' '+n.op+' '+n.value,detail:met?'already true — continue immediately':'would wait up to '+n.timeout,status:met?'ok':'wait',Icon:I.Clock,depth});}
    else if(n.kind==='goal'){const met=evalRule(c,n);out.push({label:'Goal: '+n.field+' '+n.op+' '+n.value,detail:met?'goal met — exit automation':'not met — keep going',status:met?'exit':'skip',Icon:I.Target,depth});if(met)return true;}
    else if(n.kind==='mapFields'){const mapped=(n.rows||[]).filter(r=>r.from&&r.to).length;out.push({label:'Map webhook → '+(n.form||'form'),detail:'mapped '+mapped+' field'+(mapped===1?'':'s')+' · lead created',status:'ok',Icon:I.Plug,depth});}
    else if(n.kind==='condition'){const met=evalRule(c,n);out.push({label:'If '+n.field+' '+n.op+' '+n.value,detail:met?'condition true → Yes path':'condition false → No path',status:met?'yes':'no',Icon:I.GitBranch,depth});const exited=simulateFlow(met?n.yes:n.no,c,out,depth+1);if(exited)return true;}
    else if(n.kind==='branch'){const lane=n.lanes&&n.lanes[0];out.push({label:n.label,detail:lane?('routed to "'+lane.label+'"'):'no paths defined',status:'branch',Icon:I.Filter,depth});if(lane){const exited=simulateFlow(lane.nodes,c,out,depth+1);if(exited)return true;}}
  }
  return false;
}

  const connectMail=React.useCallback((acct)=>setMailAccounts(a=>a.find(x=>x.addr===acct.addr)?a:[...a,acct]),[]);
  const disconnectMail=React.useCallback((addr)=>setMailAccounts(a=>a.filter(x=>x.addr!==addr)),[]);
  const goTo=React.useCallback((p)=>{setPage(p);window.scrollTo&&window.scrollTo(0,0);},[]);
  React.useEffect(()=>{window.__nrturOpenSearch=()=>setSearchOpen(true);window.__nrturOpenCmd=()=>setCmdOpen(true);return()=>{delete window.__nrturOpenSearch;delete window.__nrturOpenCmd;};},[]);
  React.useEffect(()=>{const fn=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setSearchOpen(false);setCmdOpen(true);}};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[]);
  const p={goTo};
  const MARKETING_PAGES=['landing','signup','signin','forgot-password','onboarding-1','onboarding-2','onboarding-3','onboarding-4','onboarding-5'];
  const isApp=!MARKETING_PAGES.includes(page);
  return(
    <BillingContext.Provider value={{billingState,setBillingState}}>
     <MailAccountsContext.Provider value={{accounts:mailAccounts,connect:connectMail,disconnect:disconnectMail}}>
      {page==='landing'           && <LandingPage {...p}/>}
      {page==='signup'            && <SignUpPage {...p}/>}
      {page==='signin'            && <SignInPage {...p}/>}
      {page==='forgot-password'   && <ForgotPasswordPage {...p}/>}
      {page==='onboarding-1'      && <OnboardingPage step={1} {...p}/>}
      {page==='onboarding-2'      && <OnboardingPage step={2} {...p}/>}
      {page==='onboarding-3'      && <OnboardingPage step={3} {...p}/>}
      {page==='onboarding-4'      && <OnboardingPage step={4} {...p}/>}
      {page==='onboarding-5'      && <OnboardingPage step={5} {...p}/>}
      {isApp&&<div className="app-shell" style={{height:'100%'}}>
      {page==='dashboard'         && <DashboardPage {...p}/>}
      {page==='leads'             && <LeadsPage {...p}/>}
      {page==='lead-detail'       && <LeadDetailPage {...p}/>}
      {page==='add-lead'          && <AddLeadPage {...p}/>}
      {page==='edit-lead'         && <EditLeadPage {...p}/>}
      {page==='contacts'          && <ContactsPage {...p}/>}
      {page==='contact-detail'    && <ContactDetailPage {...p}/>}
      {page==='add-contact'       && <AddContactPage {...p}/>}
      {page==='edit-contact'      && <EditContactPage {...p}/>}
      {page==='companies'         && <CompaniesPage {...p}/>}
      {page==='company-detail'    && <CompanyDetailPage {...p}/>}
      {page==='add-company'       && <AddCompanyPage {...p}/>}
      {page==='edit-company'      && <EditCompanyPage {...p}/>}
      {page==='pipeline'          && <PipelinePage {...p}/>}
      {page==='deal-detail'       && <DealDetailPage {...p}/>}
      {page==='add-deal'          && <AddDealPage {...p}/>}
      {page==='calendar'          && <CalendarPage {...p}/>}
      {page==='inbox'             && <InboxPage {...p}/>}
      {page==='automation-builder'&& <AutomationBuilderPage {...p}/>}
      {page==='sms-sequence-builder' && <SequenceBuilderPage channel="sms" {...p}/>}
      {page==='email-sequence-builder' && <SequenceBuilderPage channel="email" {...p}/>}
      {page==='reports'           && <ReportsPage {...p}/>}
      {page==='settings-automations' && <SettingsAutomationsPage {...p}/>}
      {page==='settings-sequences' && <SettingsSequencesPage {...p}/>}
      {page==='settings-forms' && <SettingsFormsPage {...p}/>}
      {page==='form-builder' && <FormBuilderPage {...p}/>}
      {page==='settings-billing'  && <SettingsBillingPage {...p}/>}
      {page==='settings-team'     && <SettingsTeamPage {...p}/>}
      {page==='settings-general'  && <SettingsGeneralPage {...p}/>}
      {page==='settings-integrations' && <SettingsIntegrationsPage {...p}/>}
      {page==='settings-pipeline' && <SettingsPipelinePage {...p}/>}
      {page==='settings-notifications' && <SettingsNotificationsPage {...p}/>}
      {page==='settings-unsubscribes' && <SettingsUnsubscribesPage {...p}/>}
      {page==='settings-privacy'  && <SettingsPrivacyPage {...p}/>}
      {page==='profile'           && <ProfilePage {...p}/>}
      {searchOpen&&<GlobalSearchOverlay close={()=>setSearchOpen(false)} goTo={(pg)=>{goTo(pg);setSearchOpen(false);}}/>}
      {cmdOpen&&<CommandPalette close={()=>setCmdOpen(false)} goTo={(pg)=>{goTo(pg);setCmdOpen(false);}}/>}
      </div>}
      <DevNav goTo={goTo}/>
     </MailAccountsContext.Provider>
    </BillingContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
