function useConfirm(){
  const [cfg,setCfg]=React.useState(null);
  const openConfirm=React.useCallback((opts)=>setCfg(opts),[]);
  const close=React.useCallback(()=>setCfg(null),[]);
  const confirmNode=cfg?(<ConfirmModal {...cfg} onCancel={close} onConfirm={()=>{cfg.onConfirm?.();close();}}/>):null;
  return {confirmNode,openConfirm};
}

function useToast(){
  const [toasts,setToasts]=React.useState([]);
  const addToast=React.useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  return {toasts,addToast};
}

function CommandPalette({close,goTo}){
  const [query,setQuery]=React.useState('');
  const [sel,setSel]=React.useState(0);
  const inputRef=React.useRef(null);
  React.useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),60);},[]);
  const filtered=React.useMemo(()=>query?CMD_ITEMS.filter(x=>x.label.toLowerCase().includes(query.toLowerCase())):CMD_ITEMS,[query]);
  React.useEffect(()=>{setSel(0);},[query]);
  React.useEffect(()=>{
    const fn=(e)=>{if(e.key==='Escape'){close();return;}if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}if(e.key==='Enter'){const item=filtered[sel];if(item){goTo(item.page);close();}}};
    document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);
  },[close,sel,filtered,goTo]);
  const GROUPS=['Navigate','Create','Recent'];
  return(
    <div className="fixed inset-0 z-[150] flex items-start justify-center" style={{background:'rgba(7,7,15,0.85)',backdropFilter:'blur(10px)',paddingTop:100}} onClick={e=>{if(e.target===e.currentTarget)close();}}>

          <span style={{fontFamily:'monospace',fontSize:10,color:'rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:4,padding:'2px 6px'}}>ESC</span>
        </div>
        <div style={{padding:8,maxHeight:340,overflowY:'auto'}}>
          {GROUPS.map(group=>{
            const items=filtered.filter(x=>x.group===group);
            if(!items.length)return null;
            return(
              <React.Fragment key={group}>
                <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.32)',padding:'8px 12px 4px'}}>{group}</div>
                {items.map(item=>{
                  const globalIdx=filtered.indexOf(item);const isSel=globalIdx===sel;

                      style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'9px 12px',borderRadius:8,cursor:'pointer',border:'none',textAlign:'left',fontFamily:'inherit',background:isSel?'rgba(99,102,241,0.12)':'transparent',transition:'background .1s'}}>
                      <div style={{width:28,height:28,borderRadius:7,background:item.accent?'rgba(99,102,241,0.10)':'rgba(255,255,255,0.04)',border:item.accent?'1px solid rgba(99,102,241,0.20)':'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',justifyContent:'center',color:item.accent?'#818cf8':'rgba(255,255,255,0.4)',flexShrink:0}}>
                        {item.group==='Create'&&<I.Plus size={11} stroke={2.5}/>}{item.group==='Navigate'&&<I.ArrowRight size={11} stroke={2}/>}{item.group==='Recent'&&<I.Clock size={11} stroke={2}/>}

                    </button>

function WidgetConfigPopover({def,cfg,onClose,onApply}){

function EmailComposeModal({close,defaultTo=''}){

function MiniSparkA({data,color='#818cf8'}){
  if(!data||data.length===0)return null;
  const W=96,H=28,max=Math.max(...data)||1,step=W/(data.length-1);
  const pts=data.map((v,i)=>`${(i*step).toFixed(1)},${(H-2-(v/max)*(H-4)).toFixed(1)}`).join(' ');
  return(<svg width={W} height={H} className="overflow-visible"><defs><linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.35"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polygon points={`0,${H} ${pts} ${W},${H}`} fill={`url(#sg-${color.replace('#','')})`}/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>);
}
