<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nrtur — app</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body, #root { height: 100%; }
    body { background: var(--surface-950); color: var(--fg-1); margin: 0; overflow: hidden; }
    ::selection { background: rgba(99,102,241,0.35); }
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../_shared/icons.jsx"></script>
  <script type="text/babel" src="../_shared/Logo.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="DashboardView.jsx"></script>
  <script type="text/babel" src="PipelineView.jsx"></script>
  <script type="text/babel" src="ContactsView.jsx"></script>
  <script type="text/babel" src="InboxAutomationsAnalytics.jsx"></script>

  <script type="text/babel">
    function NrturApp() {
      const [view, setView] = React.useState('pipeline');
      const VIEWS = {
        dash:        <DashboardView />,
        pipeline:    <PipelineView />,
        contacts:    <ContactsView />,
        inbox:       <InboxView />,
        automations: <AutomationsView />,
        analytics:   <AnalyticsView />,
      };

      return (
        <div data-screen-label={`App · ${view}`} style={{ height: '100%', display: 'flex', background: 'var(--surface-925)' }}>
          <AppSidebar active={view} onChange={setView} />
          <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
            {VIEWS[view]}
            {/* Status bar */}
            <div style={{
              background: 'var(--surface-950)', borderTop: '1px solid var(--border-4)',
              padding: '8px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              flexShrink: 0,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span className="glow-pulse" style={{ width: 6, height: 6, borderRadius: 9999, background: '#34d399' }}/>
                <span style={{ fontSize: 11, color: 'var(--fg-7)' }}>All systems operational</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ fontSize: 11, color: 'var(--fg-8)' }}>3 team members online</span>
                <div style={{ display: 'flex' }}>
                  {['#3b82f6','#8b5cf6','#10b981'].map((c, i) => (
                    <div key={i} style={{
                      width: 16, height: 16, borderRadius: 9999, background: c,
                      border: '2px solid var(--surface-950)',
                      marginLeft: i === 0 ? 0 : -6,
                    }}/>
                  ))}
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<NrturApp />);
  </script>
</body>
</html>
