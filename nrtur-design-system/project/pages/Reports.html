<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',
              400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',
              800:'#3730a3',900:'#312e81',
            },
            surface: { 950:'#07070f', 925:'#09091a', 900:'#0b0b18', 850:'#0d0d1a' },
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: {
            'brand':    '0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg': '0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: 0, transform: 'translateY(8px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            glowPulse: { '0%,100%': { opacity: 0.5 }, '50%': { opacity: 1 } },
          },
          animation: { 'fade-up': 'fadeUp 400ms ease-out both', 'glow-pulse': 'glowPulse 3s ease-in-out infinite' },
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #09091a; color: #fff; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    ::selection { background: rgba(99,102,241,0.35); }
    .scroll-area::-webkit-scrollbar { width: 6px; height: 8px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.30); border-radius: 9999px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ---------- Icons ----------
    const Ico = ({ d, size = 16, stroke = 2, className = '', fill }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const I = {
      LayoutDash:  (p)=> <Ico {...p} d={<><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>}/>,
      Users:       (p)=> <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
      GitBranch:   (p)=> <Ico {...p} d={<><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>}/>,
      Mail:        (p)=> <Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
      Zap:         (p)=> <Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>,
      BarChart:    (p)=> <Ico {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>}/>,
      Settings:    (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>,
      TrendUp:     (p)=> <Ico {...p} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>}/>,
      TrendDown:   (p)=> <Ico {...p} d={<><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>}/>,
      Calendar:    (p)=> <Ico {...p} d={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8"  x2="8"  y1="2" y2="6"/><line x1="3"  x2="21" y1="10" y2="10"/></>}/>,
      ChevronDown: (p)=> <Ico {...p} d={<polyline points="6 9 12 15 18 9"/>}/>,
      Download:    (p)=> <Ico {...p} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>}/>,
      Dollar:      (p)=> <Ico {...p} d={<><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>}/>,
      Target:      (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>}/>,
      Clock:       (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>,
      Search:      (p)=> <Ico {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>}/>,
      More:        (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>}/>,
      ArrowRight:  (p)=> <Ico {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>}/>,
      MessageSq:   (p)=> <Ico {...p} d={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>}/>,
      Phone:       (p)=> <Ico {...p} d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>}/>,
      Zap:         (p)=> <Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>,
      Users2:      (p)=> <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
      Shield:      (p)=> <Ico {...p} d={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>}/>,
      CreditCard:  (p)=> <Ico {...p} d={<><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></>}/>,
      Check:       (p)=> <Ico {...p} d={<polyline points="20 6 9 17 4 12"/>}/>,
      Info:        (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>}/>,
    };

    // ---------- Sidebar ----------
    function Sidebar({ active = 'reports' }) {
      const items = [
        { key:'dash',        Icon: I.LayoutDash, label: 'Dashboard' },
        { key:'contacts',    Icon: I.Users,      label: 'Contacts' },
        { key:'pipeline',    Icon: I.GitBranch,  label: 'Pipeline' },
        { key:'email',       Icon: I.Mail,       label: 'Email' },
        { key:'automations', Icon: I.Zap,        label: 'Automations' },
        { key:'reports',     Icon: I.BarChart,   label: 'Reports' },
      ];
      return (
        <aside className="w-14 shrink-0 flex flex-col items-center py-5 gap-1.5 border-r border-white/[0.05]" style={{ background:'#07070f' }}>
          <a href="#" className="mb-4" title="nrtur">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-brand"
                 style={{ background: 'linear-gradient(135deg, #6366f1, #7c3aed)' }}>
              <span className="text-white font-black text-sm leading-none">n</span>
            </div>
          </a>
          {items.map(({ key, Icon, label }) => {
            const a = active === key;
            return (
              <button key={key} title={label}
                className={[
                  'w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150',
                  a
                    ? 'bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/25 shadow-[0_0_18px_rgba(99,102,241,0.35)]'
                    : 'text-white/30 hover:text-white/70 hover:bg-white/[0.04]'
                ].join(' ')}>
                <Icon size={16}/>
              </button>
            );
          })}
          <div className="mt-auto flex flex-col items-center gap-3">
            <button title="Settings" className="w-9 h-9 rounded-xl flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/[0.04] transition-all">
              <I.Settings size={16}/>
            </button>
            <button title="Alex Morgan" className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ring-1 ring-white/[0.06] hover:ring-white/20 transition-all" style={{ background:'#3b82f6' }}>
              AM
            </button>
          </div>
        </aside>
      );
    }

    // ---------- Topbar ----------
    function ReportsTopbar() {
      const [open, setOpen] = React.useState(false);
      const [range, setRange] = React.useState('Last 30 days');
      const ranges = ['Last 7 days', 'Last 30 days', 'Last 90 days', 'This quarter', 'Year to date', 'Custom…'];
      const ref = React.useRef(null);
      React.useEffect(() => {
        const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', fn);
        return () => document.removeEventListener('mousedown', fn);
      }, []);

      return (
        <header className="shrink-0 border-b border-white/[0.05] px-7 py-4 flex items-center justify-between gap-6" style={{ background:'#09091a' }}>
          <div className="min-w-0">
            <h1 className="text-white text-[22px] font-bold tracking-tight leading-tight">Reports</h1>
            <p className="text-white/50 text-[13px] mt-1">Track revenue, win rate, and team performance.</p>
          </div>
          <div className="flex items-center gap-2.5">
            <div ref={ref} className="relative">
              <button onClick={() => setOpen(!open)}
                className={[
                  'inline-flex items-center gap-2 px-3 py-2 rounded-xl text-[13px] font-medium',
                  'bg-white/[0.04] hover:bg-white/[0.07] border transition-all',
                  open ? 'border-brand-500/40 shadow-[0_0_0_3px_rgba(99,102,241,0.12)] text-white' : 'border-white/[0.08] hover:border-white/[0.18] text-white/70 hover:text-white'
                ].join(' ')}>
                <I.Calendar size={13}/>
                <span>{range}</span>
                <I.ChevronDown size={12} stroke={2.2} className={'transition-transform ' + (open ? 'rotate-180' : '')}/>
              </button>
              {open && (
                <div className="absolute right-0 mt-2 w-56 z-20 rounded-xl backdrop-blur-xl border border-white/[0.08] shadow-[0_24px_80px_rgba(0,0,0,0.6)] overflow-hidden"
                     style={{ background: 'rgba(15,15,28,0.94)' }}>
                  <div className="p-1.5">
                    {ranges.map(r => (
                      <button key={r} onClick={() => { setRange(r); setOpen(false); }}
                        className={[
                          'w-full text-left px-3 py-2 rounded-lg text-[13px] flex items-center justify-between transition-colors',
                          r === range ? 'bg-brand-500/15 text-brand-200' : 'text-white/70 hover:bg-white/[0.05] hover:text-white'
                        ].join(' ')}>
                        {r}
                        {r === range && <span className="w-1.5 h-1.5 rounded-full bg-brand-400"/>}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <button className="inline-flex items-center gap-2 px-3 py-2 rounded-xl text-[13px] font-medium text-white/70 hover:text-white bg-white/[0.04] hover:bg-white/[0.07] border border-white/[0.08] hover:border-white/[0.18] transition-all">
              <I.Download size={13}/> Export CSV
            </button>
          </div>
        </header>
      );
    }

    // ---------- KPI card ----------
    function KPICard({ label, value, delta, deltaTone = 'green', sub, accent, idx }) {
      const up = deltaTone === 'green';
      return (
        <div className="rounded-2xl p-5 backdrop-blur-md bg-white/[0.03] border border-white/[0.06] hover:border-white/[0.10] transition-all duration-300 animate-fade-up"
             style={{ animationDelay: `${idx * 50}ms` }}>
          <div className="flex items-start justify-between mb-3">
            <p className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em]">{label}</p>
            {accent}
          </div>
          <div className="flex items-end justify-between gap-3 mb-2">
            <p className="text-[34px] font-black text-white leading-none tracking-tight tabular-nums">{value}</p>
            {delta && (
              <span className={[
                'inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full',
                up ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'
              ].join(' ')}>
                {up ? <I.TrendUp size={10} stroke={2.6}/> : <I.TrendDown size={10} stroke={2.6}/>}
                {delta}
              </span>
            )}
          </div>
          <p className="text-[12px] text-white/45">{sub}</p>
        </div>
      );
    }

    // ---------- Revenue over time (stacked bars) ----------
    function RevenueChart() {
      const data = [
        { m: 'Jan', won: 62, forecast: 18 },
        { m: 'Feb', won: 48, forecast: 22 },
        { m: 'Mar', won: 76, forecast: 28 },
        { m: 'Apr', won: 92, forecast: 32 },
        { m: 'May', won: 84, forecast: 26 },
        { m: 'Jun', won: 100, forecast: 38 },
      ];
      const max = 140;
      const W = 520, H = 220;
      const padL = 40, padR = 10, padT = 12, padB = 28;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;
      const barGap = 12;
      const barW = (innerW - barGap * (data.length - 1)) / data.length;
      const [hover, setHover] = React.useState(null);

      const ys = [0, 35, 70, 105, 140];

      return (
        <div className="rounded-2xl bg-white/[0.03] border border-white/[0.06] p-5 backdrop-blur-md h-full flex flex-col animate-fade-up">
          <div className="flex items-start justify-between mb-1">
            <div>
              <p className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em]">Revenue Over Time</p>
              <p className="text-white text-[20px] font-bold mt-1 tabular-nums">$605k <span className="text-emerald-400 text-[13px] font-semibold ml-1.5">+38%</span></p>
              <p className="text-[12px] text-white/45">Closed won + open pipeline · 6 months</p>
            </div>
            <div className="flex items-center gap-3 text-[11px]">
              <span className="inline-flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{ background: 'linear-gradient(180deg, #818cf8, #4f46e5)' }}/><span className="text-white/65">Closed won</span></span>
              <span className="inline-flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{ background: 'rgba(99,102,241,0.25)', boxShadow:'inset 0 0 0 1px rgba(99,102,241,0.4)' }}/><span className="text-white/65">Forecast</span></span>
            </div>
          </div>

          <div className="flex-1 min-h-0 mt-4">
            <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
              <defs>
                <linearGradient id="bar-won" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stopColor="#a5b4fc"/>
                  <stop offset="100%" stopColor="#4f46e5"/>
                </linearGradient>
                <pattern id="bar-forecast" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
                  <rect width="6" height="6" fill="rgba(99,102,241,0.18)"/>
                  <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(99,102,241,0.55)" strokeWidth="1.2"/>
                </pattern>
              </defs>

              {/* gridlines + y labels */}
              {ys.map((y, i) => {
                const cy = padT + innerH - (y / max) * innerH;
                return (
                  <g key={y}>
                    <line x1={padL} x2={W - padR} y1={cy} y2={cy} stroke="rgba(255,255,255,0.05)"/>
                    <text x={padL - 8} y={cy + 3} fontSize="9" fill="rgba(255,255,255,0.35)" textAnchor="end" fontFamily="ui-monospace, monospace">
                      ${y}k
                    </text>
                  </g>
                );
              })}

              {data.map((d, i) => {
                const x = padL + i * (barW + barGap);
                const totalH = ((d.won + d.forecast) / max) * innerH;
                const wonH = (d.won / max) * innerH;
                const fcH = (d.forecast / max) * innerH;
                const yWon = padT + innerH - wonH;
                const yFc  = padT + innerH - wonH - fcH;
                const isHover = hover === i;
                return (
                  <g key={d.m} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: 'pointer' }}>
                    {/* invisible hover hitbox */}
                    <rect x={x - 2} y={padT} width={barW + 4} height={innerH} fill="transparent"/>
                    {/* forecast (top) */}
                    <rect x={x} y={yFc} width={barW} height={fcH}
                          fill="url(#bar-forecast)"
                          stroke="rgba(99,102,241,0.4)" strokeWidth="0.75"
                          rx="3" ry="3"
                          opacity={isHover ? 1 : 0.85}/>
                    {/* won (bottom) */}
                    <rect x={x} y={yWon} width={barW} height={wonH}
                          fill="url(#bar-won)" rx="3" ry="3"
                          style={{
                            filter: isHover ? 'drop-shadow(0 0 12px rgba(99,102,241,0.55))' : 'none',
                            transition: 'filter 150ms ease',
                          }}/>
                    <text x={x + barW/2} y={H - 8} fontSize="11" fill={isHover ? '#a5b4fc' : 'rgba(255,255,255,0.50)'} textAnchor="middle" fontWeight="500">
                      {d.m}
                    </text>
                    {isHover && (
                      <g>
                        <rect x={x + barW/2 - 50} y={yFc - 38} width="100" height="32" rx="7" fill="rgba(15,15,28,0.96)" stroke="rgba(255,255,255,0.08)"/>
                        <text x={x + barW/2} y={yFc - 22} fontSize="11" fontWeight="700" fill="#fff" textAnchor="middle">${d.won}k won</text>
                        <text x={x + barW/2} y={yFc - 10} fontSize="10" fill="rgba(255,255,255,0.55)" textAnchor="middle">+ ${d.forecast}k forecast</text>
                      </g>
                    )}
                  </g>
                );
              })}
            </svg>
          </div>
        </div>
      );
    }

    // ---------- Pipeline by stage (horizontal bars) ----------
    function PipelineByStage() {
      const stages = [
        { name:'Prospecting', count: 8,  value: '$42k',  fill: 35, color: '#94a3b8' },
        { name:'Qualified',   count: 5,  value: '$81k',  fill: 60, color: '#818cf8' },
        { name:'Proposal',    count: 4,  value: '$67k',  fill: 50, color: '#a78bfa' },
        { name:'Negotiation', count: 3,  value: '$58k',  fill: 43, color: '#fbbf24' },
        { name:'Won',         count: 11, value: '$134k', fill: 100,color: '#34d399' },
      ];
      return (
        <div className="rounded-2xl bg-white/[0.03] border border-white/[0.06] p-5 backdrop-blur-md h-full flex flex-col animate-fade-up">
          <div className="mb-1">
            <p className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em]">Pipeline by Stage</p>
            <p className="text-white text-[16px] font-bold mt-1 tabular-nums">31 deals · $382k</p>
          </div>
          <div className="flex flex-col gap-3.5 mt-5 flex-1">
            {stages.map(s => (
              <div key={s.name} className="group cursor-pointer">

    // ---------- Contact growth area chart ----------
    function ContactGrowth() {
      const data = [42, 51, 58, 64, 72, 79, 88, 97, 104, 115, 128, 138];
      const labels = ['J','F','M','A','M','J','J','A','S','O','N','D'];
      const max = Math.max(...data);
      const W = 320, H = 200;
      const padL = 30, padR = 8, padT = 12, padB = 24;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;
      const step = innerW / (data.length - 1);
      const pts = data.map((v, i) => {
        const x = padL + i * step;
        const y = padT + innerH - (v / max) * innerH;
        return [x, y];
      });

      // Smooth curve via Catmull-Rom → bezier
      let path = `M ${pts[0][0]} ${pts[0][1]}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
        const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
        const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
        const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
        path += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2[0]} ${p2[1]}`;
      }
      const area = `${path} L ${pts[pts.length-1][0]} ${padT+innerH} L ${pts[0][0]} ${padT+innerH} Z`;

      return (
        <div className="rounded-2xl bg-white/[0.03] border border-white/[0.06] p-5 backdrop-blur-md h-full flex flex-col animate-fade-up">
          <div className="flex items-start justify-between mb-1">
            <div>
              <p className="text-[11px] font-semibold text-white/45 uppercase tracking-[0.14em]">Contact Growth</p>
              <p className="text-white text-[20px] font-bold mt-1 tabular-nums">+1,284 <span className="text-emerald-400 text-[13px] font-semibold ml-1.5">+22%</span></p>
              <p className="text-[12px] text-white/45">Cumulative · last 12 months</p>
            </div>
          </div>
          <div className="flex-1 min-h-0 mt-3">
            <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: '100%' }}>
              <defs>
                <linearGradient id="contact-area" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stopColor="#818cf8" stopOpacity="0.45"/>
                  <stop offset="100%" stopColor="#818cf8" stopOpacity="0"/>
                </linearGradient>
              </defs>
              {/* gridlines */}
              {[0,1,2,3].map(i => {
                const y = padT + (innerH/3) * i;
                return <line key={i} x1={padL} x2={W-padR} y1={y} y2={y} stroke="rgba(255,255,255,0.05)"/>;
              })}
              {/* y labels */}
              {[max, Math.round(max*2/3), Math.round(max/3), 0].map((v, i) => (
                <text key={i} x={padL - 6} y={padT + (innerH/3) * i + 3} fontSize="9" fill="rgba(255,255,255,0.35)" textAnchor="end" fontFamily="ui-monospace, monospace">{v}</text>
              ))}

              <path d={area} fill="url(#contact-area)"/>
              <path d={path} fill="none" stroke="#a5b4fc" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"
                    style={{ filter: 'drop-shadow(0 0 8px rgba(165,180,252,0.5))' }}/>
              {/* last point dot */}
              <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill="#818cf8" stroke="#0c0c1a" strokeWidth="2"/>
              <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="9" fill="rgba(99,102,241,0.18)"/>

              {/* x labels */}
              {labels.map((l, i) => (
                <text key={i} x={padL + i * step} y={H - 6} fontSize="9" fill="rgba(255,255,255,0.35)" textAnchor="middle">{l}</text>
              ))}
            </svg>
          </div>
        </div>
      );
    }

            <div className="absolute rounded-full" style={{ width:600, height:600, background:'rgba(99,102,241,0.08)', filter:'blur(140px)', top:-260, right:-160 }}/>
            <div className="absolute rounded-full" style={{ width:480, height:480, background:'rgba(124,58,237,0.07)', filter:'blur(140px)', bottom:-200, left:200 }}/>
          </div>

          <div className="relative z-10 flex w-full h-full">
            <Sidebar active="reports"/>

            <div className="flex-1 flex flex-col min-w-0">
              <ReportsTopbar/>

              {/* Tab bar */}
              <div className="shrink-0 border-b border-white/[0.05] px-7 flex items-center gap-1" style={{ background:'#09091a' }}>
                {TABS.map(t => (
                  <button key={t.key} onClick={()=>setTab(t.key)}
                    className={['px-4 py-3 text-[13px] font-medium border-b-2 transition-all -mb-px',
                      tab===t.key?'border-brand-400 text-white':'border-transparent text-white/45 hover:text-white/75'].join(' ')}>
                    {t.label}
                  </button>
                ))}
              </div>

              <div className="flex-1 overflow-y-auto scroll-area">
                {tab==='usage' ? <UsageTab/> : (
                <div className="px-7 py-6 max-w-[1480px] mx-auto flex flex-col gap-5">

                  {/* Row 1 — KPIs */}
                  <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                    <KPICard idx={0}
                      label="Revenue Won" value="$134k" delta="+31%" deltaTone="green"
                      sub="vs $102k last month"
                      accent={<div className="w-9 h-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 flex items-center justify-center"><I.Dollar size={14}/></div>}
                    />
                    <KPICard idx={1}
                      label="Total Deals" value="107" delta="+18%" deltaTone="green"
                      sub="16 more closed than last month"
                      accent={<div className="w-9 h-9 rounded-xl bg-brand-500/10 border border-brand-500/20 text-brand-300 flex items-center justify-center"><I.GitBranch size={14}/></div>}
                    />
                    <KPICard idx={2}
                      label="Win Rate" value="68%" delta="-2%" deltaTone="red"
                      sub="Dropped 2pts vs last month"
                      accent={<div className="w-9 h-9 rounded-xl bg-amber-500/10 border border-amber-500/20 text-amber-300 flex items-center justify-center"><I.Target size={14}/></div>}
                    />
                    <KPICard idx={3}
                      label="Avg Deal Cycle" value="14d" delta="-3d" deltaTone="green"
                      sub="Faster by 3 days · target 12d"
                      accent={<div className="w-9 h-9 rounded-xl bg-violet-500/10 border border-violet-500/20 text-violet-300 flex items-center justify-center"><I.Clock size={14}/></div>}
                    />
                  </section>

                  {/* Row 2 */}
                  {(tab==='overview'||tab==='activity') && (
                  <section className="grid grid-cols-1 lg:grid-cols-[1.85fr_1fr] gap-5">
                    <div style={{ minHeight: 360 }}><RevenueChart/></div>
                    <div style={{ minHeight: 360 }}><PipelineByStage/></div>
                  </section>
                  )}

                  {/* Row 3 */}
                  <section className="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] gap-5">
                    <div style={{ minHeight: 360 }}><TeamActivity/></div>
                    <div style={{ minHeight: 360 }}><ContactGrowth/></div>
                  </section>

                  {/* Row 4 */}
                  {(tab==='overview'||tab==='activity') && <TopDealsTable/>}

                </div>
                )}
              </div>

              <div className="shrink-0 border-t border-white/[0.05] px-7 py-2 flex items-center justify-between" style={{ background:'#07070f' }}>
                <div className="flex items-center gap-2">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-glow-pulse"/>
                  <span className="text-[11px] text-white/40">All systems operational</span>
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-[11px] text-white/30">Data refreshed 2 minutes ago</span>
                  <div className="w-px h-3 bg-white/[0.06]"/>
                  <span className="text-[11px] text-white/30">3 team members online</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ReportsPage />);
  </script>
</body>
</html>
