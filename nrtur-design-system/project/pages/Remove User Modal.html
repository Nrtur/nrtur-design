<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remove User — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{brand:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81'},surface:{950:'#07070f',925:'#09091a',900:'#0b0b18'}},fontFamily:{sans:['Inter','system-ui','sans-serif']},boxShadow:{'brand':'0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)'},keyframes:{modalIn:{'0%':{opacity:0,transform:'translateY(10px) scale(0.985)'},'100%':{opacity:1,transform:'none'}},overlayIn:{'0%':{opacity:0},'100%':{opacity:1}}},animation:{'modal-in':'modalIn 250ms cubic-bezier(0.16,1,0.3,1) both','overlay-in':'overlayIn 200ms ease-out both'}}}}
  </script>
  <style>
    html,body,#root{height:100%;}
    body{margin:0;background:#09091a;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
    ::selection{background:rgba(99,102,241,0.35);}
    .scroll-area::-webkit-scrollbar{width:5px;}
    .scroll-area::-webkit-scrollbar-track{background:transparent;}
    .scroll-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.28);border-radius:9999px;}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body><div id="root"></div>
<script type="text/babel">
  const Ico=({d,size=16,stroke=2,className='',fill})=>(
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
  );
  const I={
    X:p=><Ico {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>}/>,
    Check:p=><Ico {...p} d={<polyline points="20 6 9 17 4 12"/>}/>,
    AlertTriangle:p=><Ico {...p} d={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>}/>,
    UserMinus:p=><Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/></>}/>,
    UserPlus:p=><Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></>}/>,
    ChevronDown:p=><Ico {...p} d={<polyline points="6 9 12 15 18 9"/>}/>,
    ChevronRight:p=><Ico {...p} d={<polyline points="9 18 15 12 9 6"/>}/>,
    Users:p=><Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
    GitBranch:p=><Ico {...p} d={<><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>}/>,
    Mail:p=><Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
    Key:p=><Ico {...p} d={<><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></>}/>,
    LayoutDash:p=><Ico {...p} d={<><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>}/>,
    Zap:p=><Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>,
    BarChart:p=><Ico {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>}/>,
    Settings:p=><Ico {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>,
    Plug:p=><Ico {...p} d={<><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></>}/>,
    Bell:p=><Ico {...p} d={<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>}/>,
    Shield:p=><Ico {...p} d={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>}/>,
    Billing:p=><Ico {...p} d={<><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></>}/>,
    MoreH:p=><Ico {...p} d={<><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>}/>,
  };

  const TEAM_MEMBERS = [
    {key:'AM', name:'Alex Morgan',  avatar:'AM', color:'#3b82f6', role:'Admin', email:'alex@bloom.co',   joined:'Jan 2025', deals:12, contacts:203, isYou:true},
    {key:'SC', name:'Sarah Chen',   avatar:'SC', color:'#8b5cf6', role:'Sales', email:'sarah@bloom.co',  joined:'Feb 2025', deals:8,  contacts:142},
    {key:'JK', name:'Jamie Kim',    avatar:'JK', color:'#10b981', role:'Sales', email:'jamie@bloom.co',  joined:'Apr 2025', deals:6,  contacts:98},
    {key:'RL', name:'Ravi Lee',     avatar:'RL', color:'#f59e0b', role:'Sales', email:'ravi@bloom.co',   joined:'May 2025', deals:5,  contacts:74},
    {key:'MR', name:'Marcus Rios',  avatar:'MR', color:'#ec4899', role:'BDR',   email:'marcus@bloom.co', joined:'Mar 2025', deals:4,  contacts:87},
  ];

  function AppSidebar() {
    const items=[
      {key:'dash',Icon:I.LayoutDash},{key:'contacts',Icon:I.Users},{key:'pipeline',Icon:I.GitBranch},
      {key:'email',Icon:I.Mail},{key:'automations',Icon:I.Zap},{key:'reports',Icon:I.BarChart},
    ];
    return (
      <aside className="w-14 shrink-0 flex flex-col items-center py-5 gap-1.5 border-r border-white/[0.05]" style={{background:'#07070f'}}>
        <a href="#" className="mb-4">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-[0_0_0_1px_rgba(99,102,241,0.30),0_4px_60px_rgba(99,102,241,0.15)]"
               style={{background:'linear-gradient(135deg,#6366f1,#7c3aed)'}}>
            <span className="text-white font-black text-sm leading-none">n</span>
          </div>
        </a>
        {items.map(({key,Icon})=>(
          <button key={key} className="w-9 h-9 rounded-xl flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/[0.04] transition-all">
            <Icon size={16}/>
          </button>
        ))}
        <div className="mt-auto flex flex-col items-center gap-3">
          <button className="w-9 h-9 rounded-xl bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/25 flex items-center justify-center">
            <I.Settings size={16}/>
          </button>
          <button className="w-8 h-8 rounded-full text-white text-xs font-bold ring-1 ring-white/[0.06]" style={{background:'#3b82f6'}}>AM</button>
        </div>
      </aside>
    );
  }

  function SettingsNav() {
    const items=[
      {key:'general',  label:'General',         Icon:I.Settings,  href:'#'},
      {key:'team',     label:'Team',             Icon:I.Users,     href:'Remove User Modal.html'},
      {key:'integrations',label:'Integrations',  Icon:I.Plug,      href:'Settings Integrations.html'},
      {key:'notifications',label:'Notifications',Icon:I.Bell,      href:'Settings Notifications.html'},
      {key:'privacy',  label:'Data & Privacy',   Icon:I.Shield,    href:'Settings Privacy.html'},
      {key:'pipeline', label:'Pipeline stages',  Icon:I.GitBranch, href:'Settings Pipeline.html'},
      {key:'billing',  label:'Billing',          Icon:I.Billing,   href:'#'},
      {key:'unsub',    label:'Unsubscribes',      Icon:I.UserMinus, href:'Settings Unsubscribes.html'},
    ];
    return (
      <aside className="w-[210px] shrink-0 border-r border-white/[0.05] flex flex-col py-5 gap-0.5 px-3" style={{background:'#09091a'}}>
        <p className="text-[10px] font-bold uppercase tracking-[0.14em] text-white/35 px-3 mb-3">Settings</p>
        {items.map(({key,label,Icon,href})=>{
          const a=key==='team';
          return (
            <a key={key} href={href}
               className={['flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] transition-all',
                 a?'bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25 font-semibold'
                  :'text-white/55 hover:text-white hover:bg-white/[0.04] font-medium'].join(' ')}>
              <Icon size={14}/>{label}
              {a&&<I.ChevronRight size={11} className="ml-auto text-brand-300/60"/>}
            </a>
          );
        })}
      </aside>
    );
  }

  // Team page background mock
  function TeamBg() { return null; }

  function RemoveModal({user, onClose}) {
    const [reassignTo, setReassignTo] = React.useState('');
    const [reassignOpen, setReassignOpen] = React.useState(false);
    const [removing, setRemoving] = React.useState(false);
    const [done, setDone] = React.useState(false);
    const others = TEAM_MEMBERS.filter(t => t.key !== user.key);
    React.useEffect(()=>{ setReassignTo(others[0]?.key||''); },[user.key]);
    const sel = TEAM_MEMBERS.find(t=>t.key===reassignTo) || others[0];

    React.useEffect(()=>{
      const h=(e)=>{if(e.key==='Escape'&&!done)onClose();};
      window.addEventListener('keydown',h);
      return()=>window.removeEventListener('keydown',h);
    },[onClose,done]);

    function doRemove() {
      setRemoving(true);
      setTimeout(()=>{setRemoving(false);setDone(true);},1200);
    }

    if (done) return (
      <div className="fixed inset-0 z-50 flex items-center justify-center animate-overlay-in" style={{background:'rgba(7,7,15,0.72)',backdropFilter:'blur(8px)'}}>
        <div onClick={onClose} className="absolute inset-0"/>
        <div className="relative animate-modal-in rounded-2xl border border-emerald-500/20 bg-[#080f0e] p-7 max-w-sm w-full mx-6 text-center shadow-[0_24px_80px_rgba(0,0,0,0.7)]">
          <div className="w-11 h-11 rounded-2xl bg-emerald-500/15 ring-1 ring-emerald-500/30 text-emerald-300 flex items-center justify-center mx-auto mb-4"><I.Check size={18}/></div>
          <p className="text-[16px] font-bold text-white">{user.name} removed.</p>
          <p className="text-[12.5px] text-white/55 mt-2 leading-relaxed">Their access has been revoked. {sel.name} now owns their deals and contacts.</p>
          <button onClick={onClose} className="mt-5 px-4 py-2 rounded-lg text-[12.5px] font-medium text-white/65 hover:text-white hover:bg-white/[0.05] transition-colors">Done</button>
        </div>
      </div>
    );

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center px-6 animate-overlay-in" style={{background:'rgba(7,7,15,0.72)',backdropFilter:'blur(8px)'}}>
        <div onClick={onClose} className="absolute inset-0"/>
        <div className="relative animate-modal-in w-full max-w-[480px] rounded-2xl border border-red-500/20 shadow-[0_24px_100px_rgba(0,0,0,0.7)] overflow-hidden" style={{background:'#100808'}}>
          {/* Header */}
          <div className="flex items-start justify-between px-5 py-4 border-b border-red-500/[0.12]">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-red-500/15 ring-1 ring-red-500/25 text-red-300 flex items-center justify-center shrink-0"><I.UserMinus size={14}/></div>
              <div>
                <p className="text-[14px] font-bold text-white">Remove team member</p>
                <p className="text-[11px] text-white/40">This cannot be undone without re-inviting them.</p>
              </div>
            </div>
            <button onClick={onClose} className="w-7 h-7 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-colors shrink-0"><I.X size={13}/></button>
          </div>

          {/* Body */}
          <div className="p-5 flex flex-col gap-4">
            {/* User being removed */}
            <div className="flex items-center gap-3 p-3.5 rounded-xl border border-red-500/15 bg-red-500/[0.04]">
              <div className="w-10 h-10 rounded-full flex items-center justify-center text-[13px] font-bold text-white" style={{background:user.color}}>{user.avatar}</div>
              <div>
                <p className="text-[13.5px] font-bold text-white">{user.name}</p>
                <p className="text-[11.5px] text-white/45">{user.role} · {user.email}</p>
              </div>
            </div>

            {/* What happens */}
            <div className="flex flex-col gap-2">
              <p className="text-[11px] font-semibold text-white/45 uppercase tracking-wider">What happens</p>
              {[
                {Icon:I.Key,      text:'Login access revoked immediately',          note:'They will be signed out of all sessions'},
                {Icon:I.GitBranch,text:`${user.deals||8} open deals will be reassigned`, note:'Pick a new owner below'},
                {Icon:I.Users,    text:`${user.contacts||142} contacts will be reassigned`, note:'Assigned to the same owner as their deals'},
                {Icon:I.Mail,     text:'Email sync disconnected',                  note:'Their connected mailboxes will be removed'},
              ].map((item,i)=>(
                <div key={i} className="flex items-start gap-2.5 text-[12px]">
                  <div className="w-5 h-5 rounded-md bg-white/[0.04] flex items-center justify-center mt-0.5 shrink-0 text-white/40"><item.Icon size={11}/></div>
                  <div>
                    <span className="text-white/80">{item.text}</span>
                    {item.note && <p className="text-[10.5px] text-white/35 mt-0.5">{item.note}</p>}
                  </div>
                </div>
              ))}
            </div>

            {/* Reassign to */}
            <div>
              <label className="block text-[11px] font-semibold text-white/50 uppercase tracking-wider mb-2">Reassign deals & contacts to</label>
              <div className="relative">
                <button onClick={()=>setReassignOpen(o=>!o)}
                  className="w-full flex items-center gap-2.5 px-3.5 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.08] hover:border-white/[0.14] transition-all text-left">
                  <span className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background:sel.color}}>{sel.key}</span>
                  <span className="flex-1 text-[13px] text-white">{sel.name}</span>
                  <span className="text-[11px] text-white/35">{sel.role}</span>
                  <I.ChevronDown size={12} className="text-white/40"/>
                </button>
                {reassignOpen && (
                  <div className="absolute left-0 right-0 top-full mt-1.5 rounded-xl border border-white/[0.10] shadow-[0_16px_40px_rgba(0,0,0,0.55)] overflow-hidden z-20" style={{background:'#0d0d1f'}}>
                    {others.map(t=>(
                      <button key={t.key} onClick={()=>{setReassignTo(t.key);setReassignOpen(false);}}
                        className="w-full flex items-center gap-2.5 px-3.5 py-2.5 hover:bg-white/[0.04] transition-colors">
                        <span className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{background:t.color}}>{t.key}</span>
                        <span className="flex-1 text-[13px] text-white text-left">{t.name}</span>
                        <span className="text-[11px] text-white/35">{t.role}</span>
                        {reassignTo===t.key && <I.Check size={11} className="text-brand-300"/>}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Footer */}
          <div className="px-5 pb-5 flex items-center justify-between gap-3">
            <button onClick={onClose} className="px-4 py-2 rounded-lg text-[12.5px] font-medium text-white/65 hover:text-white hover:bg-white/[0.05] transition-colors">Cancel</button>
            <button onClick={doRemove} disabled={removing}
              className={['inline-flex items-center gap-2 px-4 py-2 rounded-lg text-[12.5px] font-semibold transition-all',
                removing?'bg-red-500/40 text-white/60 cursor-wait':'bg-red-500 hover:bg-red-400 text-white shadow-[0_0_0_1px_rgba(239,68,68,0.4),0_4px_20px_rgba(239,68,68,0.2)]'].join(' ')}>
              {removing?<><svg className="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10" strokeOpacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/></svg>Removing…</>
                       :<><I.UserMinus size={13}/>Remove {user.name.split(' ')[0]}</>}
            </button>
          </div>
        </div>
      </div>
    );
  }

  function Page() {
    const [modalUser, setModalUser] = React.useState(null);

    return (
      <div data-screen-label="Settings Team" className="h-full flex" style={{background:'#09091a'}}>
        <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
          <div className="absolute rounded-full" style={{width:500,height:500,background:'rgba(99,102,241,0.055)',filter:'blur(140px)',top:-200,right:-100}}/>
        </div>

        <div className="relative z-10 flex w-full h-full">
          <AppSidebar/>
          <SettingsNav/>

          <div className="flex-1 flex flex-col min-w-0">
            <header className="shrink-0 border-b border-white/[0.05] px-8 py-4 flex items-center justify-between" style={{background:'#09091a'}}>
              <div>
                <h1 className="text-[18px] font-bold text-white">Team</h1>
                <p className="text-[12.5px] text-white/45 mt-0.5">{TEAM_MEMBERS.length} members · Bloom Creative workspace</p>
              </div>
              <button className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-[0_0_0_1px_rgba(99,102,241,0.30),0_4px_60px_rgba(99,102,241,0.15)] hover:-translate-y-0.5 active:translate-y-0 transition-all">
                <I.UserPlus size={14}/> Invite member
              </button>
            </header>

            <div className="flex-1 overflow-y-auto scroll-area px-8 py-6 max-w-[900px]">
              <div className="rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden mb-4">
                {TEAM_MEMBERS.map((m, i) => (
                  <div key={m.key}
                       className={['flex items-center gap-4 px-5 py-4 transition-colors hover:bg-white/[0.015]',
                         i < TEAM_MEMBERS.length - 1 ? 'border-b border-white/[0.04]' : ''].join(' ')}>
                    {/* Avatar */}
                    <div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0"
                         style={{background:m.color}}>{m.avatar}</div>
                    {/* Name + email */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <p className="text-[13.5px] font-semibold text-white">{m.name}</p>
                        {m.isYou && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded bg-brand-500/15 text-brand-300 font-semibold">You</span>
                        )}
                      </div>
                      <p className="text-[11.5px] text-white/40">{m.email}</p>
                    </div>
                    {/* Role */}
                    <span className="text-[12px] text-white/55 w-14 shrink-0">{m.role}</span>
                    {/* Joined */}
                    <span className="text-[11px] text-white/35 w-20 shrink-0">Since {m.joined}</span>
                    {/* Stats */}
                    <div className="flex items-center gap-1 text-[11px] text-white/35 w-36 shrink-0">
                      <span className="tabular-nums">{m.deals} deals</span>
                      <span className="text-white/20 mx-1">·</span>
                      <span className="tabular-nums">{m.contacts} contacts</span>
                    </div>
                    {/* Remove button */}
                    <button
                      disabled={m.isYou}
                      onClick={() => !m.isYou && setModalUser(m)}
                      className={['inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium border transition-all shrink-0',
                        m.isYou
                          ? 'text-white/20 border-white/[0.04] bg-transparent cursor-not-allowed'
                          : 'text-red-300/80 hover:text-red-200 border-red-500/20 hover:border-red-500/35 bg-transparent hover:bg-red-500/[0.06]'
                      ].join(' ')}>
                      <I.UserMinus size={12}/> Remove
                    </button>
                  </div>
                ))}
              </div>

              <div className="p-4 rounded-xl border border-white/[0.05] bg-white/[0.015]">
                <p className="text-[12px] text-white/40 leading-relaxed">
                  Removing a team member immediately revokes their access. Their open deals and contacts are reassigned to the team member you choose during removal.
                </p>
              </div>
            </div>
          </div>
        </div>

        {modalUser && (
          <RemoveModal user={modalUser} onClose={() => setModalUser(null)}/>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
