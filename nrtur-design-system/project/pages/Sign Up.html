<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start your free trial — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    html, body { height: 100%; margin: 0; overflow-x: hidden; }
    body {
      background: var(--surface-950);
      color: var(--fg-1);
      font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    ::selection { background: rgba(99,102,241,0.35); }
    a { color: inherit; }
    button { font-family: inherit; }

    /* Background — fixed, behind everything */
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent 80%);
    }
    .bg .orb-a { position: absolute; width: 720px; height: 720px; border-radius: 9999px;
      background: rgba(99,102,241,0.28); filter: blur(140px); top: -240px; left: 50%; transform: translateX(-50%); }
    .bg .orb-b { position: absolute; width: 520px; height: 520px; border-radius: 9999px;
      background: rgba(124,58,237,0.18); filter: blur(140px); bottom: -180px; right: -120px; }
    .bg .orb-c { position: absolute; width: 400px; height: 400px; border-radius: 9999px;
      background: rgba(67,56,202,0.14); filter: blur(140px); bottom: -100px; left: -100px; }
    .bg .noise {
      position: absolute; inset: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Card */
    .signup-shell {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .signup-card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-3);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.6),
        0 0 120px rgba(99,102,241,0.08);
    }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .logo-tile {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.20);
    }
    .logo-tile span { color: #fff; font-weight: 900; font-size: 24px; line-height: 1; }

    h1.signup-title {
      margin: 0; text-align: center;
      font-size: 28px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15;
      color: var(--fg-1);
    }
    p.signup-sub {
      margin: 8px 0 0 0; text-align: center;
      font-size: 14px; color: var(--fg-5); line-height: 1.5;
    }

    /* Fields */
    .form { margin-top: 28px; display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px; font-weight: 500; color: var(--fg-4);
    }
    .input-wrap {
      position: relative;
      display: flex; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }
    .input-wrap:hover { border-color: rgba(255,255,255,0.14); }
    .input-wrap:focus-within {
      border-color: rgba(99,102,241,0.50);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrap input {
      flex: 1; min-width: 0;
      background: transparent; border: none; outline: none;
      padding: 12px 14px;
      color: var(--fg-1); font-size: 14px;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: var(--fg-7); }
    .input-icon-leading {
      padding-left: 14px; color: var(--fg-6);
      display: flex; align-items: center;
    }
    .input-icon-leading + input { padding-left: 10px; }
    .toggle-eye {
      background: transparent; border: none; cursor: pointer;
      padding: 0 14px; height: 100%; color: var(--fg-6);
      display: flex; align-items: center;
      transition: color 150ms ease;
    }
    .toggle-eye:hover { color: var(--fg-3); }

    .hint {
      font-size: 11px; color: var(--fg-7);
      margin-top: 2px;
    }
    .strength {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .strength span {
      flex: 1; height: 3px; border-radius: 9999px;
      background: rgba(255,255,255,0.06);
      transition: background 200ms ease;
    }

    /* Primary CTA */
    .cta {
      width: 100%; margin-top: 8px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: #6366f1; color: #fff;
      padding: 13px 20px;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);
      transition: background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
    }
    .cta:hover { background: #818cf8; transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 8px 80px rgba(99,102,241,0.25); }
    .cta:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 22px 0 18px;
      font-size: 12px; color: var(--fg-6);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border-3);
    }

    /* Ghost (OAuth) */
    .ghost-btn {
      width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-1);
      color: var(--fg-2);
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px; font-weight: 500;
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    }
    .ghost-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      color: var(--fg-1);
    }

    /* Terms / footer */
    .terms {
      margin: 22px 0 0 0;
      font-size: 11px; color: var(--fg-7);
      text-align: center; line-height: 1.6;
    }
    .terms a { color: var(--fg-3); text-decoration: none; }
    .terms a:hover { color: var(--fg-1); }

    .signin-line {
      margin: 0; font-size: 13px; color: var(--fg-5);
      text-align: center;
    }
    .signin-line a {
      color: #818cf8; font-weight: 500; text-decoration: none;
      transition: color 150ms ease;
    }
    .signin-line a:hover { color: #a5b4fc; }

    /* Fade in */
    @keyframes signupFadeUp {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .signup-shell { animation: signupFadeUp 600ms ease-out both; }

    /* Hidden until JS swaps */
    .pw-shown .pw-hide { display: none; }
    .pw-shown .pw-show { display: flex; }
    .pw-hide { display: flex; }
    .pw-show { display: none; }

    @media (max-width: 480px) {
      .signup-card { padding: 28px 22px; }
      h1.signup-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb-a"></div>
    <div class="orb-b"></div>
    <div class="orb-c"></div>
    <div class="grid"></div>
    <div class="noise"></div>
  </div>

  <div class="signup-shell" data-screen-label="Sign Up">
    <div class="signup-card">
      <div class="logo-wrap">
        <div class="logo-tile"><span>n</span></div>
      </div>
      <h1 class="signup-title">Start your free trial</h1>
      <p class="signup-sub">14 days free. No credit card required.</p>

      <form class="form" id="signup-form" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="email">Work email</label>
          <div class="input-wrap">
            <span class="input-icon-leading" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                <path d="m22 7-10 5L2 7"></path>
              </svg>
            </span>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="sarah@yourcompany.com" required />
          </div>
        </div>

        <div class="field">
          <label for="name">Full name</label>
          <div class="input-wrap">
            <span class="input-icon-leading" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="Sarah Chen" required />
          </div>
        </div>

        <div class="field" id="pw-field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon-leading" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 10 characters" required minlength="10" />
            <button type="button" class="toggle-eye" id="toggle-pw" aria-label="Show password">
              <svg class="pw-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="pw-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                <line x1="2" x2="22" y1="2" y2="22"></line>
              </svg>
            </button>
          </div>
          <div class="strength" aria-hidden="true" id="strength">
            <span></span><span></span><span></span><span></span>
          </div>
          <p class="hint">10 characters minimum.</p>
        </div>

        <button type="submit" class="cta">
          Create account
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </button>
      </form>

      <div class="divider">or continue with</div>

      <button type="button" class="ghost-btn" aria-label="Continue with Google">
        <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3c-1.5 4.2-5.5 7.2-10.3 7.2-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.4 1.1 7.3 2.8l5.1-5.1C34.2 7.5 29.4 5.6 24 5.6 13.8 5.6 5.6 13.8 5.6 24S13.8 42.4 24 42.4c10.3 0 18.9-7.5 18.9-18.4 0-1.3-.1-2.4-.3-3.5z"/>
          <path fill="#FF3D00" d="M7.3 14.7l5.9 4.3C14.7 15.1 19 12 24 12c2.8 0 5.4 1.1 7.3 2.8l5.1-5.1C34.2 7.5 29.4 5.6 24 5.6 16.4 5.6 9.9 9.7 7.3 14.7z"/>
          <path fill="#4CAF50" d="M24 42.4c5.3 0 10.1-2 13.7-5.2l-6.3-5.2c-2 1.4-4.6 2.3-7.4 2.3-4.8 0-8.8-3-10.3-7.1l-5.9 4.6C10 38.6 16.5 42.4 24 42.4z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.7 2-2 3.8-3.7 5.1l6.3 5.2c-.4.4 6.7-4.9 6.7-13.9 0-1.3-.1-2.4-.3-3.5z"/>
        </svg>
        Continue with Google
      </button>

      <p class="signin-line" style="margin-top: 22px;">
        Already have an account? <a href="#">Sign in</a>
      </p>

      <p class="terms">
        By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </div>

  <script>
    // Password show/hide toggle.
    (() => {
      const btn = document.getElementById('toggle-pw');
      const input = document.getElementById('password');
      const field = document.getElementById('pw-field');
      btn.addEventListener('click', () => {
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        field.classList.toggle('pw-shown', !showing);
        btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      });
    })();

    // Lightweight password strength meter — for visual feedback only.
    (() => {
      const input = document.getElementById('password');
      const bars = document.querySelectorAll('#strength span');
      const colors = ['#f87171', '#fbbf24', '#818cf8', '#34d399'];
      input.addEventListener('input', () => {
        const v = input.value;
        let score = 0;
        if (v.length >= 10) score++;
        if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
        if (/\d/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        bars.forEach((b, i) => {
          b.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.06)';
        });
      });
    })();
  </script>
</body>
</html>
