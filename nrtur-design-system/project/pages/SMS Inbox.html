      const [search, setSearch] = React.useState('');

      const visible = CONVOS.filter(c => {
        if (filter === 'unread' && c.unread === 0) return false;
        if (filter === 'deals' && !c.deal) return false;
        if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.lastMsg.toLowerCase().includes(search.toLowerCase())) return false;
        return true;

          </div>

          {/* List */}
          <div className="flex-1 overflow-y-auto scroll-area">
            {visible.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full gap-2 px-6 text-center">
                <I.MessageSq size={22} className="text-white/20"/>
                <p className="text-[12px] text-white/35">No conversations match.</p>
              </div>
            ) : visible.map(c => (
              <ConvoItem key={c.id} c={c} selected={selected === c.id} onClick={() => setSelected(c.id)}/>
            ))}
          </div>

          {/* Footer */}
          <div className="shrink-0 border-t border-white/[0.05] px-4 py-2.5 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-glow-pulse shrink-0"/>
            <span className="text-[11px] text-white/38">Twilio connected · live</span>
          </div>
        </section>
      );
    }

    // ── Message bubble ──────────────────────────────────────────────────────
    function Bubble({ msg, prevFrom }) {
      const isMe = msg.from === 'me';
      const showAvatar = !isMe && msg.from !== prevFrom;

      return (
        <div className={['flex gap-2.5 items-end animate-bubble-in', isMe ? 'flex-row-reverse' : 'flex-row'].join(' ')}>
          {/* Spacer / avatar for incoming */}
          {!isMe ? (
            <div className="w-7 shrink-0">
              {showAvatar && null /* avatar shown in header */}
            </div>
          ) : null}

          <div className={['max-w-[72%] flex flex-col gap-0.5', isMe ? 'items-end' : 'items-start'].join(' ')}>
            <div className={[
              'px-4 py-2.5 rounded-2xl text-[13.5px] leading-relaxed text-wrap-pretty',
              isMe
                ? 'text-white rounded-br-sm'
                : 'text-white/90 bg-white/[0.07] border border-white/[0.08] rounded-bl-sm'
            ].join(' ')}
            style={isMe ? { background:'linear-gradient(135deg,#6366f1,#7c3aed)' } : {}}>
              {msg.text}
            </div>
            <div className={['flex items-center gap-1.5 px-1', isMe ? 'flex-row-reverse' : 'flex-row'].join(' ')}>
              <span className="text-[10px] text-white/30">{msg.time}</span>
              {isMe && (
                <span className="text-[10px]">
                  {msg.status === 'read'      && <I.CheckCheck size={12} className="text-brand-300"/>}
                  {msg.status === 'delivered' && <I.CheckCheck size={12} className="text-white/35"/>}
                  {msg.status === 'sent'      && <I.Check      size={12} className="text-white/30"/>}
                </span>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Date divider ────────────────────────────────────────────────────────
    function DateDivider({ label }) {
      return (
        <div className="flex items-center gap-3 my-3">
          <div className="flex-1 h-px bg-white/[0.05]"/>
          <span className="text-[10px] text-white/30 font-medium px-1">{label}</span>
          <div className="flex-1 h-px bg-white/[0.05]"/>
        </div>
      );
    }

    // ── Empty thread ────────────────────────────────────────────────────────
    function EmptyThread() {
      return (
        <section className="flex-1 flex items-center justify-center" style={{ background:'#09091a' }}>
          <div className="text-center max-w-xs">
            <div className="w-12 h-12 mx-auto rounded-2xl bg-white/[0.04] border border-white/[0.06] flex items-center justify-center text-white/35 mb-3">
              <I.MessageSq size={20}/>
            </div>
            <p className="text-[14px] font-medium text-white/55">Select a conversation</p>
            <p className="text-[12px] text-white/30 mt-1">Or start a new one with any contact.</p>
          </div>
        </section>
      );
    }

    // ── Thread view ─────────────────────────────────────────────────────────
    function ThreadView({ convo }) {
      const [text, setText] = React.useState('');
      const [messages, setMessages] = React.useState(convo.thread);
      const bottomRef = React.useRef(null);
      const textareaRef = React.useRef(null);

      React.useEffect(() => {
        setMessages(convo.thread);
        setText('');
      }, [convo.id]);

      React.useEffect(() => {
        if (bottomRef.current) {
          bottomRef.current.parentElement.scrollTop = bottomRef.current.parentElement.scrollHeight;
        }
      }, [messages]);

      function send() {
        if (!text.trim()) return;
        const newMsg = { id: messages.length + 1, from:'me', text: text.trim(), time:'Just now', status:'sent' };
        setMessages(prev => [...prev, newMsg]);
        setText('');
      }

      function onKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      }

      // Group messages for date dividers
      const grouped = [];
      let lastDate = null;
      messages.forEach(m => {
        const dateStr = m.time.includes('Today') ? 'Today' : m.time.includes('Yesterday') ? 'Yesterday' : m.time.startsWith('Mon') ? 'Monday' : m.time.startsWith('Fri') ? 'Friday' : m.time.startsWith('Thu') ? 'Thursday' : null;
        if (dateStr && dateStr !== lastDate) {
          grouped.push({ type:'date', label: dateStr });
          lastDate = dateStr;
        }
        grouped.push({ type:'msg', msg: m });
      });

      return (
        <section className="flex-1 min-w-0 flex flex-col" style={{ background:'#09091a' }}>
          {/* Thread header */}
          <header className="shrink-0 border-b border-white/[0.05] px-6 py-3.5 flex items-center justify-between gap-4" style={{ background:'#09091a' }}>
            <div className="flex items-center gap-3 min-w-0">
              <div className="w-9 h-9 rounded-full flex items-center justify-center text-[12px] font-bold text-white shrink-0"
                   style={{ background: convo.color }}>
                {convo.avatar}
              </div>
              <div className="min-w-0">
                <p className="text-[14px] font-bold text-white leading-tight">{convo.name}</p>
                <p className="text-[11px] text-white/40 mt-0.5">{convo.phone}</p>
              </div>
            </div>
            <div className="flex items-center gap-1.5 shrink-0">
              <button title="Call" className="w-8 h-8 rounded-lg text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all">
                <I.Phone size={14}/>
              </button>
              <button title="View contact" className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-white/55 hover:text-white bg-white/[0.04] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.ExternalLink size={11}/>
                Contact
              </button>
              <button title="More" className="w-8 h-8 rounded-lg text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all">
                <I.More size={14}/>
              </button>
            </div>
          </header>

          {/* CRM deal strip */}
          {convo.deal && (
            <div className="shrink-0 mx-5 mt-4 rounded-xl border border-brand-500/18 bg-brand-500/[0.05] px-4 py-2.5 flex items-center gap-3">
              <span className="w-2 h-2 rounded-full shrink-0" style={{ background: convo.deal.stageColor }}/>
              <div className="flex items-center gap-2 flex-1 min-w-0 flex-wrap">
                <p className="text-[12px] font-semibold text-white">{convo.deal.name}</p>
                <span className="text-[11px] text-white/40">·</span>
                <p className="text-[12px] text-white/65">{convo.deal.value}</p>
                <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-medium bg-white/[0.06] text-white/65">
                  {convo.deal.stage}
                </span>
              </div>
              <a href="#" className="text-[11px] font-medium text-brand-300 hover:text-brand-200 inline-flex items-center gap-1 shrink-0 transition-colors">
                Open deal <I.ArrowRight size={10} stroke={2.5}/>
              </a>
            </div>
          )}

          {/* Messages */}
          <div className="flex-1 overflow-y-auto scroll-area px-5 py-5 flex flex-col gap-2">
            {grouped.map((item, i) =>
              item.type === 'date'
                ? <DateDivider key={`d-${i}`} label={item.label}/>
                : <Bubble key={item.msg.id} msg={item.msg} prevFrom={grouped[i-1]?.msg?.from}/>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Compose bar */}
          <div className="shrink-0 border-t border-white/[0.05] px-4 py-3" style={{ background:'#07070f' }}>
            <div className="flex items-end gap-2 bg-white/[0.04] border border-white/[0.08] rounded-2xl px-3 py-2.5
                            focus-within:border-brand-500/40 focus-within:bg-white/[0.05]
                            focus-within:shadow-[0_0_0_3px_rgba(99,102,241,0.10)] transition-all">
              {/* Left actions */}
              <div className="flex items-center gap-0.5 shrink-0 pb-0.5">
                <button title="Emoji" className="w-7 h-7 rounded-lg text-white/38 hover:text-white/75 hover:bg-white/[0.06] flex items-center justify-center transition-colors">
                  <I.Smile size={15}/>
                </button>
                <button title="Attach" className="w-7 h-7 rounded-lg text-white/38 hover:text-white/75 hover:bg-white/[0.06] flex items-center justify-center transition-colors">
                  <I.Paperclip size={14}/>
                </button>
              </div>

              {/* Textarea */}
              <textarea
                ref={textareaRef}
                rows={1}
                value={text}
                onChange={e => setText(e.target.value)}
                onKeyDown={onKeyDown}
                placeholder={`Message ${convo.name.split(' ')[0]}…`}
                className="flex-1 bg-transparent outline-none text-[13px] text-white placeholder:text-white/28 leading-relaxed resize-none min-h-[24px] max-h-[120px] overflow-y-auto py-0.5"
                style={{ fieldSizing:'content' }}
              />

              {/* Right actions */}
              <div className="flex items-center gap-1.5 shrink-0 pb-0.5">
                <button title="AI draft" className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-[11px] font-medium text-violet-300 hover:text-violet-200 hover:bg-violet-500/10 transition-colors">
                  <I.Sparkles size={11} stroke={2}/>
                  AI draft
                </button>
                <button onClick={send}
                  className={[
                    'w-8 h-8 rounded-xl flex items-center justify-center transition-all',
                    text.trim()
                      ? 'bg-brand-500 hover:bg-brand-400 text-white shadow-brand hover:-translate-y-0.5 active:translate-y-0'
                      : 'bg-white/[0.06] text-white/25 cursor-not-allowed'
                  ].join(' ')}>
                  <I.Send size={13} stroke={2.4}/>
                </button>
              </div>
            </div>
            {/* Hint */}
            <p className="text-center text-[10px] text-white/22 mt-1.5">
              Enter to send · Shift+Enter for new line
            </p>
          </div>
        </section>
      );
    }

    // ── Page ────────────────────────────────────────────────────────────────
    function SMSInbox() {
      const [selected, setSelected] = React.useState(1);
      const convo = CONVOS.find(c => c.id === selected);

      return (
        <div data-screen-label="SMS Inbox" className="h-full flex" style={{ background:'#09091a' }}>
          {/* Ambient glows */}
          <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute rounded-full" style={{ width:500, height:500, background:'rgba(99,102,241,0.055)', filter:'blur(140px)', top:-200, right:-100 }}/>
            <div className="absolute rounded-full" style={{ width:380, height:380, background:'rgba(124,58,237,0.045)', filter:'blur(140px)', bottom:-160, left:220 }}/>
          </div>

          <div className="relative z-10 flex w-full h-full">
            <Sidebar/>

            {/* Main content: list + thread */}
            <div className="flex-1 flex min-w-0 min-h-0">
              <ConvoList selected={selected} setSelected={setSelected}/>
              {convo ? <ThreadView key={convo.id} convo={convo}/> : <EmptyThread/>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SMSInbox/>);
  </script>
</body>
</html>
