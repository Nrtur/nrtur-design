  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 950:'#07070f', 925:'#09091a', 900:'#0b0b18', 850:'#0d0d1a' },
          },
          fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: {
            'brand':    '0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg': '0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
          },
          keyframes: {
            modalIn:  { '0%':{opacity:0,transform:'translateY(10px) scale(0.985)'}, '100%':{opacity:1,transform:'none'} },
            overlayIn:{ '0%':{opacity:0}, '100%':{opacity:1} },
            glowPulse:{ '0%,100%':{opacity:0.5}, '50%':{opacity:1} },
          },
          animation: {
            'modal-in':  'modalIn 240ms cubic-bezier(0.16,1,0.3,1) both',
            'overlay-in':'overlayIn 200ms ease-out both',
            'glow-pulse':'glowPulse 3s ease-in-out infinite',
          },
        }
      }
    }
  </script>

    ::selection { background: rgba(99,102,241,0.35); }
    .scroll-area::-webkit-scrollbar { width:5px; height:5px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.28); border-radius: 9999px; }

      PhoneMissed:p=><Ico {...p} d={<><line x1="22" y1="2" x2="16" y2="8"/><line x1="16" y1="2" x2="22" y2="8"/><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>}/>,

    };

    // ── Sidebar ─────────────────────────────────────────────────────────────
    function Sidebar() {
      const items = [
        { key:'dash', Icon:I.LayoutDash, label:'Dashboard', href:'Dashboard.html' },
        { key:'contacts', Icon:I.Users, label:'Contacts', href:'Contacts.html' },
        { key:'pipeline', Icon:I.GitBranch, label:'Pipeline', href:'Pipeline.html' },
        { key:'email', Icon:I.Mail, label:'Email', href:'Inbox.html' },
        { key:'sms', Icon:I.MessageSq, label:'SMS', href:'SMS Inbox.html' },
        { key:'calls', Icon:I.Phone, label:'Calls', href:'Calls.html' },
        { key:'automations', Icon:I.Zap, label:'Automations', href:'Automations.html' },
        { key:'reports', Icon:I.BarChart, label:'Reports', href:'Reports.html' },
      ];
      return (
        <aside className="w-14 shrink-0 flex flex-col items-center py-5 gap-1.5 border-r border-white/[0.05]" style={{ background:'#07070f' }}>
          <a href="#" className="mb-4" title="nrtur">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-brand" style={{ background:'linear-gradient(135deg,#6366f1,#7c3aed)' }}>
              <span className="text-white font-black text-sm leading-none">n</span>
            </div>
          </a>
          {items.map(({ key, Icon, label, href }) => {
            const a = key === 'calls';
            return (
              <a key={key} href={href} title={label}
                className={['w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150',
                  a ? 'bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/25 shadow-[0_0_18px_rgba(99,102,241,0.35)]'
                    : 'text-white/30 hover:text-white/70 hover:bg-white/[0.04]'].join(' ')}>
                <Icon size={16}/>
              </a>

          })}
          <div className="mt-auto flex flex-col items-center gap-3">
            <button title="Settings" className="w-9 h-9 rounded-xl flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/[0.04] transition-all"><I.Settings size={16}/></button>
            <button title="Alex Morgan" className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ring-1 ring-white/[0.06] hover:ring-white/20 transition-all" style={{ background:'#3b82f6' }}>AM</button>
          </div>
        </aside>
      );
    }

        tags:['decision-maker', 'hot'],

        notes:'',

    ];

    function CallIcon({ call, size=14 }) {
      const { dir, outcome } = call;
      if (outcome === 'missed')   return <I.PhoneMissed size={size} className="text-red-300"/>;
      if (outcome === 'voicemail') return <I.Voicemail size={size} className="text-amber-300"/>;
      if (outcome === 'no-answer') return <I.PhoneOut size={size} className="text-white/35"/>;
      return dir === 'in' ? <I.PhoneIn size={size} className="text-emerald-300"/> : <I.PhoneOut size={size} className="text-brand-300"/>;
    }

    function outcomeLabel(o, dir) {
      if (o === 'missed') return 'Missed';
      if (o === 'voicemail') return 'Voicemail';
      if (o === 'no-answer') return 'No answer';
      return dir === 'in' ? 'Incoming' : 'Outgoing';
    }

    // ── Topbar ─────────────────────────────────────────────────────────────
    function Topbar({ onLog, onDial }) {
      return (
        <header className="shrink-0 border-b border-white/[0.05] px-7 py-3.5 flex items-center justify-between gap-6" style={{ background:'#09091a' }}>
          <div className="flex items-center gap-3">
            <h1 className="text-white text-[18px] font-bold tracking-tight">Calls</h1>
            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-500/12 text-emerald-300 ring-1 ring-emerald-500/25 text-[11px] font-medium">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-glow-pulse"/>
              Twilio · ready
            </span>
            <span className="text-[11px] text-white/40">·</span>
            <span className="text-[11px] text-white/45 tabular-nums">{CALLS.length} calls this week · {CALLS.filter(c => c.outcome === 'missed').length} missed</span>
          </div>
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-2 bg-white/[0.04] border border-white/[0.08] rounded-xl px-3 py-2 focus-within:border-brand-500/40 focus-within:bg-white/[0.05] transition-all w-72">
              <I.Search size={12} className="text-white/40"/>
              <input type="text" placeholder="Search calls, contacts, numbers…" className="flex-1 bg-transparent outline-none text-[12px] text-white placeholder:text-white/30"/>
            </div>
            <button onClick={onLog} className="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-[12.5px] font-medium text-white/75 hover:text-white bg-white/[0.04] hover:bg-white/[0.07] border border-white/[0.08] hover:border-white/[0.18] transition-all">
              <I.Edit size={12}/>
              Log call
            </button>
            <button onClick={onDial} className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-brand hover:shadow-brand-lg hover:-translate-y-0.5 active:translate-y-0 transition-all">
              <I.Phone size={13} stroke={2.4}/>
              New call
            </button>
          </div>
        </header>
      );
    }

    // ── Filter rail ────────────────────────────────────────────────────────
    function FilterRail({ filter, setFilter, counts }) {
      const items = [
        { key:'all',   label:'All',        Icon:null },
        { key:'in',    label:'Incoming',   Icon:I.PhoneIn },
        { key:'out',   label:'Outgoing',   Icon:I.PhoneOut },
        { key:'missed',label:'Missed',     Icon:I.PhoneMissed },
        { key:'vm',    label:'Voicemail',  Icon:I.Voicemail },
      ];
      return (
        <div className="shrink-0 border-b border-white/[0.04] px-7 py-2.5 flex items-center gap-1.5" style={{ background:'#09091a' }}>
          {items.map(it => {
            const a = filter === it.key;
            return (
              <button key={it.key} onClick={() => setFilter(it.key)}
                className={['inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[12px] font-medium transition-all',
                  a ? 'bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25'
                    : 'text-white/55 hover:text-white/85 hover:bg-white/[0.04]'].join(' ')}>
                {it.Icon && <it.Icon size={11}/>}
                {it.label}
                {counts[it.key] != null && <span className="text-[10px] text-white/40 tabular-nums">{counts[it.key]}</span>}
              </button>
            );
          })}
          <div className="ml-auto inline-flex items-center gap-2 text-[10.5px] text-white/35">
            <I.Sparkles size={10}/>
            AI summarizes every connected call &gt; 1 min
          </div>
        </div>
      );
    }

    // ── Call row ───────────────────────────────────────────────────────────
    function CallRow({ c, selected, onClick }) {
      return (
        <div role="button" tabIndex={0} onClick={onClick}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick(); } }}
          className={['w-full text-left px-4 py-3.5 grid grid-cols-[28px_2.2fr_1fr_1fr_1fr_56px] items-center gap-4 border-b border-white/[0.03] transition-all relative cursor-pointer focus:outline-none focus-visible:ring-1 focus-visible:ring-brand-500/40',
            selected ? 'bg-brand-500/[0.07] border-l-2 border-l-brand-400'
                     : 'border-l-2 border-l-transparent hover:bg-white/[0.025]'
          ].join(' ')}>
          {/* Direction icon */}
          <div className={['w-7 h-7 rounded-full flex items-center justify-center shrink-0',
            c.outcome === 'missed' ? 'bg-red-500/10 ring-1 ring-red-500/25' :
            c.outcome === 'voicemail' ? 'bg-amber-500/10 ring-1 ring-amber-500/25' :
            c.outcome === 'no-answer' ? 'bg-white/[0.05] ring-1 ring-white/[0.07]' :
            c.dir === 'in' ? 'bg-emerald-500/10 ring-1 ring-emerald-500/25' :
                             'bg-brand-500/10 ring-1 ring-brand-500/25'
          ].join(' ')}>
            <CallIcon call={c} size={12}/>
          </div>

          {/* Contact */}
          <div className="flex items-center gap-3 min-w-0">
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0" style={{ background: c.color }}>
              {c.avatar}
            </div>

    function CallsPage() {
      const [selected, setSelected] = React.useState(1);

      const [logOpen, setLogOpen] = React.useState(false);
      const [dialOpen, setDialOpen] = React.useState(false);

      const visible = CALLS.filter(c => {
        if (filter === 'all') return true;
        if (filter === 'in')  return c.dir === 'in' && c.outcome !== 'missed';
        if (filter === 'out') return c.dir === 'out' && c.outcome !== 'missed' && c.outcome !== 'no-answer';
        if (filter === 'missed') return c.outcome === 'missed';
        if (filter === 'vm') return c.outcome === 'voicemail';
        return true;
      });

      const counts = {
        all: CALLS.length,
        missed: CALLS.filter(c => c.outcome === 'missed').length,
        vm: CALLS.filter(c => c.outcome === 'voicemail').length,
      };

      const current = CALLS.find(c => c.id === selected);

      // Group by day
      const grouped = [];
      let lastDay = null;
      visible.forEach(c => {
        if (c.day !== lastDay) { grouped.push({ type:'day', label: c.day }); lastDay = c.day; }
        grouped.push({ type:'call', c });
      });

      return (
        <div data-screen-label="Calls" className="h-full flex" style={{ background:'#09091a' }}>
          <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute rounded-full" style={{ width:500, height:500, background:'rgba(99,102,241,0.055)', filter:'blur(140px)', top:-200, right:-100 }}/>
            <div className="absolute rounded-full" style={{ width:380, height:380, background:'rgba(124,58,237,0.045)', filter:'blur(140px)', bottom:-160, left:220 }}/>
          </div>

          <div className="relative z-10 flex w-full h-full">
            <Sidebar/>

            <div className="flex-1 flex flex-col min-w-0">
              <Topbar onLog={() => setLogOpen(true)} onDial={() => setDialOpen(true)}/>
              <FilterRail filter={filter} setFilter={setFilter} counts={counts}/>

              <div className="flex-1 flex min-h-0">
                {/* List */}
                <div className="flex-1 overflow-y-auto scroll-area">
                  {grouped.map((item, i) =>
                    item.type === 'day' ? (
                      <div key={`d-${i}`} className="px-7 pt-5 pb-2 sticky top-0 z-10 flex items-center gap-3" style={{ background:'#09091a' }}>
                        <p className="text-[10.5px] font-semibold text-white/45 uppercase tracking-[0.14em]">{item.label}</p>
                        <div className="flex-1 h-px bg-white/[0.05]"/>
                      </div>
                    ) : (
                      <CallRow key={item.c.id} c={item.c} selected={selected === item.c.id} onClick={() => setSelected(item.c.id)}/>
                    )
                  )}
                  {visible.length === 0 && (
                    <div className="flex flex-col items-center justify-center h-full gap-2 px-6 text-center">
                      <I.Phone size={22} className="text-white/20"/>
                      <p className="text-[12px] text-white/35">No calls match this filter.</p>
                    </div>
                  )}
                </div>

                {/* Detail */}
                <CallDetail c={current}/>
              </div>
            </div>
          </div>

          {logOpen  && <LogCallModal onClose={() => setLogOpen(false)}/>}
          {dialOpen && <Dialer       onClose={() => setDialOpen(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CallsPage/>);
  </script>
</body>
</html>
