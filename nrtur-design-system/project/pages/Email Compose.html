<html lang="en">
<head>

  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 950:'#07070f', 925:'#09091a', 900:'#0b0b18' },
          },
          fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: {
            'brand':    '0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg': '0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
          },
          keyframes: {
            modalIn:  { '0%':{opacity:0,transform:'translateY(16px) scale(0.985)'}, '100%':{opacity:1,transform:'none'} },
            overlayIn:{ '0%':{opacity:0}, '100%':{opacity:1} },
            glowPulse:{ '0%,100%':{opacity:0.5}, '50%':{opacity:1} },
            popIn:    { '0%':{opacity:0,transform:'translateY(4px) scale(0.96)'}, '100%':{opacity:1,transform:'none'} },

          animation: {
            'modal-in':  'modalIn 280ms cubic-bezier(0.16,1,0.3,1) both',
            'overlay-in':'overlayIn 200ms ease-out both',
            'glow-pulse':'glowPulse 3s ease-in-out infinite',
            'pop-in':    'popIn 180ms ease-out both',
          },
        }
      }
    }

  <style>
    html, body, #root { height: 100%; }
    body { margin:0; background:#09091a; color:#fff; font-family:'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow:hidden; }
    ::selection { background: rgba(99,102,241,0.35); }
    .scroll-area::-webkit-scrollbar { width:5px; }

    .scroll-area::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.28); border-radius: 9999px; }

    [contenteditable]:focus { outline: none; }
    [contenteditable]:empty:before { content: attr(data-placeholder); color: rgba(255,255,255,0.28); pointer-events: none; }
    .editor a { color:#a5b4fc; text-decoration: underline; text-decoration-color: rgba(165,180,252,0.4); }
    .editor blockquote { border-left: 3px solid rgba(99,102,241,0.5); padding-left: 12px; color: rgba(255,255,255,0.55); margin: 8px 0; }

    .editor ol { padding-left: 22px; list-style: decimal; }
    .editor h1, .editor h2 { font-weight: 700; }

    .editor h2 { font-size: 1.15em; }
    .editor code { background: rgba(255,255,255,0.06); border-radius:4px; padding:1px 5px; font-family: ui-monospace,Menlo,monospace; font-size: 0.92em; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const Ico = ({d,size=16,stroke=2,className='',fill}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const I = {
      X:p=><Ico {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>}/>,
      Minus:p=><Ico {...p} d={<path d="M5 12h14"/>}/>,
      Maximize:p=><Ico {...p} d={<><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>}/>,
      Bold:p=><Ico {...p} d={<><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8z"/></>}/>,
      Italic:p=><Ico {...p} d={<><line x1="19" x2="10" y1="4" y2="4"/><line x1="14" x2="5" y1="20" y2="20"/><line x1="15" x2="9" y1="4" y2="20"/></>}/>,
      Underline:p=><Ico {...p} d={<><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="4" x2="20" y1="20" y2="20"/></>}/>,
      Strike:p=><Ico {...p} d={<><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" x2="20" y1="12" y2="12"/></>}/>,
      List:p=><Ico {...p} d={<><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></>}/>,
      OrderedList:p=><Ico {...p} d={<><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></>}/>,
      Quote:p=><Ico {...p} d={<><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></>}/>,
      Link:p=><Ico {...p} d={<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>}/>,
      Image:p=><Ico {...p} d={<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>}/>,
      Code:p=><Ico {...p} d={<><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>}/>,
      Heading:p=><Ico {...p} d={<><path d="M6 12h12"/><path d="M6 20V4"/><path d="M18 20V4"/></>}/>,
      Paperclip:p=><Ico {...p} d={<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>}/>,
      Smile:p=><Ico {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></>}/>,
      Sparkles:p=><Ico {...p} d={<path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/>}/>,
      Send:p=><Ico {...p} d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>}/>,
      ChevronDown:p=><Ico {...p} d={<polyline points="6 9 12 15 18 9"/>}/>,
      Clock:p=><Ico {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>,
      Trash:p=><Ico {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></>}/>,
      File:p=><Ico {...p} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>}/>,
      Calendar:p=><Ico {...p} d={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>}/>,
      Check:p=><Ico {...p} d={<polyline points="20 6 9 17 4 12"/>}/>,
      Mail:p=><Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
      LayoutDash:p=><Ico {...p} d={<><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>}/>,
      MessageSq:p=><Ico {...p} d={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>}/>,
      Phone:p=><Ico {...p} d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>}/>,
    };

    // ── Dim background mock (the inbox underneath) ─────────────────────────
    function BackgroundMock() {
      return (
        <div className="absolute inset-0 pointer-events-none" style={{ filter:'blur(2px) saturate(0.7)' }}>
          <div className="h-full flex" style={{ background:'#09091a' }}>
            {/* Sidebar */}
            <aside className="w-14 shrink-0 border-r border-white/[0.05]" style={{ background:'#07070f' }}>
              <div className="flex flex-col items-center py-5 gap-1.5">
                <div className="w-8 h-8 rounded-lg mb-4" style={{ background:'linear-gradient(135deg,#6366f1,#7c3aed)' }}/>
                {[I.LayoutDash, null, null, I.Mail, I.MessageSq, I.Phone, null, null].map((_,i)=>(
                  <div key={i} className="w-9 h-9 rounded-xl bg-white/[0.04]"/>
                ))}
              </div>
            </aside>
            {/* Topbar */}
            <div className="flex-1 flex flex-col">
              <div className="h-14 border-b border-white/[0.05] flex items-center justify-between px-6" style={{ background:'#09091a' }}>
                <div className="h-5 w-20 rounded bg-white/[0.07]"/>
                <div className="flex items-center gap-2">
                  <div className="h-9 w-96 rounded-xl bg-white/[0.04] border border-white/[0.08]"/>
                  <div className="h-9 w-28 rounded-xl bg-brand-500/40"/>
                </div>
              </div>
              {/* Body */}
              <div className="flex-1 flex">
                <div className="w-56 border-r border-white/[0.05] p-4 flex flex-col gap-2" style={{ background:'#09091a' }}>
                  {[...Array(6)].map((_,i)=>(<div key={i} className="h-8 rounded-lg bg-white/[0.04]"/>))}
                </div>
                <div className="w-96 border-r border-white/[0.05]" style={{ background:'#0a0a1c' }}>
                  {[...Array(7)].map((_,i)=>(
                    <div key={i} className="flex gap-3 px-4 py-3 border-b border-white/[0.03]">
                      <div className="w-9 h-9 rounded-full bg-white/[0.07]"/>
                      <div className="flex-1 flex flex-col gap-1.5">
                        <div className="h-3 rounded bg-white/[0.07] w-3/5"/>
                        <div className="h-2.5 rounded bg-white/[0.05] w-4/5"/>
                        <div className="h-2 rounded bg-white/[0.04] w-2/5"/>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="flex-1 p-7 flex flex-col gap-3">
                  <div className="h-7 rounded bg-white/[0.06] w-2/3"/>
                  <div className="h-3 rounded bg-white/[0.04] w-1/3"/>
                  <div className="h-40 rounded-2xl bg-white/[0.03] mt-4"/>
                  <div className="h-40 rounded-2xl bg-white/[0.025]"/>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Toolbar button ─────────────────────────────────────────────────────
    function TB({ Icon, label, onClick, active, size=14 }) {
      return (
        <button title={label} onClick={onClick}
          className={['w-7 h-7 rounded-md flex items-center justify-center transition-all',
            active ? 'bg-brand-500/20 text-brand-200 ring-1 ring-brand-500/30'
                   : 'text-white/55 hover:text-white hover:bg-white/[0.06]'].join(' ')}>
          <Icon size={size}/>
        </button>
      );
    }

    // ── Recipient chip / picker ────────────────────────────────────────────
    const SUGGEST = [
      { name:'Sarah Chen',       email:'sarah@meridian.co',   avatar:'SC', color:'#3b82f6', company:'Meridian Agency' },
      { name:'James Whitfield',  email:'james@summit.io',     avatar:'JW', color:'#8b5cf6', company:'Summit Digital' },
      { name:'Marcus Rodriguez', email:'marcus@pivot.studio', avatar:'MR', color:'#f59e0b', company:'Pivot Studio' },
      { name:'Priya Kapoor',     email:'priya@northwind.ai',  avatar:'PK', color:'#10b981', company:'Northwind' },
      { name:'Lisa Nakamura',    email:'lisa@bloomdata.com',  avatar:'LN', color:'#ec4899', company:'Bloom Data' },
    ];

    function RecipientField({ label, value, setValue, autoFocus }) {
      const [open, setOpen] = React.useState(false);
      const [input, setInput] = React.useState('');
      const ref = React.useRef(null);

      const matches = SUGGEST.filter(s =>
        !value.find(v => v.email === s.email) &&
        (s.name.toLowerCase().includes(input.toLowerCase()) || s.email.toLowerCase().includes(input.toLowerCase()))
      );

      function addRecipient(s) {
        setValue([...value, s]);
        setInput('');
        ref.current?.focus();
      }
      function removeAt(i) { setValue(value.filter((_,idx) => idx !== i)); }

      return (
        <div className="relative">
          <div className="flex items-start gap-3 py-2.5 border-b border-white/[0.05]">
            <span className="text-[12px] font-semibold text-white/45 w-14 shrink-0 pt-1.5">{label}</span>
            <div className="flex-1 flex items-center gap-1.5 flex-wrap min-h-[28px]">
              {value.map((r, i) => (
                <span key={i} className="inline-flex items-center gap-1.5 pl-1 pr-1.5 py-0.5 rounded-md bg-white/[0.05] ring-1 ring-white/[0.08] text-[12px] text-white group">
                  <span className="w-4 h-4 rounded-full flex items-center justify-center text-[8px] font-bold text-white" style={{ background: r.color }}>{r.avatar}</span>
                  <span>{r.name}</span>
                  <span className="text-white/35 text-[11px]">&lt;{r.email}&gt;</span>
                  <button onClick={() => removeAt(i)} className="text-white/40 hover:text-white ml-0.5"><I.X size={10}/></button>
                </span>
              ))}
              <input ref={ref}
                value={input}
                autoFocus={autoFocus}
                onChange={e => { setInput(e.target.value); setOpen(true); }}
                onFocus={() => setOpen(true)}
                onBlur={() => setTimeout(() => setOpen(false), 150)}
                placeholder={value.length === 0 ? 'Add recipients…' : ''}
                className="flex-1 bg-transparent outline-none text-[13px] text-white placeholder:text-white/28 min-w-[120px] py-1"/>
            </div>
          </div>
          {open && (input || matches.length > 0) && matches.length > 0 && (
            <div className="absolute left-14 right-0 top-full mt-1 rounded-xl border border-white/[0.10] shadow-[0_16px_50px_rgba(0,0,0,0.55)] z-20 overflow-hidden animate-pop-in" style={{ background:'#0d0d1f' }}>
              {matches.slice(0,5).map(s => (
                <button key={s.email} onMouseDown={(e) => e.preventDefault()} onClick={() => addRecipient(s)}
                  className="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-white/[0.04] transition-colors text-left border-b border-white/[0.03] last:border-b-0">
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold text-white" style={{ background: s.color }}>{s.avatar}</div>
                  <div className="flex-1 min-w-0">
                    <p className="text-[12.5px] text-white font-medium truncate">{s.name} <span className="text-white/35 font-normal">· {s.company}</span></p>
                    <p className="text-[11px] text-white/45 truncate">{s.email}</p>
                  </div>
                  <span className="text-[10px] text-brand-300 font-mono px-1.5 py-0.5 rounded bg-brand-500/10">⏎</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── Template menu ─────────────────────────────────────────────────────
    const TEMPLATES = [
      { id:1, name:'Proposal follow-up · day 2', cat:'Follow-up', body:'Hey {{first_name}}, just circling back on the proposal. Anything I can clarify before you take it to the team?' },
      { id:2, name:'Meeting confirmation',        cat:'Meeting',   body:'Confirming our chat tomorrow about {{deal_name}}. I\'ll send the link 10 min before.' },
      { id:3, name:'New lead intro',              cat:'Intro',     body:'Hi {{first_name}} — this is Alex from nrtur. Saw you signed up for the trial.' },
      { id:4, name:'Call recap',                  cat:'Follow-up', body:'Quick recap of our call: agreed on next steps for {{deal_name}}.' },
    ];

    function TemplateMenu({ onPick, onClose }) {
      const [q, setQ] = React.useState('');
      const filtered = TEMPLATES.filter(t => !q || t.name.toLowerCase().includes(q.toLowerCase()));
      return (
        <div className="absolute bottom-full mb-2 left-0 w-80 rounded-xl border border-white/[0.10] shadow-[0_16px_50px_rgba(0,0,0,0.55)] overflow-hidden z-30 animate-pop-in" style={{ background:'#0d0d1f' }}>
          <div className="px-3 py-2.5 border-b border-white/[0.05]">
            <input autoFocus type="text" placeholder="Find a template…"
              value={q} onChange={e => setQ(e.target.value)}
              className="w-full bg-transparent outline-none text-[12.5px] text-white placeholder:text-white/30"/>
          </div>
          <div className="max-h-72 overflow-y-auto scroll-area">
            {filtered.map(t => (
              <button key={t.id} onClick={() => { onPick(t); onClose(); }}
                className="w-full text-left px-3 py-2.5 hover:bg-white/[0.04] border-b border-white/[0.03] last:border-b-0 transition-colors">
                <div className="flex items-center justify-between mb-0.5">
                  <p className="text-[12.5px] font-medium text-white">{t.name}</p>
                  <span className="text-[10px] text-white/40 px-1.5 py-0.5 rounded bg-white/[0.05]">{t.cat}</span>
                </div>
                <p className="text-[11px] text-white/45 truncate">{t.body}</p>
              </button>
            ))}
            <a href="SMS Templates.html" className="block text-center text-[11px] text-brand-300 hover:text-brand-200 py-2.5 border-t border-white/[0.05]">
              Manage templates →
            </a>
          </div>
        </div>
      );
    }

    // ── Schedule menu ─────────────────────────────────────────────────────
    function ScheduleMenu({ value, setValue, onClose }) {
      const opts = [
        { label:'Tomorrow morning',     sub:'Mon, May 27 · 8:00 AM' },
        { label:'Tomorrow afternoon',   sub:'Mon, May 27 · 1:00 PM' },
        { label:'Monday morning',       sub:'Mon, Jun 2 · 8:00 AM'  },
        { label:'Custom time…',         sub:'Pick a date & time'    },
      ];
      return (
        <div className="absolute bottom-full mb-2 right-0 w-72 rounded-xl border border-white/[0.10] shadow-[0_16px_50px_rgba(0,0,0,0.55)] overflow-hidden z-30 animate-pop-in" style={{ background:'#0d0d1f' }}>
          <div className="px-3.5 py-3 border-b border-white/[0.05]">
            <p className="text-[12px] font-semibold text-white">Schedule send</p>
            <p className="text-[11px] text-white/40 mt-0.5">Tracks open rates by send time.</p>
          </div>
          <div className="py-1">
            {opts.map(o => (
              <button key={o.label} onClick={() => { setValue(o.label === 'Custom time…' ? null : o.sub); onClose(); }}
                className="w-full flex items-center justify-between px-3.5 py-2.5 hover:bg-white/[0.04] transition-colors group">
                <div className="text-left">
                  <p className="text-[12.5px] text-white">{o.label}</p>
                  <p className="text-[10.5px] text-white/40 mt-0.5">{o.sub}</p>
                </div>
                {value === o.sub && <I.Check size={13} className="text-brand-300"/>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── Compose modal ─────────────────────────────────────────────────────
    function ComposeModal({ onClose }) {
      const [to,  setTo]  = React.useState([SUGGEST[0]]);
      const [cc,  setCc]  = React.useState([]);
      const [bcc, setBcc] = React.useState([]);
      const [showCc, setShowCc] = React.useState(false);
      const [subject, setSubject] = React.useState('Re: Proposal for Q3 engagement');
      const [showTpl, setShowTpl] = React.useState(false);
      const [showSched, setShowSched] = React.useState(false);
      const [scheduled, setScheduled] = React.useState(null);
      const [activeFmt, setActiveFmt] = React.useState({});
      const editorRef = React.useRef(null);

      // contenteditable initial
      React.useEffect(() => {
        if (editorRef.current && !editorRef.current.innerHTML) {
          editorRef.current.innerHTML = '<p>Hi Sarah,</p><p>Thursday afternoon works perfectly for the call. I\'ll send a calendar invite shortly — looking forward to walking through the final scope together.</p><p>One quick thing: I\'ve attached an updated version of the deliverables doc with the small adjustments you flagged on Monday. Have a look when you get a chance.</p><p>Talk soon,<br>Alex</p>';
        }
      }, []);

      function applyFmt(cmd, arg) {
        document.execCommand(cmd, false, arg);
        editorRef.current?.focus();
      }

      function applyTemplate(t) {
        if (editorRef.current) {
          const filled = t.body.replace(/\{\{first_name\}\}/g, to[0]?.name?.split(' ')[0] || 'there').replace(/\{\{deal_name\}\}/g, 'Q3 Engagement');
          editorRef.current.innerHTML = `<p>${filled}</p><p><br></p><p>Best,<br>Alex</p>`;
        }
      }

      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-6 py-6 animate-overlay-in"
             style={{ background:'rgba(7,7,15,0.65)', backdropFilter:'blur(6px)' }}>
          <div onClick={onClose} className="absolute inset-0"/>

          <div className="relative animate-modal-in w-full max-w-[920px] max-h-[calc(100vh-48px)] flex flex-col rounded-2xl border border-white/[0.08] shadow-[0_24px_120px_rgba(0,0,0,0.7)] overflow-hidden"
               style={{ background:'#0b0b1c' }}>

            {/* Header */}
            <div className="shrink-0 flex items-center justify-between px-5 py-3 border-b border-white/[0.06]" style={{ background:'#09091a' }}>
              <div className="flex items-center gap-2.5">
                <div className="w-7 h-7 rounded-lg bg-brand-500/12 ring-1 ring-brand-500/25 text-brand-300 flex items-center justify-center">
                  <I.Mail size={13}/>
                </div>
                <p className="text-[13.5px] font-bold text-white">New message</p>
                <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-medium bg-emerald-500/12 text-emerald-300 ring-1 ring-emerald-500/20">
                  <span className="w-1 h-1 rounded-full bg-emerald-400"/> Draft saved
                </span>
              </div>
              <div className="flex items-center gap-0.5">
                <button title="Minimize" className="w-7 h-7 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-colors"><I.Minus size={14}/></button>
                <button title="Pop out"  className="w-7 h-7 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-colors"><I.Maximize size={12}/></button>
                <button title="Close" onClick={onClose} className="w-7 h-7 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-colors"><I.X size={14}/></button>
              </div>
            </div>

            {/* From / sender selector */}
            <div className="shrink-0 px-5 pt-3 pb-1">
              <div className="flex items-center gap-3 py-1.5">
                <span className="text-[12px] font-semibold text-white/45 w-14 shrink-0">From</span>
                <button className="inline-flex items-center gap-2 px-2.5 py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.07] hover:bg-white/[0.06] transition-all">
                  <span className="w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold text-white" style={{ background:'#8b5cf6' }}>AM</span>
                  <span className="text-[12.5px] text-white">alex@bloom.co</span>
                  <I.ChevronDown size={11} className="text-white/40"/>
                </button>
              </div>
            </div>

            {/* Recipients */}
            <div className="shrink-0 px-5">
              <RecipientField label="To" value={to} setValue={setTo} autoFocus/>
              {showCc ? (
                <>
                  <RecipientField label="Cc"  value={cc}  setValue={setCc}/>
                  <RecipientField label="Bcc" value={bcc} setValue={setBcc}/>
                </>
              ) : (
                <div className="flex items-center justify-end py-1.5 border-b border-white/[0.05]">
                  <button onClick={() => setShowCc(true)} className="text-[11px] text-white/45 hover:text-white/75 px-2 py-0.5 rounded transition-colors">
                    Add Cc / Bcc
                  </button>
                </div>
              )}
              {/* Subject */}
              <div className="flex items-center gap-3 py-2.5 border-b border-white/[0.05]">
                <span className="text-[12px] font-semibold text-white/45 w-14 shrink-0">Subject</span>
                <input type="text" value={subject} onChange={e => setSubject(e.target.value)}
                  className="flex-1 bg-transparent outline-none text-[13.5px] text-white font-medium placeholder:text-white/28"/>
              </div>
            </div>

            {/* Format toolbar */}
            <div className="shrink-0 px-3 py-1.5 border-b border-white/[0.05] flex items-center gap-0.5 flex-wrap">
              <button className="inline-flex items-center gap-1 px-2 py-1.5 rounded-md text-[11.5px] text-white/65 hover:text-white hover:bg-white/[0.06] transition-colors">
                Normal <I.ChevronDown size={10} className="text-white/40"/>
              </button>
              <div className="w-px h-4 bg-white/[0.06] mx-1"/>
              <TB Icon={I.Bold}      label="Bold (⌘B)"      onClick={() => applyFmt('bold')}/>
              <TB Icon={I.Italic}    label="Italic (⌘I)"    onClick={() => applyFmt('italic')}/>
              <TB Icon={I.Underline} label="Underline (⌘U)" onClick={() => applyFmt('underline')}/>
              <TB Icon={I.Strike}    label="Strikethrough"  onClick={() => applyFmt('strikeThrough')}/>
              <div className="w-px h-4 bg-white/[0.06] mx-1"/>
              <TB Icon={I.List}        label="Bullet list"  onClick={() => applyFmt('insertUnorderedList')}/>
              <TB Icon={I.OrderedList} label="Numbered list" onClick={() => applyFmt('insertOrderedList')}/>
              <TB Icon={I.Quote}       label="Quote"        onClick={() => applyFmt('formatBlock','blockquote')}/>
              <TB Icon={I.Code}        label="Code"         onClick={() => applyFmt('formatBlock','pre')}/>
              <div className="w-px h-4 bg-white/[0.06] mx-1"/>
              <TB Icon={I.Link}  label="Link" onClick={() => { const url = prompt('Link URL'); if (url) applyFmt('createLink', url); }}/>
              <TB Icon={I.Image} label="Image" onClick={() => { const url = prompt('Image URL'); if (url) applyFmt('insertImage', url); }}/>
            </div>

            {/* Editor */}
            <div className="flex-1 overflow-y-auto scroll-area px-5 py-4 min-h-[200px]">
              <div ref={editorRef} contentEditable suppressContentEditableWarning
                data-placeholder="Write your message…"
                className="editor outline-none text-[14px] text-white/85 leading-relaxed [&_p]:my-2 min-h-[180px]"/>

              {/* Signature block */}
              <div className="mt-6 pt-4 border-t border-white/[0.04] text-[12.5px] text-white/45 leading-relaxed">
                <p className="text-white/65 font-medium">Alex Morgan</p>
                <p>Co-founder · Bloom.co</p>
                <p className="text-brand-300">cal.com/alex · +1 (415) 555-0900</p>
              </div>
            </div>

            {/* Attachment chip (sample) */}
            <div className="shrink-0 px-5 py-2 border-t border-white/[0.05] flex items-center gap-2 flex-wrap">
              <div className="inline-flex items-center gap-2.5 px-3 py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.08]">
                <div className="w-7 h-7 rounded-md bg-brand-500/12 ring-1 ring-brand-500/25 text-brand-300 flex items-center justify-center">
                  <I.File size={12}/>
                </div>
                <div>
                  <p className="text-[11.5px] font-medium text-white leading-tight">Q3-Engagement-Scope-v2.pdf</p>
                  <p className="text-[10px] text-white/40">184 KB · PDF</p>
                </div>
                <button className="text-white/35 hover:text-white ml-1"><I.X size={11}/></button>
              </div>
              <span className="text-[11px] text-white/35">1 attachment</span>
            </div>

            {/* Footer */}
            <div className="shrink-0 px-3 py-2.5 border-t border-white/[0.06] flex items-center justify-between gap-2" style={{ background:'#09091a' }}>
              <div className="flex items-center gap-0.5 relative">
                <TB Icon={I.Paperclip} label="Attach"/>
                <TB Icon={I.Image}     label="Insert image"/>
                <TB Icon={I.Smile}     label="Emoji"/>
                <div className="w-px h-5 bg-white/[0.06] mx-1"/>
                <div className="relative">
                  <button onClick={() => setShowTpl(v => !v)}
                    className={['inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-[11.5px] font-medium transition-colors',
                      showTpl ? 'bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25'
                              : 'text-white/65 hover:text-white hover:bg-white/[0.06]'].join(' ')}>
                    <I.File size={11}/> Template
                    <I.ChevronDown size={10} className="text-white/40"/>
                  </button>
                  {showTpl && <TemplateMenu onPick={applyTemplate} onClose={() => setShowTpl(false)}/>}
                </div>
                <button className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-[11.5px] font-medium text-violet-300 hover:text-violet-200 hover:bg-violet-500/10 transition-colors">
                  <I.Sparkles size={11} stroke={2.2}/> AI draft
                </button>
              </div>

              <div className="flex items-center gap-2">
                <button title="Discard" className="w-8 h-8 rounded-md text-white/45 hover:text-red-300 hover:bg-red-500/10 flex items-center justify-center transition-colors">
                  <I.Trash size={13}/>
                </button>
                <div className="w-px h-5 bg-white/[0.06]"/>

                {/* Schedule toggle */}
                <div className="relative">
                  {scheduled && (
                    <span className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-[11px] font-medium text-amber-300 bg-amber-500/10 ring-1 ring-amber-500/25 mr-1">
                      <I.Clock size={10}/>
                      {scheduled}
                      <button onClick={() => setScheduled(null)} className="text-amber-300/70 hover:text-amber-200 ml-0.5"><I.X size={10}/></button>
                    </span>
                  )}
                  <div className="inline-flex rounded-lg overflow-hidden shadow-brand">
                    <button onClick={onClose}
                      className="inline-flex items-center gap-1.5 px-4 py-2 text-[12.5px] font-semibold text-white bg-brand-500 hover:bg-brand-400 transition-colors">
                      <I.Send size={12} stroke={2.4}/>
                      {scheduled ? 'Schedule' : 'Send'}
                    </button>
                    <button onClick={() => setShowSched(v => !v)} title="Schedule send"
                      className={['inline-flex items-center justify-center px-2 transition-colors border-l border-brand-400/40',
                        showSched ? 'bg-brand-400' : 'bg-brand-500 hover:bg-brand-400'].join(' ')}>
                      <I.ChevronDown size={12} className="text-white"/>
                    </button>
                  </div>
                  {showSched && <ScheduleMenu value={scheduled} setValue={setScheduled} onClose={() => setShowSched(false)}/>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Page() {
      const [open, setOpen] = React.useState(true);
      return (
        <div data-screen-label="Email Compose" className="h-full relative" style={{ background:'#09091a' }}>
          {/* Ambient */}
          <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute rounded-full" style={{ width:600, height:600, background:'rgba(99,102,241,0.07)', filter:'blur(160px)', top:-220, right:-150 }}/>
            <div className="absolute rounded-full" style={{ width:420, height:420, background:'rgba(124,58,237,0.06)', filter:'blur(160px)', bottom:-200, left:200 }}/>
          </div>
          <BackgroundMock/>
          {open && <ComposeModal onClose={() => setOpen(false)}/>}
          {!open && (
            <div className="absolute inset-0 flex items-center justify-center z-40">
              <button onClick={() => setOpen(true)}
                className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-brand transition-all">
                <I.Mail size={14}/> Open compose
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
  </script>
</body>
</html>
