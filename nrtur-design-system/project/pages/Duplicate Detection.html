<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duplicate Detection — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81'}, surface:{950:'#07070f',925:'#09091a',900:'#0b0b18'} },
          fontFamily: { sans:['Inter','system-ui','sans-serif'] },
          boxShadow: { 'brand':'0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)' },
          keyframes: {
            modalIn:{'0%':{opacity:0,transform:'translateY(12px) scale(0.985)'},'100%':{opacity:1,transform:'none'}},
            overlayIn:{'0%':{opacity:0},'100%':{opacity:1}},
          },
          animation: { 'modal-in':'modalIn 260ms cubic-bezier(0.16,1,0.3,1) both', 'overlay-in':'overlayIn 200ms ease-out both' },
        }
      }
    }
  </script>
  <style>
    html,body,#root{height:100%;}
    body{margin:0;background:#09091a;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
    ::selection{background:rgba(99,102,241,0.35);}
    .scroll-area::-webkit-scrollbar{width:5px;}
    .scroll-area::-webkit-scrollbar-track{background:transparent;}
    .scroll-area::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.28);border-radius:9999px;}
    .match{background:rgba(251,191,36,0.12);border-radius:4px;padding:0 3px;}
    .conflict{background:rgba(239,68,68,0.12);border-radius:4px;padding:0 3px;color:#fca5a5;}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body><div id="root"></div>
<script type="text/babel">
  const Ico=({d,size=16,stroke=2,className='',fill})=>(
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
  );
  const I={
    X:p=><Ico {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>}/>,
    Check:p=><Ico {...p} d={<polyline points="20 6 9 17 4 12"/>}/>,
    AlertTriangle:p=><Ico {...p} d={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>}/>,
    ArrowRight:p=><Ico {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>}/>,
    Users:p=><Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
    GitMerge:p=><Ico {...p} d={<><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></>}/>,
    Copy:p=><Ico {...p} d={<><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>}/>,
    Info:p=><Ico {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>}/>,
    Mail:p=><Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
    Phone:p=><Ico {...p} d={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>}/>,
    Building:p=><Ico {...p} d={<><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></>}/>,
    Clock:p=><Ico {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>,
    Tag:p=><Ico {...p} d={<><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>}/>,
  };

  // Background mock: new contact form
  function NewContactFormBg() {
    return (
      <div className="absolute inset-0 flex items-center justify-center" style={{background:'#09091a'}}>
        <div className="w-[560px] rounded-2xl border border-white/[0.06] bg-white/[0.025] p-6 opacity-35">
          <p className="text-[16px] font-bold text-white mb-5">New contact</p>
          <div className="grid grid-cols-2 gap-3 mb-3">
            {['First name','Last name'].map(l=>(
              <div key={l}>
                <p className="text-[10px] text-white/45 uppercase tracking-wider mb-1.5">{l}</p>
                <div className="h-9 rounded-xl bg-white/[0.04] border border-white/[0.08]"/>
              </div>
            ))}
          </div>
          {['Email address','Company','Phone number'].map(l=>(
            <div key={l} className="mb-3">
              <p className="text-[10px] text-white/45 uppercase tracking-wider mb-1.5">{l}</p>
              <div className="h-9 rounded-xl bg-white/[0.04] border border-white/[0.08]"/>
            </div>
          ))}
          <div className="flex items-center justify-end gap-2 mt-5">
            <div className="h-9 w-24 rounded-xl bg-white/[0.04] border border-white/[0.07]"/>
            <div className="h-9 w-32 rounded-xl bg-brand-500/60"/>
          </div>
        </div>
      </div>
    );
  }

  // Field row in comparison
  function FieldRow({label, existing, incoming, match}) {
    // match: 'same' | 'conflict' | 'new' | 'missing'
    return (
      <div className={['grid grid-cols-[140px_1fr_1fr] gap-3 px-4 py-2.5 border-b border-white/[0.04] last:border-0',
        match==='conflict'?'bg-red-500/[0.04]':match==='same'?'':''].join(' ')}>
        <p className="text-[11px] font-semibold text-white/40 uppercase tracking-wider self-center">{label}</p>
        {/* Existing */}
        <div className="flex items-center gap-2 min-w-0">
          <p className={['text-[12.5px] truncate',
            match==='conflict'?'text-white/85':'text-white/65'].join(' ')}>
            {existing || <span className="text-white/25 italic">—</span>}
          </p>
          {match==='same' && <I.Check size={10} className="text-emerald-300 shrink-0"/>}
        </div>
        {/* Incoming */}
        <div className="flex items-center gap-2 min-w-0">
          {match==='conflict' ? (
            <span className="text-[12.5px] text-amber-200 font-medium conflict truncate">{incoming}</span>
          ) : match==='new' ? (
            <span className="text-[12.5px] text-emerald-200 font-medium truncate">{incoming}</span>
          ) : (
            <p className="text-[12.5px] text-white/65 truncate">{incoming || <span className="text-white/25 italic">—</span>}</p>
          )}
          {match==='conflict' && <I.AlertTriangle size={10} className="text-amber-300 shrink-0"/>}
          {match==='new' && <span className="text-[9px] px-1.5 py-0.5 rounded bg-emerald-500/15 text-emerald-300 ring-1 ring-emerald-500/25 shrink-0">new</span>}
        </div>
      </div>
    );
  }

  function DuplicateModal({onMerge, onKeepBoth, onClose}) {
    const [merging, setMerging] = React.useState(false);
    const [done, setDone] = React.useState(false);

    function doMerge() {
      setMerging(true);
      setTimeout(()=>{setMerging(false);setDone(true);},1100);
    }

    React.useEffect(()=>{
      const h=(e)=>{if(e.key==='Escape')onClose();};
      window.addEventListener('keydown',h);
      return ()=>window.removeEventListener('keydown',h);
    },[onClose]);

    if(done) return (
      <div className="fixed inset-0 z-50 flex items-center justify-center animate-overlay-in" style={{background:'rgba(7,7,15,0.72)',backdropFilter:'blur(8px)'}}>
        <div onClick={onClose} className="absolute inset-0"/>
        <div className="relative animate-modal-in rounded-2xl border border-emerald-500/25 bg-[#08120e] p-8 max-w-sm w-full mx-6 text-center shadow-[0_24px_80px_rgba(0,0,0,0.7)]">
          <div className="w-12 h-12 rounded-2xl bg-emerald-500/15 ring-1 ring-emerald-500/30 text-emerald-300 flex items-center justify-center mx-auto mb-4">
            <I.GitMerge size={20}/>
          </div>
          <p className="text-[16px] font-bold text-white">Contacts merged.</p>
          <p className="text-[13px] text-white/55 mt-1.5">All activities, deals and tags have been combined. The duplicate was removed.</p>
          <button onClick={onClose} className="mt-5 inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-brand transition-all">
            <I.Check size={13}/> Done
          </button>
        </div>
      </div>
    );

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center px-6 py-6 animate-overlay-in" style={{background:'rgba(7,7,15,0.72)',backdropFilter:'blur(8px)'}}>
        <div onClick={onClose} className="absolute inset-0"/>
        <div className="relative animate-modal-in w-full max-w-[780px] max-h-[calc(100vh-48px)] flex flex-col rounded-2xl border border-white/[0.08] shadow-[0_24px_120px_rgba(0,0,0,0.7)] overflow-hidden" style={{background:'#0b0b1c'}}>

          {/* Header */}
          <div className="shrink-0 px-5 py-4 border-b border-white/[0.06] flex items-start justify-between gap-4" style={{background:'#09091a'}}>
            <div className="flex items-start gap-3">
              <div className="w-9 h-9 rounded-xl bg-amber-500/12 ring-1 ring-amber-500/25 text-amber-300 flex items-center justify-center shrink-0 mt-0.5">
                <I.AlertTriangle size={16}/>
              </div>
              <div>
                <p className="text-[15px] font-bold text-white">This contact may already exist.</p>
                <p className="text-[12px] text-white/50 mt-0.5">We found a <span className="text-amber-300 font-semibold">92% match</span> based on email and name. Review the fields before saving.</p>
              </div>
            </div>
            <button onClick={onClose} className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-colors shrink-0"><I.X size={15}/></button>
          </div>

          {/* Column headers */}
          <div className="shrink-0 grid grid-cols-[140px_1fr_1fr] gap-3 px-4 py-3 border-b border-white/[0.05]" style={{background:'#0d0d1e'}}>
            <div/>
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full bg-[#3b82f6] flex items-center justify-center text-[10px] font-bold text-white">SC</div>
              <div>
                <p className="text-[12px] font-bold text-white">Existing contact</p>
                <p className="text-[10px] text-white/40">Created 3 weeks ago · 4 activities</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full bg-brand-500/20 ring-1 ring-brand-500/40 flex items-center justify-center text-[10px] font-bold text-brand-200">SC</div>
              <div>
                <p className="text-[12px] font-bold text-white">New contact <span className="text-[10px] text-brand-300 font-medium px-1.5 py-0.5 rounded bg-brand-500/12">being created</span></p>
                <p className="text-[10px] text-white/40">Just now · from import</p>
              </div>
            </div>
          </div>

          {/* Field comparison */}
          <div className="flex-1 overflow-y-auto scroll-area" style={{background:'#0b0b1c'}}>
            <FieldRow label="First name"    existing="Sarah"             incoming="Sarah"              match="same"/>
            <FieldRow label="Last name"     existing="Chen"              incoming="Chen"               match="same"/>
            <FieldRow label="Email"         existing="sarah@meridian.co" incoming="sarah@meridian.co"  match="same"/>
            <FieldRow label="Phone"         existing="+1 (415) 555-0142" incoming="+1 415 555 0142"    match="conflict"/>
            <FieldRow label="Company"       existing="Meridian Agency"   incoming="Meridian"           match="conflict"/>
            <FieldRow label="Job title"     existing="CEO"               incoming=""                   match=""/>
            <FieldRow label="Status"        existing="Active"            incoming="Follow-up"          match="conflict"/>
            <FieldRow label="LinkedIn"      existing=""                  incoming="linkedin.com/in/sarahchen" match="new"/>
            <FieldRow label="Tags"          existing="hot-lead, decision-maker" incoming="enterprise"  match="conflict"/>
            <FieldRow label="Owner"         existing="Alex Morgan"       incoming="Alex Morgan"        match="same"/>
          </div>

          {/* Legend + notice */}
          <div className="shrink-0 px-5 py-2.5 border-t border-white/[0.04] flex items-center gap-4 text-[10.5px]" style={{background:'#09091a'}}>
            <div className="flex items-center gap-1.5"><I.AlertTriangle size={10} className="text-amber-300"/><span className="text-white/40">Conflicts will use the new value</span></div>
            <div className="flex items-center gap-1.5"><I.Check size={10} className="text-emerald-300"/><span className="text-white/40">Matching fields</span></div>
            <span className="text-[9.5px] px-1.5 py-0.5 rounded bg-emerald-500/12 text-emerald-300 ring-1 ring-emerald-500/20">new</span><span className="text-white/40">Added from new record</span>
            <div className="ml-auto flex items-center gap-1 text-white/35"><I.Info size={10}/><span>Merge keeps all activities, deals, and notes.</span></div>
          </div>

          {/* Footer */}
          <div className="shrink-0 px-5 py-3.5 border-t border-white/[0.06] flex items-center justify-between gap-3" style={{background:'#0a0a14'}}>
            <button onClick={onClose} className="px-3 py-2 rounded-lg text-[12px] font-medium text-white/55 hover:text-white hover:bg-white/[0.05] transition-colors">
              Go back
            </button>
            <div className="flex items-center gap-2">
              <button onClick={onKeepBoth}
                className="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-[12.5px] font-medium text-white/75 hover:text-white bg-white/[0.04] hover:bg-white/[0.07] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.Copy size={12}/> Keep both
              </button>
              <button onClick={doMerge} disabled={merging}
                className={['inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-[12.5px] font-semibold transition-all',
                  merging?'bg-brand-500/50 text-white/60 cursor-wait':'bg-brand-500 hover:bg-brand-400 text-white shadow-brand'].join(' ')}>
                {merging ? (
                  <><svg className="animate-spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10" strokeOpacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/></svg> Merging…</>
                ) : (
                  <><I.GitMerge size={12}/> Merge contacts</>
                )}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function Page() {
    const [open,setOpen]=React.useState(true);
    return (
      <div data-screen-label="Duplicate Detection" className="h-full relative" style={{background:'#09091a'}}>
        <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
          <div className="absolute rounded-full" style={{width:500,height:500,background:'rgba(99,102,241,0.055)',filter:'blur(140px)',top:-200,right:-100}}/>
        </div>
        <NewContactFormBg/>
        {open && <DuplicateModal onMerge={()=>setOpen(false)} onKeepBoth={()=>setOpen(false)} onClose={()=>setOpen(false)}/>}
        {!open && (
          <div className="absolute inset-0 flex items-center justify-center z-40">
            <button onClick={()=>setOpen(true)} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-brand transition-all">
              <I.AlertTriangle size={14}/> Reopen duplicate modal
            </button>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
