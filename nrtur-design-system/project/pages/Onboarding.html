<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set up your workspace — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />

  <!-- Tailwind CDN + brand-aware config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
              400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
              800: '#3730a3', 900: '#312e81',
            },
            surface: { 950: '#07070f', 925: '#09091a', 900: '#0b0b18', 850: '#0d0d1a' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          boxShadow: {
            'brand':    '0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg': '0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
            'window':   '0 0 0 1px rgba(255,255,255,0.07), 0 32px 120px rgba(0,0,0,0.70)',
          },
          keyframes: {
            fadeUp:    { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            shimmer:   { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            glowPulse: { '0%,100%': { opacity: 0.5 }, '50%': { opacity: 1 } },
          },
          animation: {
            'fade-up':   'fadeUp 600ms ease-out both',
            'shimmer':   'shimmer 2s linear infinite',
            'glow-pulse':'glowPulse 3s ease-in-out infinite',
          },
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; min-height: 100%; }
    body {
      margin: 0;
      background: #07070f;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(99,102,241,0.35); }

    /* Skeleton shimmer */
    .skeleton-bar {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
    }

    /* Fixed bg layers */
    .onb-bg-grid {
      background-image:
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 85%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 85%);
    }
    .onb-bg-noise {
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ----- Inline icon helper -----
    const Ico = ({ d, size = 16, stroke = 2, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const I = {
      Check:        (p) => <Ico {...p} d={<path d="M20 6 9 17l-5-5"/>} />,
      ArrowRight:   (p) => <Ico {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />,
      ChevronDown:  (p) => <Ico {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      Building:     (p) => <Ico {...p} d={<><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></>} />,
      Briefcase:    (p) => <Ico {...p} d={<><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />,
      Users:        (p) => <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      Sparkles:     (p) => <Ico {...p} d={<><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></>} />,
    };

    const STEPS = [
      { n: 1, label: 'Workspace' },
      { n: 2, label: 'Pipeline' },
      { n: 3, label: 'Integrations' },
      { n: 4, label: 'Invite team' },
    ];

    const INDUSTRIES = ['Agency', 'Consulting', 'SaaS', 'Service Business', 'Other'];
    const TEAM_SIZES = ['Just me', '2–3', '4–5', '5+'];

    function NrturLogo() {
      return (
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-brand"
               style={{ background: 'linear-gradient(135deg, #6366f1, #7c3aed)' }}>
            <span className="text-white font-black text-sm leading-none">n</span>
          </div>
          <span className="text-white font-bold text-[17px] tracking-tight">nrtur</span>
        </div>
      );
    }

    // ----- Progress bar + step dots -----
    function StepProgress({ current, total }) {
      const pct = Math.round((current / total) * 100);
      return (
        <div className="w-full">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              {Array.from({ length: total }).map((_, i) => {
                const idx = i + 1;
                const done = idx < current;
                const active = idx === current;
                return (
                  <div key={idx} className="flex items-center gap-2">
                    <div className={[
                      'w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-semibold transition-all duration-300',
                      done   ? 'bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/40' : '',
                      active ? 'bg-brand-500 text-white shadow-brand'                    : '',
                      !done && !active ? 'bg-white/[0.04] text-white/40 ring-1 ring-white/[0.06]' : '',
                    ].join(' ')}>
                      {done ? <I.Check size={12} stroke={2.6} /> : idx}
                    </div>
                    <span className={[
                      'text-[12px] font-medium transition-colors',
                      active ? 'text-white' : (done ? 'text-white/60' : 'text-white/30'),
                    ].join(' ')}>
                      {STEPS[i].label}
                    </span>
                    {idx < total && <div className="w-6 h-px bg-white/[0.06] ml-1" />}
                  </div>
                );
              })}
            </div>
            <span className="text-[11px] text-white/40 font-medium">Step {current} of {total}</span>
          </div>
          <div className="h-1 w-full rounded-full bg-white/[0.06] overflow-hidden">
            <div
              className="h-full rounded-full transition-all duration-500"
              style={{
                width: pct + '%',
                background: 'linear-gradient(90deg, #6366f1, #818cf8)',
                boxShadow: '0 0 12px rgba(99,102,241,0.5)',
              }}
            />
          </div>
        </div>
      );
    }

    // ----- Field primitives -----
    function FieldLabel({ children, hint }) {
      return (
        <div className="flex items-center justify-between mb-2">
          <label className="text-[12px] font-medium text-white/70">{children}</label>
          {hint && <span className="text-[11px] text-white/40">{hint}</span>}
        </div>
      );
    }

    function TextInput({ value, onChange, placeholder, iconLeft }) {
      return (
        <div className="group flex items-center bg-white/[0.04] border border-white/[0.08] rounded-xl
                        focus-within:border-brand-500/50 focus-within:bg-white/[0.05]
                        focus-within:shadow-[0_0_0_3px_rgba(99,102,241,0.12)]
                        hover:border-white/[0.14]
                        transition-all duration-150">
          {iconLeft && <span className="pl-3.5 text-white/40">{iconLeft}</span>}
          <input
            type="text"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className="flex-1 min-w-0 bg-transparent outline-none px-3.5 py-3 text-[14px] text-white placeholder:text-white/30"
          />
        </div>
      );
    }

    function Dropdown({ options, value, onChange, placeholder }) {
      const [open, setOpen] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, []);
      return (
        <div ref={ref} className="relative">
          <button
            type="button"
            onClick={() => setOpen(!open)}
            className={[
              'w-full flex items-center justify-between gap-2',
              'bg-white/[0.04] border border-white/[0.08] rounded-xl',
              'px-3.5 py-3 text-[14px]',
              'hover:border-white/[0.14] transition-all duration-150',
              open ? 'border-brand-500/50 bg-white/[0.05] shadow-[0_0_0_3px_rgba(99,102,241,0.12)]' : '',
            ].join(' ')}
          >
            <span className={value ? 'text-white' : 'text-white/30'}>
              {value || placeholder}
            </span>
            <I.ChevronDown size={14} stroke={2} className={'text-white/40 transition-transform ' + (open ? 'rotate-180' : '')} />
          </button>
          {open && (
            <div className="absolute z-20 left-0 right-0 mt-2 rounded-xl bg-surface-925/95 backdrop-blur-xl
                            border border-white/[0.08] shadow-window p-1.5 animate-fade-up"
                 style={{ animationDuration: '120ms' }}>
              {options.map((opt) => (
                <button
                  key={opt}
                  type="button"
                  onClick={() => { onChange(opt); setOpen(false); }}
                  className={[
                    'w-full text-left px-3 py-2 rounded-lg text-[13px] flex items-center justify-between',
                    'transition-colors',
                    value === opt
                      ? 'bg-brand-500/15 text-brand-200'
                      : 'text-white/70 hover:bg-white/[0.04] hover:text-white',
                  ].join(' ')}
                >
                  {opt}
                  {value === opt && <I.Check size={13} stroke={2.4} className="text-brand-400" />}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function RadioPills({ options, value, onChange }) {
      return (
        <div className="grid grid-cols-4 gap-2">
          {options.map((opt) => {
            const selected = value === opt;
            return (
              <button
                key={opt}
                type="button"
                onClick={() => onChange(opt)}
                className={[
                  'px-3 py-2.5 rounded-xl text-[13px] font-medium transition-all duration-150',
                  'border',
                  selected
                    ? 'bg-brand-500/15 border-brand-500/40 text-brand-200 shadow-[0_0_0_3px_rgba(99,102,241,0.10)]'
                    : 'bg-white/[0.03] border-white/[0.08] text-white/60 hover:text-white hover:border-white/[0.16] hover:bg-white/[0.05]',
                ].join(' ')}
              >
                {opt}
              </button>
            );
          })}
        </div>
      );
    }

    // ----- Right-side faux dashboard "being set up" -----
    function DashboardSkeleton() {
      return (
        <div className="relative h-full rounded-2xl overflow-hidden border border-white/[0.06]"
             style={{ background: 'linear-gradient(180deg, #0b0b18, #07070f)' }}>
          {/* window chrome */}
          <div className="px-4 py-3 flex items-center gap-3 border-b border-white/[0.05] bg-surface-900">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-[#ff5f57]" />
              <div className="w-3 h-3 rounded-full bg-[#febc2e]" />
              <div className="w-3 h-3 rounded-full bg-[#28c840]" />
            </div>
            <div className="flex-1 flex justify-center">
              <div className="bg-white/[0.04] border border-white/[0.06] rounded-md px-3 py-1 text-[11px] text-white/25 w-44 text-center">
                app.nrtur.com
              </div>
            </div>
          </div>

          {/* content (blurred + dimmed) */}
          <div className="relative p-5 space-y-4">
            <div className="grid grid-cols-3 gap-3">
              {[0, 1, 2].map(i => (
                <div key={i} className="rounded-xl border border-white/[0.05] bg-white/[0.03] p-4 space-y-2.5">
                  <div className="skeleton-bar h-2.5 w-1/2 rounded-full animate-shimmer" />
                  <div className="skeleton-bar h-5 w-2/3 rounded-md animate-shimmer" />
                  <div className="skeleton-bar h-2 w-1/3 rounded-full animate-shimmer" />
                </div>
              ))}
            </div>

            <div className="grid grid-cols-4 gap-3">
              {[0,1,2,3].map(col => (
                <div key={col} className="space-y-2.5">
                  <div className="flex items-center gap-1.5 mb-2.5">
                    <span className={'w-1.5 h-1.5 rounded-full ' + ['bg-white/30','bg-brand-400','bg-violet-400','bg-emerald-400'][col]} />
                    <div className="skeleton-bar h-2.5 w-16 rounded-full animate-shimmer" />
                  </div>
                  {[0,1,col === 0 ? 2 : null].filter(x => x !== null).map((_, j) => (
                    <div key={j} className="rounded-xl border border-white/[0.05] bg-white/[0.025] p-2.5 space-y-2">
                      <div className="skeleton-bar h-2.5 w-3/4 rounded-full animate-shimmer" />
                      <div className="skeleton-bar h-2 w-1/2 rounded-full animate-shimmer" />
                      <div className="flex items-center gap-1.5 pt-1">
                        <div className="w-4 h-4 rounded-full skeleton-bar animate-shimmer" />
                        <div className="skeleton-bar h-2 w-12 rounded-full animate-shimmer" />
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

          {/* Overlay — "being set up" */}
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none"
               style={{ background: 'radial-gradient(ellipse at center, rgba(7,7,15,0.55), rgba(7,7,15,0.85))' }}>
            <div className="rounded-2xl border border-white/[0.08] backdrop-blur-md px-5 py-4 max-w-[260px] text-center"
                 style={{ background: 'rgba(15,15,28,0.7)' }}>
              <div className="flex items-center justify-center gap-2 mb-2">
                <I.Sparkles size={14} stroke={2.2} className="text-brand-400 animate-glow-pulse" />
                <span className="text-[11px] font-semibold uppercase tracking-[0.14em] text-brand-300">Configuring</span>
              </div>
              <p className="text-[14px] font-semibold text-white leading-tight">Your dashboard is being set up…</p>
              <p className="text-[12px] text-white/50 mt-1.5 leading-relaxed">We'll tailor it to your workspace as you fill in the next few steps.</p>

              <div className="mt-4 space-y-2 text-left">
                {[
                  { label: 'Workspace details', status: 'now' },
                  { label: 'Default pipeline',  status: 'next' },
                  { label: 'Integrations',      status: 'next' },
                  { label: 'Team invites',      status: 'next' },
                ].map((row, i) => (
                  <div key={i} className="flex items-center gap-2 text-[11px]">
                    {row.status === 'now' ? (
                      <span className="w-2 h-2 rounded-full bg-brand-400 animate-glow-pulse" />
                    ) : (
                      <span className="w-2 h-2 rounded-full bg-white/15" />
                    )}
                    <span className={row.status === 'now' ? 'text-white/80 font-medium' : 'text-white/35'}>{row.label}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ----- Main app -----
    function OnboardingApp() {
      const [step] = React.useState(1); // step 1 active per spec
      const [company, setCompany]   = React.useState('');
      const [industry, setIndustry] = React.useState('');
      const [teamSize, setTeamSize] = React.useState('');

      const canContinue = company.trim().length > 0 && industry && teamSize;

      return (
        <div data-screen-label="Onboarding · Step 1 of 4"
             className="relative min-h-screen flex flex-col">
          {/* Background */}
          <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute rounded-full"
                 style={{ width: 800, height: 800, background: 'rgba(99,102,241,0.22)', filter: 'blur(140px)', top: -260, left: '50%', transform: 'translateX(-50%)' }} />
            <div className="absolute rounded-full"
                 style={{ width: 520, height: 520, background: 'rgba(124,58,237,0.14)', filter: 'blur(140px)', bottom: -160, right: -100 }} />
            <div className="absolute rounded-full"
                 style={{ width: 400, height: 400, background: 'rgba(67,56,202,0.12)', filter: 'blur(140px)', bottom: -80, left: -80 }} />
            <div className="absolute inset-0 onb-bg-grid" />
            <div className="absolute inset-0 onb-bg-noise" />
          </div>

          {/* Top bar */}
          <header className="relative z-10 px-6 lg:px-10 py-6 flex items-center justify-between">
            <NrturLogo />
            <div className="flex items-center gap-3">
              <span className="hidden sm:inline text-[12px] text-white/40">Signed in as <span className="text-white/70 font-medium">sarah@bloom.co</span></span>
              <button className="text-[12px] text-white/60 hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/[0.04] transition-colors">
                Sign out
              </button>
            </div>
          </header>

          {/* Main card */}
          <main className="relative z-10 flex-1 px-4 sm:px-6 lg:px-10 pb-12">
            <div className="mx-auto w-full max-w-[1180px] animate-fade-up">
              <div className="rounded-3xl border border-white/[0.06] backdrop-blur-xl overflow-hidden"
                   style={{
                     background: 'rgba(255,255,255,0.025)',
                     boxShadow: '0 0 0 1px rgba(255,255,255,0.04), 0 32px 100px rgba(0,0,0,0.6), 0 0 140px rgba(99,102,241,0.08)',
                   }}>
                {/* Progress region */}
                <div className="px-6 sm:px-8 lg:px-10 pt-7 pb-6 border-b border-white/[0.05]">
                  <StepProgress current={step} total={4} />
                </div>

                {/* Body — split */}
                <div className="grid grid-cols-1 lg:grid-cols-[1fr_minmax(0,40%)]">
                  {/* Form column */}
                  <div className="p-6 sm:p-8 lg:p-10">
                    <div className="max-w-[440px]">
                      <span className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-500/10 border border-brand-500/20 mb-5">
                        <span className="w-1.5 h-1.5 rounded-full bg-brand-400 animate-glow-pulse" />
                        <span className="text-[11px] font-semibold text-brand-300 uppercase tracking-[0.14em]">Step 1 · Workspace</span>
                      </span>

                      <h1 className="text-[34px] sm:text-[38px] font-black tracking-tight leading-[1.1] text-white">
                        Let's set up<br/>your workspace
                      </h1>
                      <p className="mt-3 text-[15px] text-white/50 leading-relaxed">
                        This takes about 5 minutes. You can always change this later.
                      </p>

                      <div className="mt-8 space-y-5">
                        <div>
                          <FieldLabel>Company name</FieldLabel>
                          <TextInput
                            value={company}
                            onChange={setCompany}
                            placeholder="Bloom Creative"
                            iconLeft={<I.Building size={15} stroke={2} />}
                          />
                        </div>

                        <div>
                          <FieldLabel>Industry</FieldLabel>
                          <Dropdown
                            options={INDUSTRIES}
                            value={industry}
                            onChange={setIndustry}
                            placeholder="Choose your industry"
                          />
                        </div>

                        <div>
                          <FieldLabel hint="Pick what's closest">Team size</FieldLabel>
                          <RadioPills
                            options={TEAM_SIZES}
                            value={teamSize}
                            onChange={setTeamSize}
                          />
                        </div>
                      </div>

                      <div className="mt-9 flex items-center justify-between gap-4">
                        <button
                          type="button"
                          className="text-[13px] text-white/50 hover:text-white transition-colors"
                        >
                          I'll do this later
                        </button>
                        <button
                          type="button"
                          disabled={!canContinue}
                          className={[
                            'inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-[14px]',
                            'transition-all duration-200',
                            canContinue
                              ? 'bg-brand-500 hover:bg-brand-400 text-white shadow-brand hover:shadow-brand-lg hover:-translate-y-0.5'
                              : 'bg-white/[0.06] text-white/30 cursor-not-allowed border border-white/[0.06]',
                          ].join(' ')}
                        >
                          Continue
                          <I.ArrowRight size={15} stroke={2.4} />
                        </button>
                      </div>

                      <p className="mt-6 text-[11px] text-white/30 leading-relaxed">
                        Pressing Continue creates your workspace at <span className="font-mono text-white/45">app.nrtur.com/{(company || 'your-company').toLowerCase().replace(/\s+/g,'-').slice(0,20) || 'your-company'}</span>.
                      </p>
                    </div>
                  </div>

                  {/* Preview column */}
                  <div className="hidden lg:block border-l border-white/[0.05] bg-white/[0.015] p-6">
                    <DashboardSkeleton />
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OnboardingApp />);
  </script>
</body>
</html>
