  // ---------- Re-subscribe modal ----------
  function ResubModal({contact, onConfirm, onClose}) {
    const [done, setDone] = useState(false);
    function confirm() { setDone(true); setTimeout(()=>{ onConfirm(contact.id); onClose(); }, 900); }
    const ch = contact.channel==='sms' ? 'SMS' : 'Email';
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.65)',backdropFilter:'blur(6px)'}}>
        <div className="w-[400px] rounded-2xl border border-white/[0.10] shadow-[0_32px_80px_rgba(0,0,0,0.6)] p-6 animate-fade-up" style={{background:'#0d0d1f'}}>
          {done ? (
            <div className="text-center py-2">
              <div className="w-11 h-11 rounded-2xl bg-emerald-500/15 ring-1 ring-emerald-500/30 text-emerald-300 flex items-center justify-center mx-auto mb-3">
                <I.Check size={18}/>
              </div>
              <p className="text-[15px] font-bold text-white">{contact.name} re-subscribed.</p>
              <p className="text-[12.5px] text-white/50 mt-1">{ch} messages re-enabled.</p>

            <>

                </button>
              </div>

              {/* Contact preview */}
              <div className="flex items-center gap-3 px-3.5 py-3 rounded-xl bg-white/[0.025] border border-white/[0.06] mb-5">

  // ---------- Channel badge ----------
  function ChannelBadge({channel}) {
    return channel==='sms' ? (
      <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10.5px] font-semibold bg-amber-500/12 text-amber-300 ring-1 ring-amber-500/25">
        <I.MessageSq size={9}/> SMS
      </span>
    ) : (
      <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10.5px] font-semibold bg-blue-500/12 text-blue-300 ring-1 ring-blue-500/25">
        <I.Mail size={9}/> Email
      </span>
    );
  }

  // ---------- Summary card ----------
  function StatCard({label, value, icon: Icon, bg, fg, ring, glow}) {
    return (
      <div className={['rounded-2xl border p-5 flex items-start gap-4', ring].join(' ')} style={{background: bg}}>
        <div className={['w-11 h-11 rounded-xl flex items-center justify-center shrink-0', fg].join(' ')} style={{boxShadow:glow}}>
          <Icon size={18}/>
        </div>
        <div>
          <p className="text-[11px] font-semibold uppercase tracking-wider text-white/45 mb-1">{label}</p>
          <p className="text-[32px] font-black text-white leading-none tabular-nums">{value}</p>
        </div>
      </div>
    );

  // ---------- Page ----------
  function UnsubscribesPage() {
    const [records, setRecords] = useState(SEED);
    const [filter, setFilter] = useState('all');
    const [modal, setModal] = useState(null); // contact object | null
    const [exported, setExported] = useState(false);

    const filtered = filter==='all' ? records : records.filter(r=>r.channel===filter);
    const smsCount = records.filter(r=>r.channel==='sms').length;
    const emailCount = records.filter(r=>r.channel==='email').length;

    function resubscribe(id) {
      setRecords(prev=>prev.filter(r=>r.id!==id));
    }

    function exportCSV() {
      const header = 'Contact,Channel,Date,Reason';
      const rows = filtered.map(r=>`"${r.name}","${r.channel}","${r.date}","${r.reason}"`).join('\n');
      const blob = new Blob([header+'\n'+rows], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='unsubscribes.csv'; a.click();
      URL.revokeObjectURL(url);
      setExported(true); setTimeout(()=>setExported(false),1600);
    }

    const REASON_COLORS = {
      'STOP reply':          'text-amber-300/90',
      'Too frequent':        'text-orange-300/90',
      'Not relevant':        'text-white/55',
      'Marked as spam':      'text-red-300/90',
      'Unsubscribed via link':'text-white/55',
      'Manual removal':      'text-white/55',
    };

    const filters = [{key:'all',label:'All',count:records.length},{key:'sms',label:'SMS',count:smsCount},{key:'email',label:'Email',count:emailCount}];

    return (
      <div data-screen-label="Settings Unsubscribes" className="h-full flex" style={{background:'#09091a'}}>
        <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
          <div className="absolute rounded-full" style={{width:480,height:480,background:'rgba(99,102,241,0.06)',filter:'blur(140px)',top:-180,right:-120}}/>
        </div>

        <div className="relative z-10 flex w-full h-full">
          <AppSidebar/>
          <SettingsNav/>

          <div className="flex-1 flex flex-col min-w-0">
            {/* Header */}
            <header className="shrink-0 border-b border-white/[0.05] px-8 py-4 flex items-center justify-between" style={{background:'#09091a'}}>
              <div>
                <h1 className="text-[18px] font-bold text-white">Unsubscribes</h1>
                <p className="text-[12.5px] text-white/45 mt-0.5">{records.length} contacts have opted out of messages</p>
              </div>
              <button onClick={exportCSV}
                className={['inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[13px] font-semibold transition-all', exported?'bg-emerald-500/15 text-emerald-300 ring-1 ring-emerald-500/30':'text-white/75 bg-white/[0.04] hover:bg-white/[0.08] border border-white/[0.08] hover:border-white/[0.18]'].join(' ')}>
                {exported?<><I.Check size={14}/> Exported!</>:<><I.Download size={14}/> Export CSV</>}
              </button>
            </header>

            <div className="flex-1 overflow-y-auto scroll-area px-8 py-6">
              {/* Summary cards */}
              <div className="grid grid-cols-3 gap-4 mb-8">
                <StatCard
                  label="Total opted out" value={records.length}
                  icon={I.UserX}
                  bg="rgba(99,102,241,0.06)" ring="border-brand-500/20"
                  fg="bg-brand-500/15 text-brand-300"
                  glow="0 0 20px rgba(99,102,241,0.25)"
                />
                <StatCard
                  label="SMS unsubscribes" value={smsCount}
                  icon={I.MessageSq}
                  bg="rgba(245,158,11,0.06)" ring="border-amber-500/20"
                  fg="bg-amber-500/12 text-amber-300"
                  glow="0 0 20px rgba(245,158,11,0.20)"
                />
                <StatCard
                  label="Email unsubscribes" value={emailCount}
                  icon={I.Mail}
                  bg="rgba(59,130,246,0.06)" ring="border-blue-500/20"
                  fg="bg-blue-500/12 text-blue-300"
                  glow="0 0 20px rgba(59,130,246,0.18)"
                />
              </div>

              {/* Filter tabs */}
              <div className="flex items-center gap-1 mb-4">
                {filters.map(f=>{
                  const a = filter===f.key;
                  return (
                    <button key={f.key} onClick={()=>setFilter(f.key)}
                      className={['inline-flex items-center gap-2 px-3.5 py-1.5 rounded-lg text-[13px] font-medium transition-all',
                        a ? 'bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25' : 'text-white/55 hover:text-white hover:bg-white/[0.05]'].join(' ')}>
                      {f.label}
                      <span className={['text-[11px] tabular-nums px-1.5 py-0.5 rounded-full font-semibold', a?'bg-brand-500/20 text-brand-200':'bg-white/[0.07] text-white/40'].join(' ')}>{f.count}</span>
                    </button>
                  );
                })}
              </div>

              {/* Table */}
              <div className="rounded-2xl border border-white/[0.06] bg-white/[0.018] overflow-hidden">
                {/* Table header */}
                <div className="grid px-5 py-2.5 text-[10.5px] font-semibold uppercase tracking-wider text-white/35 border-b border-white/[0.05]"
                  style={{gridTemplateColumns:'1fr 100px 130px 1fr 130px'}}>
                  <span>Contact</span>
                  <span>Channel</span>
                  <span>Date opted out</span>
                  <span>Reason</span>
                  <span></span>
                </div>

                {/* Rows */}
                {filtered.length === 0 ? (
                  <div className="py-14 text-center">
                    <div className="w-10 h-10 rounded-xl bg-white/[0.04] text-white/30 flex items-center justify-center mx-auto mb-3">
                      <I.Check size={18}/>
                    </div>
                    <p className="text-[14px] font-semibold text-white/70">All clear</p>
                    <p className="text-[12.5px] text-white/40 mt-1">No unsubscribes in this category.</p>
                  </div>
                ) : filtered.map((r, i) => (
                  <div key={r.id}
                    className={['grid items-center px-5 py-3.5 transition-colors hover:bg-white/[0.02]', i<filtered.length-1?'border-b border-white/[0.04]':''].join(' ')}
                    style={{gridTemplateColumns:'1fr 100px 130px 1fr 130px', animationDelay:`${i*25}ms`}}>

                    {/* Contact */}
                    <div className="flex items-center gap-3 min-w-0">
                      <div className="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0" style={{background:r.color}}>
                        {r.init}
                      </div>
                      <span className="text-[13.5px] font-semibold text-white truncate">{r.name}</span>
                    </div>

                    {/* Channel badge */}
                    <div><ChannelBadge channel={r.channel}/></div>

                    {/* Date */}
                    <span className="text-[12.5px] text-white/50 tabular-nums">{r.date}</span>

                    {/* Reason */}
                    <span className={['text-[12.5px] font-medium', REASON_COLORS[r.reason]||'text-white/55'].join(' ')}>{r.reason}</span>

                    {/* Re-subscribe */}
                    <div className="flex justify-end">
                      <button onClick={()=>setModal(r)}
                        className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-emerald-300/80 hover:text-emerald-200 border border-emerald-500/20 hover:border-emerald-500/40 bg-transparent hover:bg-emerald-500/[0.07] transition-all">
                        <I.UserCheck size={12}/> Re-subscribe
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              {/* Footer note */}
              {filtered.length > 0 && (
                <p className="mt-4 text-[11.5px] text-white/35 leading-relaxed">
                  <I.AlertTriangle size={11} className="inline-block mr-1 text-white/25 relative -top-px"/>
                  Re-subscribing a contact overrides their opt-out. Only do this with explicit written consent from the contact.
                </p>
              )}
            </div>
          </div>
        </div>

        {modal && <ResubModal contact={modal} onConfirm={resubscribe} onClose={()=>setModal(null)}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<UnsubscribesPage/>);
</script>
</body>
</html>
