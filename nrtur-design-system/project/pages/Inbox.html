        preview:'5 new deals created · $86k added · 2 deals closed won totaling $66k. Win rate this week: 71%.',
        time:'May 12', date:'May 12',
        labelKey:'follow-up', automation: true,
      },
      {
        id:8, unread:false, starred:false, attach:true,
        from:'Riley Voss', fromShort:'Riley V.', avatar:'RV', color:'#64748b',
        subject:'Out of office — re: Clearview Media',
        preview:'Out through May 25. For anything urgent please reach out to Jordan Parks on my team (jordan@clearview.tv).',
        time:'May 10', date:'May 10',
        labelKey:'cold',
      },
    ];

    function EmailListItem({ email, selected, onClick }) {
      const labelColor = (LABELS.find(l => l.key === email.labelKey) || {}).color;
      return (
        <button onClick={onClick}
          className={[
            'w-full text-left px-4 py-3 border-b border-white/[0.03] transition-colors flex gap-3',
            selected ? 'bg-brand-500/[0.08] border-l-2 border-l-brand-400' : 'hover:bg-white/[0.025] border-l-2 border-l-transparent'
          ].join(' ')}>
          <div className="relative shrink-0">
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold text-white" style={{ background: email.color }}>
              {email.avatar}
            </div>
            {email.unread && <span className="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-brand-400 ring-2 ring-[#09091a]"/>}
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-2 mb-1">
              <div className="flex items-center gap-1.5 min-w-0">
                <p className={['text-[13px] truncate', email.unread ? 'text-white font-bold' : 'text-white/70 font-medium'].join(' ')}>{email.fromShort}</p>
                {email.starred && <I.Star size={10} stroke={0} fill="#fbbf24" className="text-amber-400 shrink-0"/>}
              </div>
              <span className="text-[11px] text-white/40 shrink-0">{email.time}</span>
            </div>
            <p className={['text-[12.5px] truncate mb-1', email.unread ? 'text-white/85 font-medium' : 'text-white/55'].join(' ')}>
              {email.subject}
            </p>
            <p className="text-[11.5px] text-white/40 truncate leading-snug">{email.preview}</p>
            <div className="flex items-center gap-2 mt-2 flex-wrap">
              {email.linkedDeal && (
                <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-[10px] font-medium bg-brand-500/10 text-brand-300 ring-1 ring-brand-500/20">
                  <span className="w-1 h-1 rounded-full" style={{ background: email.linkedDeal.stageColor }}/>
                  {email.linkedDeal.name} · {email.linkedDeal.value}
                </span>
              )}
              {labelColor && !email.linkedDeal && (
                <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-[10px] text-white/55 bg-white/[0.04] ring-1 ring-white/[0.06]">
                  <span className="w-1 h-1 rounded-sm" style={{ background: labelColor }}/>
                  {(LABELS.find(l => l.key === email.labelKey) || {}).label}
                </span>
              )}
              {email.attach && (
                <span className="inline-flex items-center gap-1 text-[10px] text-white/45">
                  <I.Paperclip size={9} stroke={2.2}/> 1
                </span>
              )}
              {email.automation && (
                <span className="inline-flex items-center gap-1 text-[10px] text-violet-300">
                  <I.Sparkles size={9} stroke={2}/> Automation
                </span>
              )}
            </div>
          </div>
        </button>
      );
    }

    function EmailList({ selectedId, setSelectedId }) {
      return (
        <section className="w-[400px] shrink-0 border-r border-white/[0.05] flex flex-col" style={{ background:'#0a0a1c' }}>
          <div className="px-4 py-3 border-b border-white/[0.05] flex items-center justify-between" style={{ background:'#0a0a1c' }}>
            <div className="flex items-center gap-2">
              <p className="text-[13px] font-semibold text-white">All Inboxes</p>
              <span className="text-[11px] text-white/40">·</span>
              <span className="text-[11px] text-white/40 tabular-nums">{EMAILS.filter(e => e.unread).length} unread</span>
            </div>
            <div className="flex items-center gap-1">
              <button title="Sort" className="w-6 h-6 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center text-[10px] font-mono">↕</button>
              <button title="More" className="w-6 h-6 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center"><I.More size={13}/></button>
            </div>
          </div>

          {/* Smart filter chips */}
          <div className="px-3 py-2 border-b border-white/[0.04] flex items-center gap-1.5 overflow-x-auto scroll-area" style={{ background:'#0a0a1c' }}>
            {['All', 'Unread', 'With deals', 'Needs reply'].map((c, i) => (
              <button key={c}
                className={[
                  'shrink-0 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[11px] font-medium transition-all',
                  i === 0 ? 'bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25'
                          : 'text-white/50 hover:text-white/85 hover:bg-white/[0.04]'
                ].join(' ')}>
                {c}
              </button>
            ))}
            <div className="ml-auto text-[10px] text-white/35 shrink-0 inline-flex items-center gap-1.5 px-2">
              <I.Sparkles size={9} stroke={2}/> AI sort
            </div>
          </div>

          <div className="flex-1 overflow-y-auto scroll-area">
            {EMAILS.map(e => (
              <EmailListItem key={e.id} email={e} selected={selectedId === e.id} onClick={() => setSelectedId(e.id)}/>
            ))}
            <div className="p-5 text-center">
              <p className="text-[11px] text-white/30">Inbox zero by Friday — keep going.</p>
            </div>
          </div>
        </section>
      );
    }

    // ---------- Email detail ----------
    function EmailDetail({ email }) {
      if (!email) {
        return (
          <section className="flex-1 min-w-0 flex items-center justify-center" style={{ background:'#09091a' }}>
            <div className="text-center max-w-xs">
              <div className="w-12 h-12 mx-auto rounded-2xl bg-white/[0.04] border border-white/[0.06] flex items-center justify-center text-white/40 mb-3">
                <I.Mail size={20}/>
              </div>
              <p className="text-[14px] text-white/55">Pick an email to read.</p>
            </div>
          </section>
        );
      }

      const hasThread = Array.isArray(email.thread);

      return (
        <section className="flex-1 min-w-0 flex flex-col" style={{ background:'#09091a' }}>
          {/* Detail toolbar */}
          <div className="shrink-0 border-b border-white/[0.05] px-6 py-3 flex items-center justify-between gap-3">
            <div className="flex items-center gap-1.5">
              <button title="Archive" className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all"><I.Archive size={14}/></button>
              <button title="Delete"  className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all"><I.Trash   size={14}/></button>
              <button title="Snooze"  className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all">
                <Ico size={14} d={<><circle cx="12" cy="13" r="8"/><path d="M5 3 2 6"/><path d="M22 6l-3-3"/><path d="M12 9v4l3 1"/></>}/>
              </button>
              <div className="w-px h-5 bg-white/[0.06] mx-1.5"/>
              <button title="Star" className="w-8 h-8 rounded-lg text-white/55 hover:text-amber-300 hover:bg-amber-500/10 flex items-center justify-center transition-all">
                <I.Star size={14} stroke={2} fill={email.starred ? '#fbbf24' : 'none'} className={email.starred ? 'text-amber-400' : ''}/>
              </button>
              <button title="Tag"  className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all"><I.Tag size={14}/></button>
            </div>
            <div className="flex items-center gap-1.5">
              <button className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-white/65 hover:text-white bg-white/[0.04] hover:bg-white/[0.08] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.Reply size={12}/> Reply
              </button>
              <button className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-white/65 hover:text-white bg-white/[0.04] hover:bg-white/[0.08] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.ReplyAll size={12}/> Reply all
              </button>
              <button className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-white/65 hover:text-white bg-white/[0.04] hover:bg-white/[0.08] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.Forward size={12}/> Forward
              </button>
              <button className="w-8 h-8 rounded-lg text-white/55 hover:text-white hover:bg-white/[0.06] flex items-center justify-center transition-all"><I.More size={14}/></button>
            </div>
          </div>

          {/* CRM context strip */}
          {email.contact && email.linkedDeal && (
            <div className="shrink-0 mx-6 mt-4 rounded-2xl border border-brand-500/20 bg-brand-500/[0.06] backdrop-blur-md p-3.5 flex items-center gap-4">
              <div className="w-10 h-10 rounded-full flex items-center justify-center text-[12px] font-bold text-white ring-2 ring-brand-500/30 shrink-0" style={{ background: email.contact.color }}>
                {email.contact.avatar}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <p className="text-[13px] font-semibold text-white">{email.contact.name}</p>
                  <span className="text-white/30 text-[12px]">·</span>
                  <p className="text-[12px] text-white/65">{email.contact.title}</p>
                </div>
                <div className="flex items-center gap-2 mt-1 flex-wrap">
                  <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-medium bg-white/[0.06] text-white/70">
                    <span className="w-1.5 h-1.5 rounded-full" style={{ background: email.linkedDeal.stageColor }}/>
                    {email.linkedDeal.stage}
                  </span>
                  <span className="text-[11px] text-white/55">
                    <span className="text-white font-semibold">{email.linkedDeal.value}</span> · {email.linkedDeal.name}
                  </span>
                </div>
              </div>
              <a href="#" className="text-[12px] font-medium text-brand-300 hover:text-brand-200 inline-flex items-center gap-1 shrink-0">
                View contact <I.ExternalLink size={11} stroke={2.2}/>
              </a>
            </div>
          )}

          {/* Thread / single */}
          <div className="flex-1 overflow-y-auto scroll-area px-6 pt-6 pb-6">
            <div className="max-w-3xl">
              <h2 className="text-white text-[22px] font-bold tracking-tight leading-tight">{email.subject}</h2>
              <div className="mt-2 flex items-center gap-3 text-[11px] text-white/45 flex-wrap">
                <span className="inline-flex items-center gap-1.5">
                  <span className="w-1.5 h-1.5 rounded-sm bg-emerald-400"/>
                  Inbox
                </span>
                <span className="text-white/25">·</span>
                <span>{hasThread ? email.thread.length : 1} message{hasThread && email.thread.length > 1 ? 's' : ''}</span>
                <span className="text-white/25">·</span>
                <span>Last activity {email.time}</span>
              </div>

              <div className="mt-6 flex flex-col gap-4">
                {hasThread ? email.thread.map((m, i) => <Message key={i} m={m} expanded={i === 0}/>)
                          : <Message m={{ from: email.from, addr: email.from.toLowerCase().replace(/\s+/g,'.') + '@example.com', avatar: email.avatar, color: email.color, date: `${email.date} · ${email.time}`, body: [email.preview] }} expanded/>}
              </div>

              <ReplyComposer name={email.contact ? email.contact.name.split(' ')[0] : email.from.split(' ')[0]}/>
            </div>
          </div>
        </section>
      );
    }

    function Message({ m, expanded }) {
      const [open, setOpen] = React.useState(!!expanded);
      return (
        <article className="rounded-2xl border border-white/[0.06] bg-white/[0.025] backdrop-blur-md overflow-hidden">
          <header className="flex items-start gap-3 px-5 py-4 cursor-pointer" onClick={() => setOpen(!open)}>
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0" style={{ background: m.color }}>{m.avatar}</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-baseline justify-between gap-3">
                <div className="min-w-0">
                  <p className="text-[13px] font-semibold text-white">{m.from} <span className="text-white/40 font-normal">&lt;{m.addr}&gt;</span></p>
                  <p className="text-[11px] text-white/45 mt-0.5">to <span className="text-white/65">me</span>{m.cc ? <span>, <span className="text-white/65">{m.cc}</span></span> : null}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  <span className="text-[11px] text-white/45">{m.date}</span>
                  <I.ChevronDown size={12} className={'text-white/40 transition-transform ' + (open ? '' : '-rotate-90')}/>
                </div>
              </div>
            </div>
          </header>

          {open && (
            <div className="px-5 pb-5">
              <div className="pt-2 border-t border-white/[0.04]">
                <div className="text-[13.5px] text-white/80 leading-relaxed mt-4 flex flex-col gap-3 whitespace-pre-wrap">
                  {m.body.map((para, i) => <p key={i} className="m-0">{para}</p>)}
                </div>

                {m.attachments && (
                  <div className="mt-5 flex items-center gap-2 flex-wrap">
                    {m.attachments.map(a => (
                      <div key={a.name} className="inline-flex items-center gap-2.5 px-3 py-2 rounded-lg bg-white/[0.04] border border-white/[0.08] hover:border-white/[0.14] cursor-pointer transition-all">
                        <div className="w-8 h-8 rounded-md bg-brand-500/12 ring-1 ring-brand-500/25 text-brand-300 flex items-center justify-center">
                          <I.Drafts size={13}/>
                        </div>
                        <div>
                          <p className="text-[12px] font-medium text-white leading-tight">{a.name}</p>
                          <p className="text-[10px] text-white/45">{a.size} · PDF</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </article>
      );
    }

    function ReplyComposer({ name }) {
      const [val, setVal] = React.useState('');
      return (
        <div className="mt-6 rounded-2xl border border-white/[0.08] bg-white/[0.03] backdrop-blur-md overflow-hidden">
          <div className="px-5 py-3 border-b border-white/[0.05] flex items-center justify-between">
            <p className="text-[12px] text-white/55">
              Replying to <span className="text-white font-medium">{name}</span>
            </p>
            <div className="flex items-center gap-1.5">
              <button className="text-[11px] text-white/50 hover:text-white px-2 py-1 rounded-md hover:bg-white/[0.04] transition-colors">Reply all</button>
              <button className="text-[11px] text-white/50 hover:text-white px-2 py-1 rounded-md hover:bg-white/[0.04] transition-colors">Forward</button>
            </div>
          </div>
          <textarea
            rows={4}
            value={val}
            onChange={e => setVal(e.target.value)}
            placeholder={`Hi ${name},`}
            className="w-full bg-transparent outline-none resize-none px-5 py-4 text-[13.5px] text-white placeholder:text-white/30 leading-relaxed"
          />
          <div className="flex items-center justify-between px-3 py-2.5 border-t border-white/[0.05]">
            <div className="flex items-center gap-1">
              <button title="Attach"  className="w-8 h-8 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center"><I.Paperclip size={14}/></button>
              <button title="Image"   className="w-8 h-8 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center"><I.Image     size={14}/></button>
              <button title="Emoji"   className="w-8 h-8 rounded-md text-white/45 hover:text-white hover:bg-white/[0.06] flex items-center justify-center"><I.Smile     size={14}/></button>
              <div className="w-px h-5 bg-white/[0.06] mx-1"/>
              <button title="AI draft" className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-[11px] font-medium text-violet-300 hover:text-violet-200 hover:bg-violet-500/10 transition-colors">
                <I.Sparkles size={11} stroke={2.2}/> AI draft
              </button>
            </div>
            <div className="flex items-center gap-2">
              <button className="text-[12px] text-white/50 hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/[0.04] transition-colors">Save draft</button>
              <button
                disabled={!val.trim()}
                className={[
                  'inline-flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-[12px] font-semibold transition-all',
                  val.trim()
                    ? 'bg-brand-500 hover:bg-brand-400 text-white shadow-brand'
                    : 'bg-white/[0.06] text-white/30 cursor-not-allowed'
                ].join(' ')}>
                <I.Send size={11} stroke={2.4}/>
                Send
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ---------- Page ----------
    function InboxPage() {
      const [folder, setFolder] = React.useState('inbox');
      const [selectedId, setSelectedId] = React.useState(1);
      const email = EMAILS.find(e => e.id === selectedId);

      return (
        <div data-screen-label="Inbox" className="h-full flex" style={{ background:'#09091a' }}>
          <div aria-hidden className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute rounded-full" style={{ width:560, height:560, background:'rgba(99,102,241,0.06)', filter:'blur(140px)', top:-220, right:-160 }}/>
            <div className="absolute rounded-full" style={{ width:420, height:420, background:'rgba(124,58,237,0.05)', filter:'blur(140px)', bottom:-200, left:200 }}/>
          </div>

          <div className="relative z-10 flex w-full h-full">
            <Sidebar active="email"/>

            <div className="flex-1 flex flex-col min-w-0">
              <InboxTopbar/>

              <div className="flex-1 flex min-h-0">
                <FolderRail active={folder} setActive={setFolder}/>
                <EmailList selectedId={selectedId} setSelectedId={setSelectedId}/>
                <EmailDetail email={email}/>
              </div>

              <div className="shrink-0 border-t border-white/[0.05] px-7 py-2 flex items-center justify-between" style={{ background:'#07070f' }}>
                <div className="flex items-center gap-2">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-glow-pulse"/>
                  <span className="text-[11px] text-white/40">Gmail synced 12s ago · 2 accounts</span>
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-[11px] text-white/30">Press <span className="font-mono px-1 py-0.5 rounded bg-white/[0.06] text-white/55">R</span> to reply · <span className="font-mono px-1 py-0.5 rounded bg-white/[0.06] text-white/55">E</span> to archive</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<InboxPage />);
  </script>
</body>
</html>
