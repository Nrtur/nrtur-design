<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    html, body { height: 100%; margin: 0; overflow-x: hidden; }
    body {
      background: var(--surface-950);
      color: var(--fg-1);
      font-family: var(--font-sans);
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    ::selection { background: rgba(99,102,241,0.35); }
    a { color: inherit; }
    button { font-family: inherit; }

    /* Background */
    .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent 80%);
    }
    .bg .orb-a { position: absolute; width: 720px; height: 720px; border-radius: 9999px;
      background: rgba(99,102,241,0.28); filter: blur(140px); top: -240px; left: 50%; transform: translateX(-50%); }
    .bg .orb-b { position: absolute; width: 520px; height: 520px; border-radius: 9999px;
      background: rgba(124,58,237,0.18); filter: blur(140px); bottom: -180px; right: -120px; }
    .bg .orb-c { position: absolute; width: 400px; height: 400px; border-radius: 9999px;
      background: rgba(67,56,202,0.14); filter: blur(140px); bottom: -100px; left: -100px; }
    .bg .noise {
      position: absolute; inset: 0; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Shell */
    .signin-shell {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 24px;
      animation: signFadeUp 600ms ease-out both;
    }
    @keyframes signFadeUp {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .signin-card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-3);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.6),
        0 0 120px rgba(99,102,241,0.08);
    }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .logo-tile {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.20);
    }
    .logo-tile span { color: #fff; font-weight: 900; font-size: 24px; line-height: 1; }

    h1.signin-title {
      margin: 0; text-align: center;
      font-size: 28px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15;
      color: var(--fg-1);
    }
    p.signin-sub {
      margin: 8px 0 0 0; text-align: center;
      font-size: 14px; color: var(--fg-5); line-height: 1.5;
    }

    /* OAuth-first stack */
    .oauth-stack { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
    .ghost-btn {
      width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-1);
      color: var(--fg-2);
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px; font-weight: 500;
      transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    }
    .ghost-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      color: var(--fg-1);
    }

    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 22px 0 18px;
      font-size: 12px; color: var(--fg-6);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border-3);
    }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px; font-weight: 500; color: var(--fg-4);
    }
    .label-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .label-row a.forgot {
      font-size: 12px; color: var(--fg-5); text-decoration: none;
      transition: color 150ms ease;
    }
    .label-row a.forgot:hover { color: #a5b4fc; }

    .input-wrap {
      position: relative;
      display: flex; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }
    .input-wrap:hover { border-color: rgba(255,255,255,0.14); }
    .input-wrap:focus-within {
      border-color: rgba(99,102,241,0.50);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrap input {
      flex: 1; min-width: 0;
      background: transparent; border: none; outline: none;
      padding: 12px 14px;
      color: var(--fg-1); font-size: 14px;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: var(--fg-7); }
    .input-icon-leading {
      padding-left: 14px; color: var(--fg-6);
      display: flex; align-items: center;
    }
    .input-icon-leading + input { padding-left: 10px; }
    .toggle-eye {
      background: transparent; border: none; cursor: pointer;
      padding: 0 14px; color: var(--fg-6);
      display: flex; align-items: center;
      transition: color 150ms ease;
    }
    .toggle-eye:hover { color: var(--fg-3); }
    .pw-shown .pw-hide { display: none; }
    .pw-shown .pw-show { display: flex; }
    .pw-hide { display: flex; }
    .pw-show { display: none; }

    /* Remember row */
    .remember-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 4px;
    }
    .checkbox {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--fg-4); cursor: pointer;
      user-select: none;
    }
    .checkbox input { display: none; }
    .checkbox .box {
      width: 16px; height: 16px; border-radius: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-1);
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 150ms ease;
    }
    .checkbox input:checked + .box {
      background: #6366f1;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }
    .checkbox .box svg { opacity: 0; transition: opacity 100ms ease; }
    .checkbox input:checked + .box svg { opacity: 1; }
    .checkbox:hover .box { border-color: rgba(255,255,255,0.20); }

    /* Primary CTA */
    .cta {
      width: 100%; margin-top: 14px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: #6366f1; color: #fff;
      padding: 13px 20px;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);
      transition: background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
    }
    .cta:hover { background: #818cf8; transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 8px 80px rgba(99,102,241,0.25); }
    .cta:active { transform: translateY(0); }

    /* Footer line */
    .signup-line {
      margin: 0; font-size: 13px; color: var(--fg-5);
      text-align: center;
    }
    .signup-line a {
      color: #818cf8; font-weight: 500; text-decoration: none;
      transition: color 150ms ease;
    }
    .signup-line a:hover { color: #a5b4fc; }

    .footnote {
      margin: 0; padding: 0;
      font-size: 11px; color: var(--fg-7);
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .footnote .dot { width: 6px; height: 6px; border-radius: 9999px; background: #34d399; }

    @media (max-width: 480px) {
      .signin-card { padding: 28px 22px; }
      h1.signin-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb-a"></div>
    <div class="orb-b"></div>
    <div class="orb-c"></div>
    <div class="grid"></div>
    <div class="noise"></div>
  </div>

  <div class="signin-shell" data-screen-label="Sign In">
    <div class="signin-card">
      <div class="logo-wrap">
        <div class="logo-tile"><span>n</span></div>
      </div>
      <h1 class="signin-title">Welcome back</h1>
      <p class="signin-sub">Sign in to your nrtur account.</p>

      <div class="oauth-stack">
        <button type="button" class="ghost-btn" aria-label="Continue with Google">
          <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20.4H24v7.2h11.3c-1.5 4.2-5.5 7.2-10.3 7.2-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.4 1.1 7.3 2.8l5.1-5.1C34.2 7.5 29.4 5.6 24 5.6 13.8 5.6 5.6 13.8 5.6 24S13.8 42.4 24 42.4c10.3 0 18.9-7.5 18.9-18.4 0-1.3-.1-2.4-.3-3.5z"/>
            <path fill="#FF3D00" d="M7.3 14.7l5.9 4.3C14.7 15.1 19 12 24 12c2.8 0 5.4 1.1 7.3 2.8l5.1-5.1C34.2 7.5 29.4 5.6 24 5.6 16.4 5.6 9.9 9.7 7.3 14.7z"/>
            <path fill="#4CAF50" d="M24 42.4c5.3 0 10.1-2 13.7-5.2l-6.3-5.2c-2 1.4-4.6 2.3-7.4 2.3-4.8 0-8.8-3-10.3-7.1l-5.9 4.6C10 38.6 16.5 42.4 24 42.4z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20.4H24v7.2h11.3c-.7 2-2 3.8-3.7 5.1l6.3 5.2c-.4.4 6.7-4.9 6.7-13.9 0-1.3-.1-2.4-.3-3.5z"/>
          </svg>
          Continue with Google
        </button>
        <button type="button" class="ghost-btn" aria-label="Continue with Microsoft">
          <svg width="16" height="16" viewBox="0 0 23 23" aria-hidden="true">
            <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
            <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
            <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
            <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
          </svg>
          Continue with Microsoft
        </button>
      </div>

      <div class="divider">or sign in with email</div>

      <form class="form" id="signin-form" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <span class="input-icon-leading" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                <path d="m22 7-10 5L2 7"></path>
              </svg>
            </span>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="sarah@yourcompany.com" required />
          </div>
        </div>

        <div class="field" id="pw-field">
          <div class="label-row">
            <label for="password">Password</label>
            <a class="forgot" href="#">Forgot password?</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon-leading" aria-hidden="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required />
            <button type="button" class="toggle-eye" id="toggle-pw" aria-label="Show password">
              <svg class="pw-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="pw-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                <line x1="2" x2="22" y1="2" y2="22"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label class="checkbox">
            <input type="checkbox" id="remember" />
            <span class="box">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </span>
            Remember me for 30 days
          </label>
        </div>

        <button type="submit" class="cta">
          Sign in
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </button>

        <p class="signup-line" style="margin-top: 18px;">
          New to nrtur? <a href="Sign Up.html">Start your free trial</a>
        </p>
      </form>
    </div>

    <p class="footnote">
      <span class="dot"></span>
      All systems operational
    </p>
  </div>

  <script>
    // Password show/hide.
    (() => {
      const btn = document.getElementById('toggle-pw');
      const input = document.getElementById('password');
      const field = document.getElementById('pw-field');
      btn.addEventListener('click', () => {
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        field.classList.toggle('pw-shown', !showing);
        btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      });
    })();
  </script>
</body>
</html>
