<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automations — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',
              400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',
              800:'#3730a3',900:'#312e81',
            },
            surface: { 950:'#07070f', 925:'#09091a', 900:'#0b0b18', 850:'#0d0d1a' },
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: {
            'brand':    '0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)',
            'brand-lg': '0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)',
          },
          keyframes: {
            fadeUp: { '0%': { opacity: 0, transform: 'translateY(8px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            glowPulse: { '0%,100%': { opacity: 0.5 }, '50%': { opacity: 1 } },
          },
          animation: { 'fade-up': 'fadeUp 400ms ease-out both', 'glow-pulse': 'glowPulse 3s ease-in-out infinite' },
        }
      }
    }
  </script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #09091a; color: #fff; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    ::selection { background: rgba(99,102,241,0.35); }
    .scroll-area::-webkit-scrollbar { width: 6px; height: 8px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.30); border-radius: 9999px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ---------- Icons ----------
    const Ico = ({ d, size = 16, stroke = 2, className = '', fill }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const I = {
      LayoutDash:  (p)=> <Ico {...p} d={<><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>}/>,
      Users:       (p)=> <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
      GitBranch:   (p)=> <Ico {...p} d={<><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>}/>,
      Mail:        (p)=> <Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
      Zap:         (p)=> <Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>,
      BarChart:    (p)=> <Ico {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>}/>,
      Settings:    (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>,
      Plus:        (p)=> <Ico {...p} d={<><path d="M5 12h14"/><path d="M12 5v14"/></>}/>,
      Search:      (p)=> <Ico {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>}/>,
      UserPlus:    (p)=> <Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></>}/>,
      Send:        (p)=> <Ico {...p} d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>}/>,
      CheckSquare: (p)=> <Ico {...p} d={<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>}/>,
      Bell:        (p)=> <Ico {...p} d={<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>}/>,
      Hash:        (p)=> <Ico {...p} d={<><line x1="4" x2="20" y1="9"  y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8"  y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></>}/>,
      Clock:       (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>,
      Flag:        (p)=> <Ico {...p} d={<><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></>}/>,
      MailOpen:    (p)=> <Ico {...p} d={<><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/><path d="m22 10-10 7L2 10"/></>}/>,
      Trophy:      (p)=> <Ico {...p} d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>}/>,
      Sparkles:    (p)=> <Ico {...p} d={<path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/>}/>,
      ChartBar:    (p)=> <Ico {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>}/>,
      MoreH:       (p)=> <Ico {...p} d={<><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>}/>,
      ArrowRight:  (p)=> <Ico {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>}/>,
      Edit:        (p)=> <Ico {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>}/>,
      Lock:        (p)=> <Ico {...p} d={<><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>}/>,
      Calendar:    (p)=> <Ico {...p} d={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8"  x2="8"  y1="2" y2="6"/><line x1="3"  x2="21" y1="10" y2="10"/></>}/>,
      Play:        (p)=> <Ico {...p} d={<polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/>}/>,
      ChevronDown: (p)=> <Ico {...p} d={<polyline points="6 9 12 15 18 9"/>}/>,
      CheckSquare: (p)=> <Ico {...p} d={<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>}/>,
    };

    // ---------- Sidebar ----------
    function Sidebar({ active = 'automations' }) {
      const items = [
        { key:'dash',        Icon: I.LayoutDash, label: 'Dashboard' },
        { key:'contacts',    Icon: I.Users,      label: 'Contacts' },
        { key:'pipeline',    Icon: I.GitBranch,  label: 'Pipeline' },
        { key:'email',       Icon: I.Mail,       label: 'Email' },
        { key:'automations', Icon: I.Zap,        label: 'Automations' },
        { key:'reports',     Icon: I.BarChart,   label: 'Reports' },
      ];
      return (
        <aside className="w-14 shrink-0 flex flex-col items-center py-5 gap-1.5 border-r border-white/[0.05]" style={{ background:'#07070f' }}>
          <a href="#" className="mb-4" title="nrtur">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-brand"
                 style={{ background: 'linear-gradient(135deg, #6366f1, #7c3aed)' }}>
              <span className="text-white font-black text-sm leading-none">n</span>
            </div>
          </a>
          {items.map(({ key, Icon, label }) => {
            const a = active === key;
            return (
              <button key={key} title={label}
                className={[
                  'w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150',
                  a
                    ? 'bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/25 shadow-[0_0_18px_rgba(99,102,241,0.35)]'
                    : 'text-white/30 hover:text-white/70 hover:bg-white/[0.04]'
                ].join(' ')}>
                <Icon size={16}/>
              </button>
            );
          })}
          <div className="mt-auto flex flex-col items-center gap-3">
            <button title="Settings" className="w-9 h-9 rounded-xl flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/[0.04] transition-all">
              <I.Settings size={16}/>
            </button>
            <button title="Alex Morgan" className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ring-1 ring-white/[0.06] hover:ring-white/20 transition-all" style={{ background:'#3b82f6' }}>
              AM
            </button>
          </div>
        </aside>
      );
    }

    // ---------- Topbar ----------
    function AutomationsTopbar() {
      return (
        <header className="shrink-0 border-b border-white/[0.05] px-7 py-4 flex items-center justify-between gap-6" style={{ background:'#09091a' }}>
          <div className="min-w-0">
            <h1 className="text-white text-[22px] font-bold tracking-tight leading-tight">Automations</h1>
            <p className="text-white/50 text-[13px] mt-1">
              <span className="inline-flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-glow-pulse"/>
                3 active
              </span>
              <span className="text-white/25 mx-2">·</span>
              7 available
              <span className="text-white/25 mx-2">·</span>
              <span className="font-mono tabular-nums text-white/70">422</span> runs this month
            </p>
          </div>
          <div className="flex items-center gap-2.5">
            <div className="flex items-center gap-2 bg-white/[0.04] border border-white/[0.08] rounded-xl px-3 py-2
                            focus-within:border-brand-500/40 focus-within:bg-white/[0.05]
                            focus-within:shadow-[0_0_0_3px_rgba(99,102,241,0.12)] transition-all w-64">
              <I.Search size={13} className="text-white/40"/>
              <input type="text" placeholder="Search automations…"
                     className="flex-1 bg-transparent outline-none text-[12px] text-white placeholder:text-white/30"/>
            </div>
            <button className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-[13px] font-semibold text-white
                               bg-brand-500 hover:bg-brand-400 shadow-brand hover:shadow-brand-lg
                               hover:-translate-y-0.5 active:translate-y-0 transition-all">
              <I.Plus size={14} stroke={2.4}/>
              New Automation
            </button>
          </div>
        </header>
      );
    }

    // ---------- Toggle ----------
    function Toggle({ on, onChange }) {
      return (
        <button onClick={() => onChange(!on)}
          className={[
            'relative w-10 h-6 rounded-full transition-all duration-200 shrink-0',
            on
              ? 'bg-brand-500 shadow-[0_0_0_3px_rgba(99,102,241,0.18),0_0_20px_rgba(99,102,241,0.35)]'
              : 'bg-white/[0.08] hover:bg-white/[0.12] ring-1 ring-white/[0.08]'
          ].join(' ')}
          role="switch" aria-checked={on}>
          <span className={[
            'absolute top-0.5 w-5 h-5 rounded-full bg-white shadow-md transition-all duration-200',
            on ? 'left-[18px]' : 'left-0.5 bg-white/80'
          ].join(' ')}/>
        </button>
      );
    }

    // ---------- Step pill (one node in an automation's flow) ----------
    function StepPill({ step, last }) {
      const Icon = step.Icon;
      return (
        <>
          <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.08] hover:border-white/[0.14] hover:bg-white/[0.07] transition-all whitespace-nowrap">
            <span className="w-5 h-5 rounded-md flex items-center justify-center" style={{ background: step.bg, color: step.fg }}>
              <Icon size={11} stroke={2.2}/>
            </span>
            <span className="text-[12px] font-medium text-white/80">{step.label}</span>
            {step.meta && <span className="text-[10px] text-white/35 font-mono">{step.meta}</span>}
          </div>
          {!last && (
            <span className="text-white/20 mx-0.5" aria-hidden>
              <I.ArrowRight size={12} stroke={2}/>
            </span>
          )}
        </>
      );
    }

    // ---------- Mini run-history sparkline ----------
    function Sparkline({ data, color = '#818cf8', height = 28, width = 96 }) {
      if (!data || data.length === 0) return null;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = (max - min) || 1;
      const step = width / (data.length - 1);
      const pts = data.map((v, i) => {
        const x = i * step;
        const y = height - ((v - min) / range) * (height - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');

      return (
        <svg width={width} height={height} className="overflow-visible">
          <defs>
            <linearGradient id={`spk-${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <polygon points={`0,${height} ${pts} ${width},${height}`} fill={`url(#spk-${color.slice(1)})`}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      );
    }

    // ---------- Error log ----------
    function ErrorLogSection({ history }) {
      const [open, setOpen] = React.useState(false);
      if (!history || history.length === 0) return null;
      const failCount = history.filter(r => !r.ok).length;
      return (
        <div className="mt-3 rounded-xl border border-white/[0.06] overflow-hidden">
          <button
            onClick={() => setOpen(o => !o)}
            className="w-full flex items-center justify-between px-3.5 py-2.5 hover:bg-white/[0.02] transition-colors">
            <div className="flex items-center gap-2.5">
              <span className="text-[11px] font-semibold uppercase tracking-wider text-white/40">Error log</span>
              <span className="text-[10px] text-white/25">· last 5 runs</span>
              {failCount > 0 ? (
                <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[9.5px] font-bold bg-red-500/15 text-red-300 ring-1 ring-red-500/20">
                  {failCount} failed
                </span>
              ) : (
                <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[9.5px] font-semibold bg-emerald-500/10 text-emerald-300 ring-1 ring-emerald-500/15">
                  All passed
                </span>
              )}
            </div>
            <I.ChevronDown size={12} className={'text-white/35 transition-transform duration-200 ' + (open ? 'rotate-180' : '')}/>
          </button>
          {open && (
            <div className="border-t border-white/[0.05]">
              {history.map((run, i) => (
                <div key={i} className={'flex items-start gap-3 px-3.5 py-2.5' + (i < history.length - 1 ? ' border-b border-white/[0.03]' : '')}>
                  <span className="font-mono text-[10.5px] text-white/30 shrink-0 tabular-nums w-36">{run.ts}</span>
                  <span className={[
                    'inline-flex items-center px-1.5 py-0.5 rounded text-[9.5px] font-semibold shrink-0 ring-1',
                    run.ok
                      ? 'bg-emerald-500/10 text-emerald-300 ring-emerald-500/20'
                      : 'bg-red-500/12 text-red-300 ring-red-500/20'
                  ].join(' ')}>
                    {run.ok ? 'Success' : 'Failed'}
                  </span>
                  {!run.ok && run.error && (
                    <span className="text-[11px] text-red-200/70 leading-tight">{run.error}</span>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ---------- Automation card ----------
    function AutomationCard({ auto, idx }) {
      const [on, setOn] = React.useState(auto.active);

      const [testState, setTestState] = React.useState(null); // null | 'running' | 'done' | 'error'
      const [testLog, setTestLog]   = React.useState([]);

      function runTest() {
        setTestState('running');
        setTestLog([]);
        const steps = [
          { t:300,  ok:true,  msg:`Trigger matched: deal stage → Proposal` },
          { t:700,  ok:true,  msg:`Contact resolved: sarah@meridian.co` },
          { t:1100, ok:true,  msg:`Step 1: Email queued via alex@bloom.co` },
          { t:1500, ok: auto.success >= 90, msg: auto.success >= 90
              ? `Step 2: Delay — will continue in 2 business days`
              : `Step 2 failed: Twilio API timeout (429 Too Many Requests)` },
          { t:1900, ok:true,  msg:`Test complete — no emails actually sent` },
        ];
        steps.forEach(s => {
          setTimeout(()=> {
            setTestLog(p => [...p, { ...s, ts: new Date().toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) }]);
            if (s === steps[steps.length-1]) {
              setTestState(steps.every(x=>x.ok) ? 'done' : 'error');
            }
          }, s.t);
        });
      }

      return (
        <div className={[
          'rounded-2xl border p-5 transition-all animate-fade-up',
          on
            ? 'bg-white/[0.035] border-white/[0.08] hover:border-white/[0.14]'
            : 'bg-white/[0.02] border-white/[0.05] hover:border-white/[0.10] opacity-90'
        ].join(' ')}
        style={{ animationDelay: `${idx * 60}ms` }}>

          {/* Row 1: title + toggle */}
          <div className="flex items-start justify-between gap-4 mb-4">
            <div className="flex items-start gap-3 min-w-0">
              <div className={[
                'w-10 h-10 rounded-xl flex items-center justify-center shrink-0',
                on ? 'bg-brand-500/12 text-brand-300 ring-1 ring-brand-500/25' : 'bg-white/[0.05] text-white/40 ring-1 ring-white/[0.06]'
              ].join(' ')}>
                <I.Zap size={17} stroke={2.2}/>
              </div>
              <div className="min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <h3 className="text-white text-[16px] font-bold leading-tight">{auto.name}</h3>
                  <span className={[
                    'inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-medium ring-1',
                    on ? 'bg-emerald-500/12 text-emerald-300 ring-emerald-500/25' : 'bg-white/[0.05] text-white/45 ring-white/[0.08]'
                  ].join(' ')}>
                    <span className={['w-1.5 h-1.5 rounded-full', on ? 'bg-emerald-400 animate-glow-pulse' : 'bg-white/30'].join(' ')}/>
                    {on ? 'Active' : 'Paused'}
                  </span>
                </div>
                <p className="text-[12px] text-white/55 mt-1.5">
                  <span className="text-white/35">When:</span>{' '}
                  <span className="font-medium text-white/80">{auto.trigger}</span>
                </p>
              </div>
            </div>

            <div className="flex items-center gap-2 shrink-0">
              <Toggle on={on} onChange={setOn}/>
              <button onClick={runTest} disabled={testState==='running'}
                className={['inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium transition-all border',
                  testState==='running'
                    ? 'bg-violet-500/15 text-violet-300 border-violet-500/25 cursor-wait'
                    : testState==='done'
                      ? 'bg-emerald-500/12 text-emerald-300 border-emerald-500/20 hover:bg-emerald-500/20'
                      : testState==='error'
                        ? 'bg-red-500/12 text-red-300 border-red-500/20 hover:bg-red-500/20'
                        : 'text-white/65 hover:text-white bg-white/[0.04] hover:bg-white/[0.08] border-white/[0.08] hover:border-white/[0.18]'
                ].join(' ')}>
                {testState==='running' ? <><svg className="animate-spin" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10" strokeOpacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/></svg>Running…</>
                 : testState==='done'  ? <><I.CheckSquare size={11}/>Test passed</>
                 : testState==='error' ? <><I.Flag size={11}/>Errors found</>
                 : <><I.Play size={11}/>Test run</>}
              </button>
              <button className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-medium text-white/65 hover:text-white bg-white/[0.04] hover:bg-white/[0.08] border border-white/[0.08] hover:border-white/[0.18] transition-all">
                <I.Edit size={12}/> Edit
              </button>
              <button className="w-8 h-8 rounded-lg flex items-center justify-center text-white/45 hover:text-white hover:bg-white/[0.06] transition-all">
                <I.MoreH size={14}/>
              </button>
            </div>
          </div>

          {/* Steps */}
          <div className="rounded-xl bg-black/20 border border-white/[0.04] px-3 py-3 mb-4">
            <div className="flex items-center gap-1.5 flex-wrap">
              {auto.steps.map((s, i) => (
                <StepPill key={i} step={s} last={i === auto.steps.length - 1}/>
              ))}
            </div>
          </div>

          {/* Test run log */}
          {testLog.length > 0 && (
            <div className="mt-4 rounded-xl border border-white/[0.06] bg-black/30 overflow-hidden">
              <div className="flex items-center justify-between px-3.5 py-2 border-b border-white/[0.05]">
                <p className="text-[10.5px] font-bold uppercase tracking-wider text-white/45">Test run log</p>
                <button onClick={()=>{setTestLog([]);setTestState(null);}} className="text-white/35 hover:text-white/70 text-[10px] transition-colors">Clear</button>
              </div>
              <div className="p-3 flex flex-col gap-1.5 max-h-36 overflow-y-auto">
                {testLog.map((l,i)=>(
                  <div key={i} className="flex items-start gap-2.5 font-mono text-[11px]">
                    <span className="text-white/30 shrink-0 tabular-nums">{l.ts}</span>
                    <span className={['shrink-0', l.ok?'text-emerald-400':'text-red-400'].join(' ')}>{l.ok?'✓':'✗'}</span>
                    <span className={l.ok?'text-white/65':'text-red-300'}>{l.msg}</span>
                  </div>
                ))}
                {testState==='running' && (
                  <div className="flex items-center gap-2 text-[11px] text-white/40">
                    <svg className="animate-spin shrink-0" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10" strokeOpacity=".25"/><path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/></svg>
                    Executing…
                  </div>
                )}
              </div>
            </div>
          )}
          <div className="flex items-center justify-between gap-4">
            <div className="flex items-center gap-5">
              <div className="flex items-center gap-2">
                <I.Play size={9} className="text-white/40"/>
                <span className="text-[12px] text-white/45">Runs</span>
                <span className="text-[13px] font-bold text-white tabular-nums">{auto.runs}</span>
              </div>
              <div className="flex items-center gap-2">
                {on ? (
                  <>
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-400"/>
                    <span className="text-[12px] text-white/45">Success</span>
                    <span className="text-[13px] font-bold text-emerald-300 tabular-nums">{auto.success}%</span>
                  </>
                ) : (
                  <>
                    <span className="w-1.5 h-1.5 rounded-full bg-white/30"/>
                    <span className="text-[12px] text-white/45 italic">Paused — no runs since {auto.pausedSince}</span>
                  </>
                )}
              </div>
              {auto.lastRun && (
                <div className="flex items-center gap-2 text-[12px] text-white/45">
                  <I.Clock size={11}/>
                  Last run {auto.lastRun}
                </div>
              )}
            </div>
            {auto.spark && (
              <div className="flex items-center gap-2">
                <span className="text-[11px] text-white/35">Last 14d</span>
                <Sparkline data={auto.spark} color={on ? '#818cf8' : '#64748b'}/>
              </div>
            )}
          </div>
          <ErrorLogSection history={auto.runHistory} />
        </div>
      );
    }

                {i < tmpl.trail.length - 1 && <span className="text-white/15"><I.ArrowRight size={10} stroke={2}/></span>}

          <button className="w-full inline-flex items-center justify-center gap-1.5 py-2 rounded-xl text-[12px] font-semibold transition-all

            <I.ArrowRight size={11} stroke={2.4}/>
