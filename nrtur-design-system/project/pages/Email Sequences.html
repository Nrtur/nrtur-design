<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Sequences — nrtur</title>
  <link rel="icon" type="image/svg+xml" href="../assets/nrtur-mark.svg" />
  <link rel="stylesheet" href="../colors_and_type.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 950:'#07070f',925:'#09091a',900:'#0b0b18',850:'#0d0d1a' },
          },
          fontFamily: { sans:['Inter','system-ui','sans-serif'], mono:['ui-monospace','SFMono-Regular','Menlo','monospace'] },
          boxShadow: { 'brand':'0 0 0 1px rgba(99,102,241,0.30), 0 4px 60px rgba(99,102,241,0.15)', 'brand-lg':'0 0 0 1px rgba(99,102,241,0.40), 0 8px 80px rgba(99,102,241,0.25)' },
          keyframes: {
            fadeUp:    { '0%':{ opacity:0, transform:'translateY(8px)' }, '100%':{ opacity:1, transform:'translateY(0)' } },
            glowPulse: { '0%,100%':{ opacity:0.5 }, '50%':{ opacity:1 } },
          },
          animation: { 'fade-up':'fadeUp 360ms ease-out both', 'glow-pulse':'glowPulse 3s ease-in-out infinite' },
        }
      }
    }
  </script>
  <style>
    html,body,#root { height:100%; }
    body { margin:0; background:#09091a; color:#fff; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; }
    ::selection { background:rgba(99,102,241,0.35); }
    .scroll-area::-webkit-scrollbar { width:6px; }
    .scroll-area::-webkit-scrollbar-track { background:transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background:rgba(99,102,241,0.30); border-radius:9999px; }
    .email-body:empty:before { content:attr(data-placeholder); color:rgba(255,255,255,0.22); pointer-events:none; display:block; }
    .email-body { outline:none; }
    .email-body a { color:#a5b4fc; text-decoration:underline; }
    .email-body b, .email-body strong { color:rgba(255,255,255,0.95); font-weight:700; }
    .email-body i, .email-body em { font-style:italic; color:rgba(255,255,255,0.85); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  // ---------- Icons ----------
  const Ico = ({ d, size=16, stroke=2, className='', fill }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
  );
  const I = {
    LayoutDash:  (p)=><Ico {...p} d={<><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></>}/>,
    Users:       (p)=><Ico {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>,
    GitBranch:   (p)=><Ico {...p} d={<><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>}/>,
    Mail:        (p)=><Ico {...p} d={<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-10 5L2 7"/></>}/>,
    MailOpen:    (p)=><Ico {...p} d={<><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/><path d="m22 10-10 7L2 10"/></>}/>,
    Zap:         (p)=><Ico {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>,
    BarChart:    (p)=><Ico {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>}/>,
    Settings:    (p)=><Ico {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>,
    Plus:        (p)=><Ico {...p} d={<><path d="M5 12h14"/><path d="M12 5v14"/></>}/>,
    Search:      (p)=><Ico {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>}/>,
    Clock:       (p)=><Ico {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>,
    Braces:      (p)=><Ico {...p} d={<><path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1"/><path d="M16 3h1a2 2 0 0 1 2 2v5a2 2 0 0 0 2 2 2 2 0 0 0-2 2v5a2 2 0 0 1-2 2h-1"/></>}/>,
    Trash:       (p)=><Ico {...p} d={<><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>}/>,
    ChevronDown: (p)=><Ico {...p} d={<polyline points="6 9 12 15 18 9"/>}/>,
    Save:        (p)=><Ico {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>}/>,
    Pause:       (p)=><Ico {...p} d={<><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></>}/>,
    Play:        (p)=><Ico {...p} d={<polygon points="6 3 20 12 6 21 6 3" fill="currentColor"/>}/>,
    Check:       (p)=><Ico {...p} d={<polyline points="20 6 9 17 4 12"/>}/>,
    CornerDownRight:(p)=><Ico {...p} d={<><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></>}/>,
    Edit:        (p)=><Ico {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>}/>,
    Bold:        (p)=><Ico {...p} d={<><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></>}/>,
    Italic:      (p)=><Ico {...p} d={<><line x1="19" x2="10" y1="4" y2="4"/><line x1="14" x2="5" y1="20" y2="20"/><line x1="15" x2="9" y1="4" y2="20"/></>}/>,
    Link2:       (p)=><Ico {...p} d={<><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></>}/>,
    EyeOff:      (p)=><Ico {...p} d={<><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" x2="23" y1="1" y2="23"/></>}/>,
    X:           (p)=><Ico {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>}/>,
  };

  // ---------- Sidebar ----------
  function Sidebar() {
    const items = [
      { key:'dash', Icon:I.LayoutDash, label:'Dashboard' },
      { key:'contacts', Icon:I.Users, label:'Contacts' },
      { key:'pipeline', Icon:I.GitBranch, label:'Pipeline' },
      { key:'email', Icon:I.Mail, label:'Email' },
      { key:'automations', Icon:I.Zap, label:'Automations' },
      { key:'reports', Icon:I.BarChart, label:'Reports' },
    ];
    return (
      <aside className="w-14 shrink-0 flex flex-col items-center py-5 gap-1.5 border-r border-white/[0.05]" style={{ background:'#07070f' }}>
        <a href="Automations.html" className="mb-4" title="nrtur">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center shadow-brand" style={{ background:'linear-gradient(135deg,#6366f1,#7c3aed)' }}>
            <span className="text-white font-black text-sm leading-none">n</span>
          </div>
        </a>
        {items.map(({ key, Icon, label }) => {
          const a = key === 'automations';
          return (
            <a key={key} title={label} href={key==='automations'?'Automations.html':'#'}
              className={['w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-150', a ? 'bg-brand-500/20 text-brand-300 ring-1 ring-brand-500/25 shadow-[0_0_18px_rgba(99,102,241,0.35)]' : 'text-white/30 hover:text-white/70 hover:bg-white/[0.04]'].join(' ')}>
              <Icon size={16}/>
            </a>
          );
        })}
        <div className="mt-auto flex flex-col items-center gap-3">
          <a href="Settings Pipeline.html" title="Settings" className="w-9 h-9 rounded-xl flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/[0.04] transition-all">
            <I.Settings size={16}/>
          </a>
          <button title="Alex Morgan" className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ring-1 ring-white/[0.06] hover:ring-white/20 transition-all" style={{ background:'#3b82f6' }}>AM</button>
        </div>
      </aside>
    );
  }

  // ---------- Constants ----------
  const STATUS = {
    active:{ label:'Active', dot:'bg-emerald-400', text:'text-emerald-300', ring:'ring-emerald-500/25', bg:'bg-emerald-500/12', pulse:true },
    paused:{ label:'Paused', dot:'bg-amber-400',   text:'text-amber-300',   ring:'ring-amber-500/25',   bg:'bg-amber-500/12',   pulse:false },
    draft: { label:'Draft',  dot:'bg-white/35',    text:'text-white/55',    ring:'ring-white/[0.10]',   bg:'bg-white/[0.05]',   pulse:false },
  };
  const TOKENS = [
    { key:'first_name', label:'First name', sample:'Sarah' },
    { key:'company',    label:'Company',    sample:'Meridian' },
    { key:'deal_name',  label:'Deal name',  sample:'Q3 Retainer' },
  ];
  const DELAY_OPTIONS = [{ key:'1hr',label:'1 hr' },{ key:'1day',label:'1 day' },{ key:'1week',label:'1 week' },{ key:'custom',label:'Custom' }];
  const CUSTOM_UNITS = ['minutes','hours','days','weeks'];
  function delaySummary(s) {
    if (s.delay==='1hr') return '1 hour';
    if (s.delay==='1day') return '1 day';
    if (s.delay==='1week') return '1 week';
    return `${s.customN} ${s.customUnit}`;
  }

  // ---------- Dropdown ----------
  function Dropdown({ value, options, onChange, align='left' }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
      function h(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
      document.addEventListener('mousedown',h);
      return ()=>document.removeEventListener('mousedown',h);
    },[]);
    const sel = options.find(o=>o.value===value);
    return (
      <div className="relative" ref={ref}>
        <button onClick={()=>setOpen(o=>!o)}
          className="inline-flex items-center justify-between gap-1.5 px-2.5 py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.08] hover:border-white/[0.16] text-[12px] font-medium text-white/80 transition-all min-w-[80px]">
          <span className="truncate">{sel?.label||'—'}</span>
          <I.ChevronDown size={11} className={'text-white/40 transition-transform '+(open?'rotate-180':'')}/>
        </button>
        {open && (
          <div className={['absolute top-full mt-1 min-w-full rounded-xl border border-white/[0.10] shadow-[0_16px_40px_rgba(0,0,0,0.55)] overflow-hidden z-30 py-1', align==='right'?'right-0':'left-0'].join(' ')} style={{ background:'#0d0d1f' }}>
            {options.map(o=>(
              <button key={o.value} onClick={()=>{ onChange(o.value); setOpen(false); }}
                className="w-full flex items-center justify-between gap-3 px-3 py-1.5 hover:bg-white/[0.05] transition-colors">
                <span className="text-[12.5px] text-white/85 whitespace-nowrap">{o.label}</span>
                {value===o.value && <I.Check size={12} className="text-brand-300 shrink-0"/>}
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ---------- Token Picker ----------
  function TokenPicker({ onInsert, onOpen }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    useEffect(() => {
      function h(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
      document.addEventListener('mousedown',h);
      return ()=>document.removeEventListener('mousedown',h);
    },[]);
    function toggle() { onOpen?.(); setOpen(o=>!o); }
    return (
      <div className="relative" ref={ref}>
        <button onClick={toggle}
          className="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-brand-500/10 hover:bg-brand-500/20 border border-brand-500/25 hover:border-brand-500/40 text-[12px] font-medium text-brand-200 transition-all">
          <I.Braces size={12}/> Insert token
        </button>
        {open && (
          <div className="absolute bottom-full mb-1.5 left-0 w-56 rounded-xl border border-white/[0.10] shadow-[0_16px_40px_rgba(0,0,0,0.55)] overflow-hidden z-30" style={{ background:'#0d0d1f' }}>
            <div className="px-3 py-2 border-b border-white/[0.06]">
              <p className="text-[10px] font-semibold uppercase tracking-wider text-white/40">Merge tokens</p>
            </div>
            {TOKENS.map(t=>(
              <button key={t.key} onClick={()=>{ onInsert(t.key); setOpen(false); }}
                className="w-full flex items-center justify-between gap-3 px-3 py-2 hover:bg-white/[0.05] transition-colors group">
                <span className="font-mono text-[11.5px] text-brand-300 bg-brand-500/10 px-1.5 py-0.5 rounded">{'{{'+t.key+'}}'}</span>
                <span className="text-[11px] text-white/35 group-hover:text-white/55 shrink-0">{t.sample}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ---------- Rich Body Editor ----------
  function RichBodyEditor({ value, onChange, stepId }) {
    const ref = useRef(null);
    const savedRange = useRef(null);
    const [linkOpen, setLinkOpen] = useState(false);
    const [linkUrl, setLinkUrl] = useState('https://');
    const urlInputRef = useRef(null);

    // Only reset HTML when the step changes
    useEffect(() => {
      if (ref.current) ref.current.innerHTML = value || '';
    }, [stepId]); // eslint-disable-line react-hooks/exhaustive-deps

    function saveRange() {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        if (ref.current && ref.current.contains(range.commonAncestorContainer)) {
          savedRange.current = range.cloneRange();
        }
      }
    }
    function restoreRange() {
      if (!savedRange.current) return;
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedRange.current);
    }
    function sync() { onChange(ref.current?.innerHTML || ''); }

    function exec(cmd) {
      restoreRange();
      ref.current?.focus();
      document.execCommand(cmd, false, null);
      sync();
    }

    function openLink(e) {
      e.preventDefault();
      saveRange();
      setLinkUrl('https://');
      setLinkOpen(true);
      setTimeout(()=>urlInputRef.current?.select(), 50);
    }
    function applyLink(e) {
      e.preventDefault();
      restoreRange();
      ref.current?.focus();
      if (linkUrl.trim()) document.execCommand('createLink', false, linkUrl.trim());
      setLinkOpen(false);
      sync();
    }
    function cancelLink() { setLinkOpen(false); ref.current?.focus(); }

    function insertToken(tok) {
      restoreRange();
      ref.current?.focus();
      document.execCommand('insertText', false, '{{'+tok+'}}');
      sync();
    }

    return (
      <div className="rounded-xl border border-white/[0.08] bg-black/25 focus-within:border-brand-500/40 focus-within:shadow-[0_0_0_3px_rgba(99,102,241,0.10)] transition-all overflow-hidden">
        {/* Toolbar */}
        <div className="flex items-center gap-0.5 px-2 py-2 border-b border-white/[0.06]" onMouseDown={(e)=>e.preventDefault()}>
          <button onClick={()=>exec('bold')}
            title="Bold" className="w-7 h-7 rounded-md flex items-center justify-center text-white/55 hover:text-white hover:bg-white/[0.07] transition-all">
            <I.Bold size={13}/>
          </button>
          <button onClick={()=>exec('italic')}
            title="Italic" className="w-7 h-7 rounded-md flex items-center justify-center text-white/55 hover:text-white hover:bg-white/[0.07] transition-all">
            <I.Italic size={13}/>
          </button>
          <div className="w-px h-4 bg-white/[0.08] mx-1"/>
          <div className="relative">
            <button onClick={openLink}
              title="Insert link" className="w-7 h-7 rounded-md flex items-center justify-center text-white/55 hover:text-white hover:bg-white/[0.07] transition-all">
              <I.Link2 size={13}/>
            </button>
            {linkOpen && (
              <form onSubmit={applyLink}
                className="absolute top-full left-0 mt-2 flex items-center gap-1.5 p-2 rounded-xl border border-white/[0.12] shadow-[0_16px_40px_rgba(0,0,0,0.5)] z-30 whitespace-nowrap"
                style={{ background:'#0d0d1f' }}>
                <input ref={urlInputRef} value={linkUrl} onChange={e=>setLinkUrl(e.target.value)}
                  className="w-48 bg-white/[0.05] border border-white/[0.10] focus:border-brand-500/50 rounded-lg px-2.5 py-1.5 text-[12px] text-white outline-none placeholder:text-white/30"
                  placeholder="https://"/>
                <button type="submit" className="px-3 py-1.5 rounded-lg bg-brand-500 hover:bg-brand-400 text-white text-[12px] font-semibold transition-all">Apply</button>
                <button type="button" onClick={cancelLink} className="w-6 h-6 rounded-md flex items-center justify-center text-white/40 hover:text-white hover:bg-white/[0.06] transition-all">
                  <I.X size={11}/>
                </button>
              </form>
            )}
          </div>
          <div className="w-px h-4 bg-white/[0.08] mx-1"/>
          <TokenPicker onInsert={insertToken} onOpen={saveRange}/>
        </div>
        {/* Body */}
        <div
          ref={ref}
          contentEditable
          suppressContentEditableWarning
          className="email-body px-3.5 py-3 text-[13.5px] leading-relaxed text-white/90 min-h-[120px]"
          data-placeholder="Write your email body…"
          onInput={sync}
          onBlur={saveRange}
          onKeyUp={saveRange}
          onMouseUp={saveRange}
        />
      </div>
    );
  }

  // ---------- Email step card ----------
  function EmailStepCard({ step, index, total, onChange, onDelete }) {
    const subjectRef = useRef(null);

    function insertSubjectToken(tok) {
      const input = subjectRef.current;
      const token = '{{'+tok+'}}';
      const s = input ? (input.selectionStart ?? step.subject.length) : step.subject.length;
      const e = input ? (input.selectionEnd ?? step.subject.length) : step.subject.length;
      const next = step.subject.slice(0, s) + token + step.subject.slice(e);
      onChange({ ...step, subject: next });
      requestAnimationFrame(()=>{ if(input){ input.focus(); input.setSelectionRange(s+token.length, s+token.length); } });
    }

    const stepChoices = Array.from({ length:total }, (_,i)=>i+1)
      .filter(n=>n!==index+1)
      .map(n=>({ value:n, label:`Step ${n}` }));

    return (
      <div className="rounded-2xl border border-white/[0.08] bg-white/[0.025] hover:border-white/[0.14] transition-all animate-fade-up">

        {/* Header: number + delay + delete */}
        <div className="flex items-center gap-3 px-4 pt-4 pb-3 border-b border-white/[0.05]">
          <div className="w-8 h-8 rounded-xl bg-brand-500/15 text-brand-200 ring-1 ring-brand-500/25 flex items-center justify-center text-[13px] font-bold shrink-0 tabular-nums">
            {index+1}
          </div>

  // ---------- Editable name ----------
  function EditableName({ value, onChange }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(value);
    const inputRef = useRef(null);
    useEffect(()=>{ setDraft(value); },[value]);
    useEffect(()=>{ if(editing&&inputRef.current){ inputRef.current.focus(); inputRef.current.select(); } },[editing]);
    function commit(){ onChange(draft.trim()||value); setEditing(false); }
    if (editing) return (
      <input ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)}
        onBlur={commit} onKeyDown={e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape'){setDraft(value);setEditing(false);} }}
        className="text-[20px] font-bold tracking-tight bg-white/[0.05] border border-brand-500/40 rounded-lg px-2.5 py-1 outline-none text-white shadow-[0_0_0_3px_rgba(99,102,241,0.12)] w-[360px] max-w-full"/>
    );
    return (
      <button onClick={()=>setEditing(true)}
        className="group inline-flex items-center gap-2 px-2.5 py-1 -ml-2.5 rounded-lg hover:bg-white/[0.04] transition-colors max-w-full">
        <span className="text-[20px] font-bold tracking-tight text-white truncate">{value}</span>
        <I.Edit size={14} className="text-white/25 group-hover:text-white/55 transition-colors shrink-0"/>
      </button>
    );
  }

  // ---------- Sequence editor ----------
  function SequenceEditor({ seq, onUpdate, onDelete }) {
    const [saved, setSaved] = useState(false);
    const s = STATUS[seq.status];

    function updateStep(id, next) { onUpdate({...seq,steps:seq.steps.map(st=>st.id===id?next:st)}); }
    function deleteStep(id) { onUpdate({...seq,steps:seq.steps.filter(st=>st.id!==id)}); }
    function addStep() {
      const nid = Math.max(0,...seq.steps.map(st=>st.id))+1;
      onUpdate({...seq,steps:[...seq.steps,{id:nid,delay:'1day',customN:3,customUnit:'days',subject:'',body:'',condition:{enabled:false,target:seq.steps.length+1}}]});
    }
    function save() { setSaved(true); setTimeout(()=>setSaved(false),1800); }
    function togglePause() { onUpdate({...seq,status:seq.status==='active'?'paused':'active'}); }

    return (
      <div className="flex flex-col h-full">
        {/* Topbar */}
        <header className="shrink-0 border-b border-white/[0.05] px-6 py-3.5 flex items-center justify-between gap-4" style={{ background:'#0b0b18' }}>

            </span>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <button onClick={save}
              className={['inline-flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-[12.5px] font-semibold transition-all', saved?'bg-emerald-500/15 text-emerald-300 ring-1 ring-emerald-500/30':'bg-brand-500 hover:bg-brand-400 text-white shadow-brand hover:shadow-brand-lg hover:-translate-y-0.5 active:translate-y-0'].join(' ')}>
              {saved?<><I.Check size={13}/> Saved</>:<><I.Save size={13}/> Save</>}
            </button>
            <button onClick={togglePause}

            <button onClick={onDelete}

              <I.Trash size={13}/> Delete
            </button>
          </div>
        </header>

        {/* Flow */}
        <div className="flex-1 overflow-y-auto scroll-area">
          <div className="max-w-[720px] mx-auto px-6 py-7">
            <div className="flex items-center gap-2 mb-5 text-[12px] text-white/45">
              <I.Users size={13} className="text-white/35"/>
              <span><span className="text-white/80 font-semibold tabular-nums">{seq.enrolled}</span> contacts enrolled</span>
              <span className="text-white/15">·</span>
              <span><span className="text-white/80 font-semibold tabular-nums">{seq.steps.length}</span>-step sequence</span>
            </div>

            {/* Start node */}
            <div className="flex items-center gap-2.5 mb-1">
              <div className="w-8 h-8 rounded-full bg-white/[0.04] border border-white/[0.08] flex items-center justify-center shrink-0">

              </div>
              <div>
                <p className="text-[12.5px] font-semibold text-white/80">Contact enrolled</p>
                <p className="text-[11px] text-white/35">Sequence begins</p>
              </div>
            </div>

            {seq.steps.map((step,i)=>(
              <React.Fragment key={step.id}>
                <Connector label={delaySummary(step)}/>
                <EmailStepCard
                  step={step} index={i} total={seq.steps.length}
                  onChange={next=>updateStep(step.id,next)}
                  onDelete={()=>deleteStep(step.id)}
                />
              </React.Fragment>

              <p className="text-center py-10 text-white/40 text-[13px]">No steps yet. Add your first email below.</p>

              <div className="w-px h-5" style={{ background:'linear-gradient(to bottom,rgba(99,102,241,0.4),rgba(99,102,241,0.05))' }}/>
              <button onClick={addStep}

            </div>

            <div className="flex flex-col items-center pt-4">
              <div className="w-px h-5 bg-white/[0.08]"/>
              <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/[0.03] border border-white/[0.06] text-[11px] text-white/40">
                Sequence complete
              </span>
            </div>
          </div>
        </div>
      </div>
    );
  }

            <div className="flex-1 overflow-y-auto scroll-area px-5 pb-5 pt-1.5 flex flex-col gap-2">
              {filtered.map(seq=>(
                <SequenceListItem key={seq.id} seq={seq} active={seq.id===selectedId} onClick={()=>setSelectedId(seq.id)}/>
              ))}
              {filtered.length===0 && (
                <p className="text-center text-[12px] text-white/35 py-8">No sequences match "{query}".</p>
              )}
            </div>
          </div>

          {/* Right panel */}
          <div className="flex-1 min-w-0" style={{ background:'#09091a' }}>
            {selected
              ? <SequenceEditor key={selected.id} seq={selected} onUpdate={updateSeq} onDelete={()=>deleteSeq(selected.id)}/>
              : <EmptyState/>}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<EmailSequencesPage/>);
</script>
</body>
</html>
