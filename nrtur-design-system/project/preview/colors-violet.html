<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="between">
    <div class="label">Secondary · Violet</div>
    <div class="kbd">--violet-400 … --violet-700</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    
      <div class="col" style="gap:6px;">
        <div style="height:64px; border-radius:12px; background:#a78bfa; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-4); font-weight:600;">violet-400</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#a78bfa</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:64px; border-radius:12px; background:#8b5cf6; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-4); font-weight:600;">violet-500</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#8b5cf6</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:64px; border-radius:12px; background:#7c3aed; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-4); font-weight:600;">violet-600</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#7c3aed</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:64px; border-radius:12px; background:#6d28d9; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-4); font-weight:600;">violet-700</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#6d28d9</div>
      </div>
    
  </div>
  <div style="margin-top:6px; height:24px; border-radius:6px; background: linear-gradient(90deg, #6366f1, #7c3aed);"></div>
  <div style="font-size:11px; color:var(--fg-6);">Brand → violet gradient (logo tile, gradient-text-brand)</div>
</div>
</div></body></html>
