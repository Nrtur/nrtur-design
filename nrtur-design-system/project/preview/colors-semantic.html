<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Semantic · success / warning / danger / info</div>
  <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:12px;">
    
      <div class="col" style="gap:8px;">
        <div style="height:56px; border-radius:12px; background:rgba(16,185,129,0.10); border:1px solid rgba(16,185,129,0.20); display:flex; align-items:center; justify-content:center;">
          <span style="color:#34d399; font-weight:600; font-size:12px;">Success</span>
        </div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">Success</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#34d399</div>
        <div style="font-size:10px; color:var(--fg-5);">Won, Active, online</div>
      </div>
    
      <div class="col" style="gap:8px;">
        <div style="height:56px; border-radius:12px; background:rgba(245,158,11,0.10); border:1px solid rgba(245,158,11,0.20); display:flex; align-items:center; justify-content:center;">
          <span style="color:#fbbf24; font-weight:600; font-size:12px;">Warning</span>
        </div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">Warning</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#fbbf24</div>
        <div style="font-size:10px; color:var(--fg-5);">Follow-up, negotiating</div>
      </div>
    
      <div class="col" style="gap:8px;">
        <div style="height:56px; border-radius:12px; background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.20); display:flex; align-items:center; justify-content:center;">
          <span style="color:#f87171; font-weight:600; font-size:12px;">Danger</span>
        </div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">Danger</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#f87171</div>
        <div style="font-size:10px; color:var(--fg-5);">Error, declined</div>
      </div>
    
      <div class="col" style="gap:8px;">
        <div style="height:56px; border-radius:12px; background:rgba(59,130,246,0.10); border:1px solid rgba(59,130,246,0.20); display:flex; align-items:center; justify-content:center;">
          <span style="color:#60a5fa; font-weight:600; font-size:12px;">Info</span>
        </div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">Info</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#60a5fa</div>
        <div style="font-size:10px; color:var(--fg-5);">New lead, neutral</div>
      </div>
    
  </div>
</div>
</div></body></html>
