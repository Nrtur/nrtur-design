<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 12px;">
  <div class="label">Feature card</div>
  <div class="glass-card" style="padding:24px; max-width: 380px;">
    <div style="width:48px; height:48px; border-radius:14px; background: linear-gradient(135deg, rgba(99,102,241,0.20), rgba(139,92,246,0.20)); display:flex; align-items:center; justify-content:center; margin-bottom:18px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
    </div>
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px;">
      <h3 style="font-size:18px; font-weight:700; color:var(--fg-1); margin:0;">Sales Pipelines</h3>
      <span style="font-size:10px; font-weight:600; color:#818cf8; background:rgba(99,102,241,0.10); border:1px solid rgba(99,102,241,0.20); padding:2px 8px; border-radius:9999px;">Core</span>
    </div>
    <p style="font-size:13px; color:var(--fg-5); line-height:1.6; margin:0 0 18px 0;">Drag-and-drop kanban boards that match how you actually sell.</p>
    <div class="row" style="gap:8px;">
      <span style="font-size:11px; color:var(--fg-5); background:rgba(255,255,255,0.04); border:1px solid var(--border-3); padding:4px 10px; border-radius:9999px;">Multiple pipelines</span>
      <span style="font-size:11px; color:var(--fg-5); background:rgba(255,255,255,0.04); border:1px solid var(--border-3); padding:4px 10px; border-radius:9999px;">Deal scoring</span>
    </div>
  </div>
</div>
</div></body></html>
