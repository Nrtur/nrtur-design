<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 16px;">
  <div class="label">Logo mark · indigo→violet tile + lowercase n</div>
  <div class="row" style="gap:30px; align-items:center;">
    <div style="width:80px; height:80px; border-radius:18px; background: linear-gradient(135deg, #6366f1, #7c3aed); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);">
      <span style="color:white; font-weight:900; font-size:42px; line-height:1;">n</span>
    </div>
    <div style="width:48px; height:48px; border-radius:12px; background: linear-gradient(135deg, #6366f1, #7c3aed); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);">
      <span style="color:white; font-weight:900; font-size:22px; line-height:1;">n</span>
    </div>
    <div style="width:32px; height:32px; border-radius:8px; background: linear-gradient(135deg, #6366f1, #7c3aed); display:flex; align-items:center; justify-content:center;">
      <span style="color:white; font-weight:900; font-size:14px; line-height:1;">n</span>
    </div>
    <div class="row" style="gap:10px; align-items:center;">
      <div style="width:32px; height:32px; border-radius:8px; background: linear-gradient(135deg, #6366f1, #7c3aed); display:flex; align-items:center; justify-content:center;">
        <span style="color:white; font-weight:900; font-size:14px;">n</span>
      </div>
      <span style="color:var(--fg-1); font-weight:700; font-size:19px; letter-spacing:-0.01em;">nrtur</span>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Always lowercase wordmark. Tile uses 135° linear gradient · brand-500 → violet-600.</div>
</div>
</div></body></html>
