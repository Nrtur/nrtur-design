<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Corner radii</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px;">
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:6px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-xs</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">6px</div>
        <div style="font-size:10px; color:var(--fg-5);">chip</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:10px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-md</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">10px</div>
        <div style="font-size:10px; color:var(--fg-5);">input</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:12px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-lg</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">12px</div>
        <div style="font-size:10px; color:var(--fg-5);">button</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:14px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-xl</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">14px</div>
        <div style="font-size:10px; color:var(--fg-5);">tile</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:16px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-2xl</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">16px</div>
        <div style="font-size:10px; color:var(--fg-5);">card</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background:var(--glass-2); border:1px solid var(--border-2); border-radius:24px;"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-3xl</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">24px</div>
        <div style="font-size:10px; color:var(--fg-5);">window</div>
      </div>
    
  </div>
  <div class="row" style="gap:14px; margin-top:6px;">
    <div style="width:56px;height:56px;background:var(--glass-2);border:1px solid var(--border-2);border-radius:9999px;"></div>
    <div class="col" style="gap:2px;">
      <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--radius-full</div>
      <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">9999px</div>
      <div style="font-size:10px; color:var(--fg-5);">avatars, pills, status dots</div>
    </div>
  </div>
</div>
</div></body></html>
