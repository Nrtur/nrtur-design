<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />

  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Glass card</div>
  <div class="row" style="gap:14px; align-items:stretch;">
    <div class="glass-card" style="flex:1; padding:18px;">
      <div style="font-size:11px; font-weight:600; color:var(--brand-400);">Rest state</div>
      <div style="font-size:13px; color:var(--fg-3); margin-top:6px;">bg white/3 · border white/6 · radius 16</div>
    </div>
    <div class="glass-card" style="flex:1; padding:18px; border-color: rgba(255,255,255,0.10); box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 8px 40px rgba(0,0,0,0.5); transform: translateY(-2px);">
      <div style="font-size:11px; font-weight:600; color:var(--brand-400);">Hover state</div>
      <div style="font-size:13px; color:var(--fg-3); margin-top:6px;">border white/10 · brand glow · -2px lift</div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Workhorse surface. backdrop-blur(6px) on top of section bg.</div>
</div>
</div></body></html>
