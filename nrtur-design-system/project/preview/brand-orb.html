<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap:12px;">
  <div class="label">Glowing orb · ambient background light</div>
  <div style="position:relative; height:180px; border-radius:12px; overflow:hidden; background:var(--surface-950); border:1px solid var(--border-3);">
    <div style="position:absolute; width:300px; height:300px; border-radius:9999px; background: rgba(99,102,241,0.30); filter: blur(120px); top:-50px; left:-50px;"></div>
    <div style="position:absolute; width:240px; height:240px; border-radius:9999px; background: rgba(124,58,237,0.22); filter: blur(120px); top:0; right:-30px;"></div>
    <div style="position:absolute; width:180px; height:180px; border-radius:9999px; background: rgba(67,56,202,0.20); filter: blur(120px); bottom:-40px; left:40%;"></div>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Large radius · blur(120px) · brand or violet at 8–30% alpha · positioned absolutely behind hero content.</div>
</div>
</div></body></html>
