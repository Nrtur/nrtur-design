<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 16px;">
  <div class="label">Buttons · primary indigo / secondary ghost</div>
  <div class="row" style="gap:14px;">
    <button class="btn-primary" style="border:none; cursor:pointer;">Start free trial <span style="font-size:14px;">→</span></button>
    <button class="btn-secondary" style="cursor:pointer;">
      <span style="width:18px; height:18px; border-radius:9999px; background:rgba(255,255,255,0.1); display:inline-flex; align-items:center; justify-content:center; font-size:8px;">▶</span>
      Watch demo
    </button>
  </div>
  <div class="row" style="gap:14px;">
    <button class="btn-primary" style="border:none; cursor:pointer; padding: 8px 20px; font-size:13px;">Get started</button>
    <button class="btn-secondary" style="cursor:pointer; padding: 8px 20px; font-size:13px;">Sign in</button>
    <span style="display:inline-flex; align-items:center; gap:6px; background:rgba(99,102,241,0.10); border:1px solid rgba(99,102,241,0.20); color:#818cf8; font-size:11px; font-weight:500; padding: 6px 12px; border-radius:10px;">+ New Deal</span>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Hover · translateY(-2px) + shadow swells. Active · returns to 0. 200ms ease.</div>
</div>
</div></body></html>
