<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 12px;">
  <div class="label">Avatar palette · activity dots, deal owners</div>

      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#3b82f6; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">SC</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">blue</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#8b5cf6; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">JK</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">violet</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#10b981; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">RL</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">emerald</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#f59e0b; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">MR</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">amber</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#ec4899; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">LN</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">pink</div>
      </div>
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="width:40px; height:40px; border-radius:9999px; background:#14b8a6; color:white; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;">TB</div>
        <div style="font-size:10px; color:var(--fg-5); font-family:var(--font-mono);">teal</div>
      </div>
    
  </div>
  <div style="font-size:11px; color:var(--fg-6); margin-top:4px;">Solid fill · white initials · 9999px radius · no border</div>
</div>
