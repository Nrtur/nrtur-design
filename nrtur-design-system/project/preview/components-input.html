<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Inputs & search</div>
  <div style="display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); border:1px solid var(--border-3); border-radius:10px; padding:8px 12px; max-width:300px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <span style="font-size:12px; color:var(--fg-7);">Search deals...</span>
  </div>
  <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:9999px; padding:4px; display:inline-flex; gap:0; max-width:260px;">
    <button style="background:rgba(255,255,255,0.1); color:var(--fg-1); padding:8px 20px; font-size:12px; border-radius:9999px; border:none; cursor:pointer; font-weight:500;">Monthly</button>
    <button style="background:transparent; color:var(--fg-5); padding:8px 14px; font-size:12px; border-radius:9999px; border:none; cursor:pointer; font-weight:500;">Yearly <span style="font-size:10px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.20);color:#34d399;padding:1px 6px;border-radius:9999px;margin-left:4px;">Save 20%</span></button>
  </div>
</div>
</div></body></html>
