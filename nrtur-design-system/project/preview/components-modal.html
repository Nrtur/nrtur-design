<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>html, body { background: var(--surface-950); }</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap:12px;">
  <div class="label">Modal · Add Deal dialog</div>
  <div style="position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--border-3); background:rgba(7,7,15,0.6);">
    <div style="position:absolute; inset:0; backdrop-filter: blur(8px); background: rgba(7,7,15,0.55);"></div>
    <div style="position:relative; padding:24px; display:flex; align-items:center; justify-content:center;">
      <div style="width:100%; max-width:420px; background: rgba(15,15,28,0.85); border:1px solid var(--border-2); border-radius:16px; backdrop-filter: blur(24px); box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 32px 80px rgba(0,0,0,0.6), 0 0 100px rgba(99,102,241,0.08); padding: 22px;">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:6px;">
          <div>
            <p style="margin:0; font-size:15px; font-weight:700; color:var(--fg-1);">Add new deal</p>
            <p style="margin:4px 0 0 0; font-size:12px; color:var(--fg-5);">Track a new opportunity in your pipeline.</p>
          </div>
          <button style="background:transparent; border:none; color:var(--fg-6); cursor:pointer; padding:4px; display:flex; align-items:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:18px;">
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label style="font-size:11px; font-weight:500; color:var(--fg-4);">Company name</label>
            <div style="background:rgba(255,255,255,0.04); border:1px solid var(--border-2); border-radius:10px; padding:9px 12px; font-size:13px; color:var(--fg-2);">Pivot Studio</div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div style="display:flex; flex-direction:column; gap:6px;">
              <label style="font-size:11px; font-weight:500; color:var(--fg-4);">Value</label>
              <div style="background:rgba(255,255,255,0.04); border:1px solid var(--border-2); border-radius:10px; padding:9px 12px; font-size:13px; color:var(--fg-2);">$22,500</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px;">
              <label style="font-size:11px; font-weight:500; color:var(--fg-4);">Stage</label>
              <div style="background:rgba(255,255,255,0.04); border:1px solid var(--border-2); border-radius:10px; padding:9px 12px; font-size:13px; color:var(--fg-3); display:flex; align-items:center; justify-content:space-between;">
                Qualified <span style="color:var(--fg-7);">▾</span>
              </div>
            </div>
          </div>
        </div>
        <div style="display:flex; gap:8px; margin-top:20px;">
          <button class="btn-secondary" style="cursor:pointer; flex:1; padding:10px 14px; font-size:13px; justify-content:center;">Cancel</button>
          <button class="btn-primary" style="border:none; cursor:pointer; flex:1; padding:10px 14px; font-size:13px; justify-content:center;">Add deal</button>
        </div>
      </div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Backdrop · blur(8px) + 55% dark overlay · Card · deeper bg (15,15,28 at 85%), 1px ring, 24px blur, brand-tinted outer glow. Trap focus; Esc closes.</div>
</div>
</div></body></html>
