<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Border tiers · white-alpha rings on glass</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:var(--glass-1); border:1px solid rgba(255,255,255,0.10);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--border-1</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">10%</div>
        <div style="font-size:10px; color:var(--fg-5);">Strong divider</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:var(--glass-1); border:1px solid rgba(255,255,255,0.08);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--border-2</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">8%</div>
        <div style="font-size:10px; color:var(--fg-5);">Divider</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:var(--glass-1); border:1px solid rgba(255,255,255,0.06);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--border-3</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">6%</div>
        <div style="font-size:10px; color:var(--fg-5);">Card border</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:var(--glass-1); border:1px solid rgba(255,255,255,0.05);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--border-4</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">5%</div>
        <div style="font-size:10px; color:var(--fg-5);">Subtle inset</div>
      </div>
    
  </div>
  <div class="row" style="gap:10px; margin-top:4px;">
    <div style="height:36px; padding:0 16px; border-radius:10px; background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.3); color:#818cf8; font-size:12px; display:flex; align-items:center;">--border-brand (30%)</div>
    <div style="height:36px; padding:0 16px; border-radius:10px; background:rgba(99,102,241,0.10); border:1px solid rgba(99,102,241,0.4); color:#818cf8; font-size:12px; display:flex; align-items:center;">--border-brand-strong (40%)</div>
  </div>
</div>
</div></body></html>
