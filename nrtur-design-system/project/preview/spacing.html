<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Spacing scale · 4pt base</div>

        <div style="height:8px; width:8px; background:#6366f1; border-radius:2px;"></div>

      </div>

      </div>

      </div>
    
      <div style="display:grid; grid-template-columns:80px 1fr 60px; gap:14px; align-items:center;">
        <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-5);">--space-5</span>

        <div style="height:8px; width:96px; background:#6366f1; border-radius:2px;"></div>
