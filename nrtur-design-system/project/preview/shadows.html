<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 18px;">
  <div class="label">Shadow systems</div>
  <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 22px;">
    <div class="col" style="gap:10px;">
      <div style="height:64px; border-radius:14px; background:var(--surface-925); box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.4);"></div>
      <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--shadow-card</div>
      <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">1px inset · 4px/24 black 40%</div>
    </div>
    <div class="col" style="gap:10px;">
      <div style="height:64px; border-radius:14px; background:var(--surface-925); box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 8px 40px rgba(0,0,0,0.5);"></div>
      <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--shadow-card-hi (hover)</div>
      <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">brand 1px · 8px/40 black 50%</div>
    </div>
    <div class="col" style="gap:10px;">
      <div style="height:64px; border-radius:14px; background:#6366f1; box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);"></div>
      <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--shadow-brand</div>
      <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">primary button rest</div>
    </div>
    <div class="col" style="gap:10px;">
      <div style="height:64px; border-radius:14px; background:#6366f1; box-shadow: 0 0 0 1px rgba(99,102,241,0.4), 0 8px 80px rgba(99,102,241,0.25);"></div>
      <div style="font-size:11px; color:var(--fg-3); font-weight:600;">--shadow-brand-lg</div>
      <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">primary button hover</div>
    </div>
  </div>
</div>
</div></body></html>
