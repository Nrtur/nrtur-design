<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 12px;">
  <div class="label">Metric row · dashboard topbar</div>
  <div class="row" style="gap:28px; flex-wrap:nowrap;">
    
      <div style="display:flex; align-items:center; gap:8px;">
        <div>
          <div style="font-size:10px; color:var(--fg-6); line-height:1; margin-bottom:4px;">Pipeline Value</div>
          <div style="font-size:15px; font-weight:600; color:var(--fg-1); line-height:1;">$324k</div>
        </div>
        <span style="font-size:10px; font-weight:500; padding:2px 6px; border-radius:9999px; background:rgba(16,185,129,0.10); color:#34d399;">▲ +12%</span>
      </div>
    
      <div style="display:flex; align-items:center; gap:8px;">
        <div>
          <div style="font-size:10px; color:var(--fg-6); line-height:1; margin-bottom:4px;">Won This Month</div>
          <div style="font-size:15px; font-weight:600; color:var(--fg-1); line-height:1;">$134k</div>
        </div>
        <span style="font-size:10px; font-weight:500; padding:2px 6px; border-radius:9999px; background:rgba(16,185,129,0.10); color:#34d399;">▲ +31%</span>
      </div>
    
      <div style="display:flex; align-items:center; gap:8px;">
        <div>
          <div style="font-size:10px; color:var(--fg-6); line-height:1; margin-bottom:4px;">Avg Deal Size</div>
          <div style="font-size:15px; font-weight:600; color:var(--fg-1); line-height:1;">$11.5k</div>
        </div>
        <span style="font-size:10px; font-weight:500; padding:2px 6px; border-radius:9999px; background:rgba(16,185,129,0.10); color:#34d399;">▲ +4%</span>
      </div>
    
      <div style="display:flex; align-items:center; gap:8px;">
        <div>
          <div style="font-size:10px; color:var(--fg-6); line-height:1; margin-bottom:4px;">Win Rate</div>
          <div style="font-size:15px; font-weight:600; color:var(--fg-1); line-height:1;">68%</div>
        </div>
        <span style="font-size:10px; font-weight:500; padding:2px 6px; border-radius:9999px; background:rgba(239,68,68,0.10); color:#f87171;">▲ -2%</span>
      </div>
    
  </div>
  <div class="row" style="gap:16px; margin-top:14px;">
    <div class="col" style="gap:2px;">
      <span style="font-size:24px; font-weight:900;" class="gradient-text-brand">2,400+</span>
      <span style="font-size:11px; color:var(--fg-6);">Teams using nrtur</span>
    </div>
    <div class="col" style="gap:2px;">
      <span style="font-size:24px; font-weight:900;" class="gradient-text-brand">$29</span>
      <span style="font-size:11px; color:var(--fg-6);">Per user / mo</span>
    </div>
    <div class="col" style="gap:2px;">
      <span style="font-size:24px; font-weight:900;" class="gradient-text-brand">5 min</span>
      <span style="font-size:11px; color:var(--fg-6);">Setup time</span>
    </div>
  </div>
</div>
</div></body></html>
