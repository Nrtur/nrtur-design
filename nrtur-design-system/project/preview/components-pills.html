<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Status pills</div>
  <div class="row" style="gap:10px;">
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(16,185,129,0.10); color:#34d399;">Active</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(245,158,11,0.10); color:#fbbf24;">Follow-up</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(59,130,246,0.10); color:#60a5fa;">New lead</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(139,92,246,0.15); color:#a78bfa;">Call booked</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(99,102,241,0.15); color:#818cf8;">Demo done</span>
  </div>
  <div class="row" style="gap:10px;">
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(245,158,11,0.15); color:#fbbf24;">Proposal sent</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(249,115,22,0.15); color:#fb923c;">Negotiating</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(236,72,153,0.15); color:#f472b6;">Review</span>
    <span style="font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(16,185,129,0.15); color:#34d399;">Won 🎉</span>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Same recipe everywhere · 10–15% bg · matching solid text · 9999px radius.</div>
</div>
</div></body></html>
