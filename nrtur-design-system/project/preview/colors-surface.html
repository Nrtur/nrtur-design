<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="label">Surface scale · near-black, never pure</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:#07070f; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">surface-950</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#07070f</div>
        <div style="font-size:10px; color:var(--fg-5);">Page bg</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:#09091a; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">surface-925</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#09091a</div>
        <div style="font-size:10px; color:var(--fg-5);">Section lift</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:#0b0b18; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">surface-900</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#0b0b18</div>
        <div style="font-size:10px; color:var(--fg-5);">Window chrome</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:68px; border-radius:12px; background:#0d0d1a; border:1px solid var(--border-3);"></div>
        <div style="font-size:11px; color:var(--fg-3); font-weight:600;">surface-850</div>
        <div style="font-size:10px; color:var(--fg-6); font-family:var(--font-mono);">#0d0d1a</div>
        <div style="font-size:10px; color:var(--fg-5);">Deep card</div>
      </div>
    
  </div>
</div>
</div></body></html>
