<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>html, body { background: var(--surface-950); }</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap:12px;">
  <div class="label">Contact status badges · lifecycle</div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <span style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(59,130,246,0.10); border:1px solid rgba(59,130,246,0.20); color:#60a5fa;">
      <span style="width:5px; height:5px; border-radius:9999px; background:#60a5fa;"></span>
      Lead
    </span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(245,158,11,0.10); border:1px solid rgba(245,158,11,0.20); color:#fbbf24;">
      <span style="width:5px; height:5px; border-radius:9999px; background:#fbbf24;"></span>
      Prospect
    </span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(16,185,129,0.10); border:1px solid rgba(16,185,129,0.20); color:#34d399;">
      <span style="width:5px; height:5px; border-radius:9999px; background:#34d399;"></span>
      Customer
    </span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; padding:4px 10px; border-radius:9999px; background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.20); color:#f87171;">
      <span style="width:5px; height:5px; border-radius:9999px; background:#f87171;"></span>
      Lost
    </span>
  </div>
  <div class="label" style="margin-top:6px;">Same recipe without dot (tighter contexts)</div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <span style="font-size:11px; font-weight:500; padding:3px 10px; border-radius:9999px; background:rgba(59,130,246,0.10); color:#60a5fa;">Lead</span>
    <span style="font-size:11px; font-weight:500; padding:3px 10px; border-radius:9999px; background:rgba(245,158,11,0.10); color:#fbbf24;">Prospect</span>
    <span style="font-size:11px; font-weight:500; padding:3px 10px; border-radius:9999px; background:rgba(16,185,129,0.10); color:#34d399;">Customer</span>
    <span style="font-size:11px; font-weight:500; padding:3px 10px; border-radius:9999px; background:rgba(239,68,68,0.10); color:#f87171;">Lost</span>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">Lead = blue (info) · Prospect = amber (in-progress) · Customer = emerald (success) · Lost = red (closed-lost).</div>
</div>
</div></body></html>
