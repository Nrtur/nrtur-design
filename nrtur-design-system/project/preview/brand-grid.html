<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  .ds-card { padding: 24px 32px; }
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap:12px;">
  <div class="label">Grid background motif</div>
  <div style="position:relative; height:160px; border-radius:12px; overflow:hidden; background:var(--surface-950); border:1px solid var(--border-3);">
    <div style="position:absolute;inset:0;background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px); background-size: 60px 60px;"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,0.12), transparent);"></div>
    <div style="position:absolute; inset:auto 0 0 0; height:60px; background:linear-gradient(to top, var(--surface-950), transparent);"></div>
  </div>
  <div style="font-size:11px; color:var(--fg-6);">60×60 indigo 4% lines · radial brand fade top · gradient mask bottom. Animates · grid-pan 8s linear.</div>
</div>
</div></body></html>
