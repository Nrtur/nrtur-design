<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 14px;">
  <div class="between">
    <div class="label">Brand · Indigo</div>
    <div class="kbd">--brand-50 … --brand-900</div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap: 6px;">
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#eef2ff; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">50</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#eef2ff</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#e0e7ff; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">100</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#e0e7ff</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#c7d2fe; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">200</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#c7d2fe</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#a5b4fc; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">300</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#a5b4fc</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#818cf8; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">400</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#818cf8</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#6366f1; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">500</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#6366f1</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#4f46e5; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">600</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#4f46e5</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#4338ca; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">700</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#4338ca</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#3730a3; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">800</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#3730a3</div>
      </div>
    
      <div class="col" style="gap:6px;">
        <div style="height:56px; border-radius: 10px; background:#312e81; border:1px solid var(--border-3);"></div>
        <div style="font-size:10px; color:var(--fg-5); text-align:center;">900</div>
        <div style="font-size:9px; color:var(--fg-7); text-align:center; font-family:var(--font-mono);">#312e81</div>
      </div>
    
  </div>
  <div class="row" style="margin-top:4px; gap: 8px;">
    <span style="font-size:11px; color:var(--fg-6);">Primary fill</span>
    <span style="width:14px;height:14px;border-radius:4px;background:#6366f1;border:1px solid var(--border-3);"></span>
    <span style="font-size:11px; color:var(--fg-6); margin-left:12px;">Accent text</span>
    <span style="width:14px;height:14px;border-radius:4px;background:#818cf8;border:1px solid var(--border-3);"></span>
  </div>
</div>
</div></body></html>
