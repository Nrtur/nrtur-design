<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  html, body { background: var(--surface-950); }
  
</style>
</head><body><div class="ds-card"><div class="grain"></div>
<div class="col" style="gap: 12px;">
  <div class="label">Top navigation · scrolled state</div>
  <div style="background: rgba(7,7,15,0.9); backdrop-filter: blur(20px); border:1px solid var(--border-3); border-radius:14px; padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:32px; height:32px; border-radius:8px; background: linear-gradient(135deg, #6366f1, #7c3aed); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 4px 60px rgba(99,102,241,0.15);">
        <span style="color:white; font-weight:900; font-size:14px;">n</span>
      </div>
      <span style="color:var(--fg-1); font-weight:700; font-size:17px; letter-spacing:-0.01em;">nrtur</span>
    </div>
    <div class="row" style="gap:4px;">
      <a style="font-size:13px; color:var(--fg-4); padding:8px 14px; border-radius:8px;">Features</a>
      <a style="font-size:13px; color:var(--fg-4); padding:8px 14px; border-radius:8px;">Pricing</a>
      <a style="font-size:13px; color:var(--fg-4); padding:8px 14px; border-radius:8px;">Compare</a>
      <a style="font-size:13px; color:var(--fg-4); padding:8px 14px; border-radius:8px;">FAQ</a>
    </div>
    <div class="row" style="gap:12px;">
      <a style="font-size:13px; color:var(--fg-3); font-weight:500;">Sign in</a>
      <button class="btn-primary" style="border:none; cursor:pointer; padding: 8px 18px; font-size:13px;">Start free trial</button>
    </div>
  </div>
</div>
</div></body></html>
